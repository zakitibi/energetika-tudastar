&lt;template id=&quot;lesson-6&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;6. lecke – A magyar energiaszektor mélyebben&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;MAVIR, MEKH, MVM, Paks és Paks II, FGSZ és a hazai stratégia&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 20.  •  Adatok: 2025–2026  •  Szint: alapozó+  •  Előzmény: 1–5. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Az 1–5. leckében felépítettük a nagy képet: források, rendszer, piac, EU-keret. Most &lt;strong&gt;ráközelítünk Magyarországra&lt;/strong&gt;: kik a kulcsszereplők, hogyan kapcsolódnak össze, hol tart Paks II, és mi a hazai stratégia fő dilemmája – az &lt;strong&gt;orosz energiafüggőség&lt;/strong&gt; és a &lt;strong&gt;dekarbonizáció&lt;/strong&gt; feszültsége.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;A magyar energiaszektor szereplői élesen elválnak: a &lt;strong&gt;MEKH&lt;/strong&gt; a független szabályozó, a &lt;strong&gt;MAVIR&lt;/strong&gt; a villamos átviteli rendszerirányító, az &lt;strong&gt;FGSZ&lt;/strong&gt; a gázszállító, az &lt;strong&gt;MVM-csoport&lt;/strong&gt; pedig a domináns, állami tulajdonú energiavállalat (termelés, kereskedelem, egyetemes szolgáltatás). Az áramtermelés gerince &lt;strong&gt;Paks&lt;/strong&gt; (~46,7%) és a &lt;strong&gt;napenergia&lt;/strong&gt;.&lt;/p&gt;&lt;p&gt;A hazai stratégia két lábon áll: &lt;strong&gt;atom + nap&lt;/strong&gt;. A Paks II bővítés 2026. február 5-én &lt;strong&gt;megkezdte a fizikai építést&lt;/strong&gt; (első betonöntés), de az első új blokk üzembe helyezése a 2030-as évek közepére csúszott. Eközben az &lt;strong&gt;orosz import&lt;/strong&gt; továbbra is meghatározó: a gáz nagyrészt a TurkStream-en, az olaj a Barátság (Druzhba) vezetéken érkezik – ez a hazai energiapolitika legvitatottabb pontja.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – ki kicsoda?&lt;/h1&gt;&lt;p&gt;Gondolj a szektorra úgy, mint egy sportligára, ahol elválik a játékvezető, a pályagazda és a csapatok:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Játékvezető (szabályozó): &lt;/strong&gt;MEKH – szabályokat hoz, árakat felügyel, engedélyez. Független.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Pályagazda (rendszerirányító): &lt;/strong&gt;MAVIR (áram), FGSZ (gáz) – fenntartják az infrastruktúrát és az egyensúlyt, semlegesen.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Csapatok (piaci szereplők): &lt;/strong&gt;MVM-csoport, E.ON, OPUS TITÁSZ, naperőmű-fejlesztők stb. – termelnek, kereskednek, ellátnak.&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;&lt;strong&gt;Miért fontos a szétválasztás? &lt;/strong&gt;Az EU szabályai szerint a hálózatot üzemeltető nem lehet egyúttal érdekelt eladó – különben tisztességtelen előnyhöz jutna. Ezt hívják unbundlingnak (szétválasztás).&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat – a kulcsszereplők&lt;/h1&gt;&lt;h2&gt;3.1 MEKH – a szabályozó&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A Magyar Energetikai és Közmű-szabályozási Hivatal (MEKH) a független energiaszabályozó. Feladata az engedélyezés, a hálózati díjak és bizonyos hatósági árak megállapítása, a piac felügyelete és a fogyasztóvédelem. Az EU energiapolitikájának hazai becsatornázásában is kulcsszerepe van.&lt;/p&gt;&lt;h2&gt;3.2 MAVIR és FGSZ – a rendszerirányítók&lt;/h2&gt;&lt;p&gt;A &lt;strong&gt;MAVIR&lt;/strong&gt; a villamos átviteli rendszerirányító (3. lecke): hálózat, egyensúly, határkeresztezés, rendszerterv. A &lt;strong&gt;FGSZ&lt;/strong&gt; a földgázszállító rendszerüzemeltető: a nagynyomású gázvezetékeken szállítja a gázt az ország egészébe és a tranzitban, valamint kezeli a betáplálási pontokat. Mindkettő semleges infrastruktúra-üzemeltető.&lt;/p&gt;&lt;h2&gt;3.3 MVM-csoport – az állami óriás&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az MVM (Magyar Villamos Művek) állami tulajdonú, vertikálisan integrált energiacsoport. Tevékenységei: villamosenergia-termelés (köztük a Paksi Atomerőmű üzemeltetése), nagykereskedelem, földgáz-kereskedelem és -tárolás, valamint a lakossági egyetemes szolgáltatás jelentős része. Az MVM a magyar energiapiac domináns szereplője.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;Az erős állami szereplő előnye a stratégiai irányíthatóság és az ellátásbiztonság; hátránya, hogy egy domináns cég csökkentheti a piaci versenyt és az árképzés átláthatóságát. Ez a központosított modell az egyik szakmai vitatéma.&lt;/p&gt;&lt;h2&gt;3.4 Paks és Paks II&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A működő Paksi Atomerőmű négy VVER-440-es blokkja adja a hazai áramtermelés ~46,7%-át (2024). A bővítés (Paks II) két új, orosz VVER-1200 (III+ generációs) blokkot épít a Roszatommal. Mérföldkövek: az OAH 2025. november 4-én adta ki az alapozási/építési engedélyt, az első betonöntés 2026. február 5-én megtörtént – ettől a projekt hivatalosan épülő atomerőmű.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az üzembe helyezés csúszott: az eredeti 2020-as évek vége helyett az első blokk a 2030-as évek közepén indulhat, a második egy évvel később. A nukleáris üzemanyagot az első években az orosz TVEL szállítja; az EU 2024-ben a Paks II-t mentesítette a szankciók alól.&lt;/p&gt;&lt;h2&gt;3.5 Importfüggőség és hazai stratégia&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A hazai gázimport nagy része ma a TurkStream vezetéken, Törökországon és a Balkánon át érkezik orosz forrásból (2025-ben kb. 8–8,5 milliárd m³); a kőolaj döntően a Barátság (Druzhba) vezetéken. A villamosenergia-ellátásban az ország nettó importőr (~30%). A hazai stratégia (Nemzeti Energia- és Klímaterv) a napenergia és az atom bővítésére, valamint a hálózat- és tárolásfejlesztésre épít.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A magyar megközelítés tudatosan lassabb orosz leválást és atomközpontú dekarbonizációt képvisel – ellátásbiztonságra és megfizethetőségre hivatkozva. Kritikusai szerint ez fenntartja a stratégiai kitettséget; a kormány szerint a realitás és a fokozatosság diktálja. A két nézet közötti feszültség a következő évtized fő hazai energiakérdése.&lt;/p&gt;&lt;h1&gt;4. Kulcsszereplők egy lapon&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szereplő&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szerep&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;MEKH&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Független energiaszabályozó (engedély, díjak, felügyelet)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;MAVIR&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Villamos átviteli rendszerirányító (TSO)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;FGSZ&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Földgázszállító rendszerüzemeltető&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;MVM-csoport&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Állami integrált energiavállalat (Paks, kereskedelem, egyetemes szolgáltatás)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Elosztók (E.ON, OPUS TITÁSZ stb.)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Közép- és kisfeszültségű hálózat, fogyasztói ellátás (DSO)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;HUPX&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Szervezett villamosenergia-tőzsde&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Paks / Paks II&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Működő atomerőmű (~46,7%) / két új VVER-1200 blokk épül&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Téli gázcsúcs: &lt;/strong&gt;hidegben az MVM a tárolókból és a TurkStream-importból fedezi a megugró gázkeresletet; az FGSZ szállítja, a MEKH felügyeli a hatósági árat.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Paks-karbantartás: &lt;/strong&gt;ha egy paksi blokk leáll, a MAVIR-nak több importot kell beszerveznie, és nő a HUPX-ár – egyetlen erőmű is érezhetően mozgatja a rendszert.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Napos déli többlet: &lt;/strong&gt;a sok új naperőmű miatt délben a MAVIR-nak aktívan kell szabályoznia, sőt néha export vagy leszabályozás kell – ez hajtja a tárolás iránti igényt (7. lecke).&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Unbundling (szétválasztás)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A hálózatüzemeltetés és a kereskedelem szétválasztása a tisztességes verseny érdekében.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Egyetemes szolgáltatás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A lakosság és kisfogyasztók garantált, szabályozott áron történő ellátása.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;VVER-1200&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Orosz III+ generációs nyomottvizes reaktortípus (Paks II).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;OAH&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Országos Atomenergia Hivatal – a nukleáris engedélyező és felügyeleti hatóság.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;TurkStream&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Fekete-tengeri orosz gázvezeték a Balkánon át; ma a fő útvonal Magyarországra.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Barátság (Druzhba)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az orosz kőolajat szállító vezeték Magyarországra.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;NEKT&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Nemzeti Energia- és Klímaterv: a hazai energia- és klímastratégia dokumentuma.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;MEKH – a magyar energiaszabályozó – &lt;a href=&quot;https://www.mekh.hu/&quot;&gt;https://www.mekh.hu/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;MAVIR – rendszerirányítás – &lt;a href=&quot;https://www.mavir.hu/web/mavir/rendszeriranyitas&quot;&gt;https://www.mavir.hu/web/mavir/rendszeriranyitas&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Paks II – a projekt és az első betonöntés (2026) – &lt;a href=&quot;https://www.paks2.hu/a-projekt-tortenete&quot;&gt;https://www.paks2.hu/a-projekt-tortenete&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Telex – hivatalosan kezdődhet Paks II építése (2026.02.) – &lt;a href=&quot;https://telex.hu/gazdasag/2026/02/03/paks-ii-atomeromu-elso-beton-ontes-epitkezes-orszagos&quot;&gt;https://telex.hu/gazdasag/2026/02/03/paks-ii-atomeromu-elso-beton-ontes-epitkezes-orszagos&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Interfax/CEEnergyNews – Hungary TurkStream/Druzhba 2025 import és mentesség – &lt;a href=&quot;https://ceenergynews.com/oil-gas/hungary-receives-sanction-exemption-regarding-the-turkstream-and-druzhba-pipelines/&quot;&gt;https://ceenergynews.com/oil-gas/hungary-receives-sanction-exemption-regarding-the-turkstream-and-druzhba-pipelines/&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: a Paks II ütemterve és az importmennyiségek politikailag és piaci szempontból is mozgó adatok; a lecke a 2025–2026-os állapotot tükrözi.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (7. lecke): Energiatárolás és rendszerrugalmasság – akkumulátorok, szivattyús tározó, hidrogén, keresletoldali válasz.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-7&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;7. lecke – Energiatárolás és rugalmasság&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Akkumulátorok, szivattyús tározó, hidrogén és a keresletoldali válasz&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 20.  •  Adatok: 2024–2025  •  Szint: alapozó+  •  Előzmény: 1–6. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;A 3. leckében láttuk: a villamos energiát nem könnyű tárolni, ezért kell folyamatos egyensúly. Az 1–2. leckében pedig, hogy a nap és a szél időjárásfüggő. A &lt;strong&gt;tárolás és a rugalmasság&lt;/strong&gt; pont ezt a két problémát oldja: eltolja az energiát időben, és párnát ad az ingadozásra. Ez az energiaátmenet egyik kulcstechnológiája.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;Mivel a nap és a szél akkor termel, amikor süt/fúj – nem amikor kell –, egyre fontosabb, hogy az energiát &lt;strong&gt;eltároljuk és időben eltoljuk&lt;/strong&gt;. A fő megoldások: &lt;strong&gt;akkumulátorok&lt;/strong&gt; (rövid táv, órák), &lt;strong&gt;szivattyús-tározós vízerőmű&lt;/strong&gt; (a legnagyobb léptékű tárolás ma), &lt;strong&gt;hidrogén&lt;/strong&gt; (hosszú táv/szezonális), és a nem-tárolós rugalmasság: &lt;strong&gt;keresletoldali válasz&lt;/strong&gt; és a &lt;strong&gt;hálózati összekapcsolás&lt;/strong&gt;.&lt;/p&gt;&lt;p&gt;A lítiumionos akkumulátorok ára gyorsan zuhan: a rendszerszintű költség 2025-ben kb. &lt;strong&gt;110–125 €/kWh&lt;/strong&gt; (2–4 órás rendszerre), ami az utóbbi években évi két számjegyű csökkenés. Ettől a tárolás egyre több helyen gazdaságos – ez gyökeresen átalakítja, hogyan illesztjük be a megújulókat.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – miért kell tárolni?&lt;/h1&gt;&lt;p&gt;Képzeld el, hogy a napenergia olyan, mint az eső: akkor jön, amikor jön. A tárolás a víztározó, amely összegyűjti a bőséget a szárazságra:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Termelési csúcs ≠ fogyasztási csúcs: &lt;/strong&gt;a nap délben termel a legtöbbet, de a fogyasztás reggel és este a legnagyobb. A tárolás áthidalja a kettőt.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Ingadozás simítása: &lt;/strong&gt;ha egy felhő eltakarja a napot, az akku másodpercek alatt pótolja a kiesést – stabilizálja a hálózatot.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Olcsó → drága óra arbitrázs: &lt;/strong&gt;olcsó (napos) órában tölt, drága (esti) órában kisüt – ezzel pénzt is keres, és lapítja az árcsúcsokat.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;3. Részletes magyarázat – a tárolási és rugalmassági eszközök&lt;/h1&gt;&lt;h2&gt;3.1 Akkumulátorok (lítiumionos)&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A grid-szintű lítiumionos rendszerek a leggyorsabban terjedő tárolási mód: percek alatt teljes teljesítményre állnak, ~85–90% körömjárati (round-trip) hatásfokkal. A rendszerár 2025-ben globálisan kb. 110–125 €/kWh (2–4 órás), évek óta meredeken csökken. Erősségük a rövid táv (órák), gyengeségük a hosszú/szezonális tárolás.&lt;/p&gt;&lt;h2&gt;3.2 Szivattyús-tározós vízerőmű&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A világ messze legnagyobb energiatárolási kapacitása ma a szivattyús-tározós erőmű: olcsó (éjszakai/napos) árammal vizet szivattyúz egy felső tározóba, csúcsidőben pedig visszaengedi turbinán át. Nagy kapacitás, hosszú élettartam, de erősen domborzatfüggő. Magyarországon kevés a megfelelő helyszín.&lt;/p&gt;&lt;h2&gt;3.3 Hidrogén és hosszú távú tárolás&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A zöld hidrogént megújuló árammal, vízbontással (elektrolízis) állítják elő; eltárolható és később árammá vagy ipari nyersanyaggá alakítható. Előnye a szezonális/hosszú táv, hátránya az alacsony, ~35–40%-os körömjárati hatásfok és a magas költség (jelenleg ~3–8 €/kg). Ezért inkább nehéz iparra és hosszú tárolásra ígéretes, nem napi kiegyenlítésre.&lt;/p&gt;&lt;h2&gt;3.4 Keresletoldali rugalmasság (nem tárolás!)&lt;/h2&gt;&lt;p&gt;Nem mindig kell tárolni – a fogyasztást is el lehet tolni. A &lt;strong&gt;keresletoldali válasz (demand response)&lt;/strong&gt; azt jelenti, hogy a fogyasztó a termeléshez igazítja a felhasználását: pl. okos töltés, hűtőházak, ipari folyamatok időzítése. A &lt;strong&gt;V2G (vehicle-to-grid)&lt;/strong&gt; pedig az elektromos autók akkujait használja mozgó tárolóként. Ezek olcsó rugalmasságot adnak a rendszernek.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A jövő rendszerében nem egyetlen csodamegoldás lesz, hanem egy „eszköztár”: rövid távra akku, hosszú távra hidrogén/tározó, és sok olcsó rugalmasság a kereslet oldalán. A kulcs a megfelelő eszköz a megfelelő feladatra.&lt;/p&gt;&lt;h1&gt;4. A tárolási módok összehasonlítása&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mód&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Időtáv&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Hatásfok&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Korlát&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Lítiumion akku&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;percek–órák&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~85–90%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;rövid táv, nyersanyag&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szivattyús tározó&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;órák–napok&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~70–80%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;domborzatfüggő&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Zöld hidrogén&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;napok–évszakok&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~35–40%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;drága, alacsony hatásfok&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Keresletoldali válasz&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;percek–órák&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;—&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;korlátozott rugalmasság&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;p&gt;&lt;em&gt;A „round-trip” (körömjárati) hatásfok azt mutatja, a betárolt energia hány százaléka nyerhető vissza – minél magasabb, annál kevesebb a veszteség.&lt;/em&gt;&lt;/p&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Naperőmű + akku Magyarországon: &lt;/strong&gt;egyre több hazai naperőműhöz építenek akkumulátort, hogy a déli többletet estére tolják – és kihasználják a magas esti HUPX-árat (4. lecke).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Frekvenciatartás akkuval: &lt;/strong&gt;a gyors akkumulátorok ideálisak a primer (FCR) tartalékra (3. lecke), mert ezredmásodpercek alatt reagálnak a frekvencia eltérésére.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Szezonális hidrogén: &lt;/strong&gt;nyári napos többletből hidrogént gyártva télen visszaalakítható árammá vagy hővé – ez a szezonális tárolás ígérete, ma még drágán.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Round-trip hatásfok&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A betárolt energia visszanyerhető hányada (pl. akku ~85–90%).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Arbitrázs&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Olcsó órában tölteni, drága órában kisütni – haszon és árcsúcs-simítás.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Elektrolízis&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Vízbontás árammal hidrogénné és oxigénné (zöld hidrogén előállítása).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Keresletoldali válasz&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A fogyasztás időbeli eltolása a termeléshez igazítva.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;V2G (vehicle-to-grid)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Elektromos autók akkuja mozgó tárolóként szolgál a hálózatnak.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;LDES&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Hosszú időtávú energiatárolás (long-duration energy storage), pl. hidrogén, tározó.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Rugalmasság&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A rendszer képessége gyorsan alkalmazkodni a termelés/fogyasztás változásához.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;Ember – How cheap is battery storage? (2025 rendszerár) – &lt;a href=&quot;https://ember-energy.org/latest-insights/how-cheap-is-battery-storage/&quot;&gt;https://ember-energy.org/latest-insights/how-cheap-is-battery-storage/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;BNEF / Energy-Storage.News – battery prices 2024–2025 – &lt;a href=&quot;https://www.energy-storage.news/battery-storage-system-prices-continue-to-fall-sharply-bnef-and-ember-reports-find/&quot;&gt;https://www.energy-storage.news/battery-storage-system-prices-continue-to-fall-sharply-bnef-and-ember-reports-find/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;NREL ATB 2024 – Utility-scale battery &amp;amp; pumped hydro – &lt;a href=&quot;https://atb.nrel.gov/electricity/2024/utility-scale_battery_storage&quot;&gt;https://atb.nrel.gov/electricity/2024/utility-scale_battery_storage&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA – Hydrogen / energy storage (áttekintés) – &lt;a href=&quot;https://www.iea.org/energy-system/low-emission-fuels/hydrogen&quot;&gt;https://www.iea.org/energy-system/low-emission-fuels/hydrogen&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: a tárolási költségek gyorsan változnak és régiónként erősen szórnak (pl. a kínai rendszerár töredéke az európainak). A hatásfok- és árértékek nagyságrendi tájékoztatók.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (8. lecke): Földgáz és olaj részletesen – ellátási láncok, vezetékek, LNG, TTF és Brent, magyar útvonalak.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-8&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;8. lecke – Földgáz és olaj részletesen&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Ellátási láncok, vezetékek és LNG, a TTF és a Brent árképzés, magyar útvonalak&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 20.  •  Adatok: 2025–2026  •  Szint: alapozó+  •  Előzmény: 1–7. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;A 2. leckében megismertük a forrásokat, az 5–6.-ban az orosz függőséget. Most a &lt;strong&gt;két legfontosabb fosszilis tüzelőanyag&lt;/strong&gt; – a földgáz és a kőolaj – ellátási láncát és árképzését nézzük meg részletesen, mert ezek határozzák meg a magyar energiaszámla és az ellátásbiztonság nagy részét.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;A földgáz és a kőolaj &lt;strong&gt;globálisan kereskedett&lt;/strong&gt; áru, de eltérő logikával. Az olaj könnyen szállítható (tankhajó, vezeték), ezért &lt;strong&gt;egységes világpiaci ára&lt;/strong&gt; van – a referencia a &lt;strong&gt;Brent&lt;/strong&gt;. A gáz nehezebben szállítható, ezért regionális árak vannak; Európa referenciája a holland &lt;strong&gt;TTF&lt;/strong&gt;. 2025-ben mindkettő olcsóbb lett: a Brent éves átlaga kb. &lt;strong&gt;69 $/hordó&lt;/strong&gt;, a TTF év elejére kb. &lt;strong&gt;35–45 €/MWh&lt;/strong&gt;-ra mérséklődött a 2022-es csúcsokról.&lt;/p&gt;&lt;p&gt;Magyarország mindkettőből &lt;strong&gt;erősen importfügg&lt;/strong&gt;: a gáz nagyrészt a &lt;strong&gt;TurkStream&lt;/strong&gt; vezetéken (orosz forrás, ~8–8,5 mrd m³ 2025-ben), az olaj a &lt;strong&gt;Barátság (Druzhba)&lt;/strong&gt; vezetéken érkezik. A diverzifikáció (LNG, alternatív vezetékek, tárolás) a hazai és EU-stratégia központi kérdése.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – miért más a gáz és az olaj?&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Olaj = könnyen szállítható: &lt;/strong&gt;tankhajóval bárhová eljut, ezért egységes a világpiac és egyetlen globális ár vezérli (Brent, WTI).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Gáz = nehezen szállítható: &lt;/strong&gt;vezetéken vagy cseppfolyósítva (LNG) megy, ami drága és infrastruktúrához kötött – ezért regionális árak vannak (TTF Európában, Henry Hub az USA-ban).&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;&lt;strong&gt;Miért fontos ez? &lt;/strong&gt;Mert a gáz „bezártsága” miatt egy régió (pl. Európa) kiszolgáltatottabb a beszállítóinak, mint az olajnál. Ezért volt a 2022-es gázsokk sokkal súlyosabb Európában, mint az olajé.&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;&lt;h2&gt;3.1 Az olaj ellátási lánca és a Brent&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A kőolajat kitermelik, tankhajón vagy vezetéken finomítóba szállítják, ahol benzinné, gázolajjá, kerozinná és vegyipari alapanyaggá alakítják. A globális referenciaár a Brent (északi-tengeri minőség). 2025-ben a Brent éves átlaga kb. 69 $/hordó volt (januári ~79-ről decemberi ~63-ra esett) – a 2020 óta legalacsonyabb, bőséges kínálat miatt.&lt;/p&gt;&lt;h2&gt;3.2 A gáz ellátási lánca, az LNG és a TTF&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A földgázt vezetéken vagy cseppfolyósítva (LNG, tankhajón) szállítják. Az LNG előnye a rugalmasság (bárhová vihető), hátránya a cseppfolyósítás és újragázosítás költsége. Európa referenciaára a holland TTF virtuális kereskedési pont. A TTF 2025-ben kb. 45%-ot esett, év elejére ~35–45 €/MWh-ra mérséklődve – jóval a 2022-es háborús csúcsok (&amp;gt;300 €/MWh) alatt, de a 2021 előtti szint felett.&lt;/p&gt;&lt;h2&gt;3.3 Tárolás és ellátásbiztonság&lt;/h2&gt;&lt;p&gt;A gázfogyasztás erősen szezonális (télen sokszorosa a nyárinak), ezért &lt;strong&gt;földalatti gáztárolók&lt;/strong&gt; pufferelik a rendszert: nyáron töltik, télen ürítik. Az EU szabályai minimum töltöttségi szintet írnak elő a tél előtt. Magyarországnak jelentős hazai tárolókapacitása van (nagyrészt MVM-kezelésben), ami kulcs az ellátásbiztonsághoz.&lt;/p&gt;&lt;h2&gt;3.4 Magyar útvonalak és a diverzifikáció&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A magyar gáz nagyrészt a TurkStream-en (Fekete-tenger–Balkán) érkezik orosz forrásból; 2025-ben ez maradt a fő útvonal. A kőolaj döntően a Barátság (Druzhba) déli ágán. Diverzifikációs lehetőségek: a horvátországi (Krk) LNG-terminál, a román és más regionális összeköttetések, valamint az Adria kőolajvezeték – ezek kapacitása és gazdaságossága vita tárgya.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A magyar álláspont szerint az alternatív útvonalak ma drágábbak és korlátozott kapacitásúak, ezért az orosz import fenntartása racionális; a kritikusok szerint a függőség stratégiai kockázat, és a diverzifikáció halogatása növeli a kitettséget. Az EU célja az orosz gáz teljes kivezetése 2027 végére (5. lecke) – ez a feszültség itt csúcsosodik ki.&lt;/p&gt;&lt;h1&gt;4. Kulcsszámok és referenciaárak&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Tétel&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Lényeg / érték (2025–2026)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Brent (globális olaj-referencia)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2025 éves átlag ~69 $/hordó (jan ~79 → dec ~63)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;TTF (európai gáz-referencia)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2026 elejére ~35–45 €/MWh (2025-ben −45%)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;2022-es gázcsúcs (összevetés)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&amp;gt;300 €/MWh (háborús sokk)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;HU orosz gázimport 2025&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~8–8,5 mrd m³ (főleg TurkStream)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;HU fő gázútvonal&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;TurkStream (orosz forrás)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;HU fő olajútvonal&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Barátság (Druzhba) vezeték&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Téli tárolóhasználat: &lt;/strong&gt;a nyáron feltöltött hazai gáztárolók télen pótolják a megnövekedett keresletet, csökkentve a téli import- és árcsúcsot.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Brent és a benzinár: &lt;/strong&gt;amikor a Brent esik (mint 2025-ben), idővel olcsóbb lesz a kútfői üzemanyag is – a globális olajár közvetlenül leér a magyar benzinkútig.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;LNG mint biztosíték: &lt;/strong&gt;a horvát Krk-terminálon át érkező LNG alternatívát ad az orosz csővezetékes gázra – kapacitása ezért stratégiai kérdés a régióban.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Brent / WTI&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Globális kőolaj-referenciaárak (északi-tengeri, illetve amerikai).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;TTF / Henry Hub&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Európai, illetve amerikai földgáz-referenciaár.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;LNG&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Cseppfolyósított földgáz – tankhajón szállítható, rugalmas, de drágább.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Upstream / midstream / downstream&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Kitermelés / szállítás-tárolás / finomítás-értékesítés.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Földalatti gáztároló&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Szezonális puffer: nyáron tölt, télen ürít.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Diverzifikáció&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Több beszállító és útvonal a függőség csökkentésére.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Hub&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Virtuális vagy fizikai kereskedési pont, ahol az ár kialakul (pl. TTF).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;EIA – Crude oil prices fell in 2025 (Brent éves átlag) – &lt;a href=&quot;https://www.eia.gov/todayinenergy/detail.php?id=66944&quot;&gt;https://www.eia.gov/todayinenergy/detail.php?id=66944&lt;/a&gt;&lt;/li&gt;&lt;li&gt;TradingEconomics – EU Natural Gas (TTF) ár – &lt;a href=&quot;https://tradingeconomics.com/commodity/eu-natural-gas&quot;&gt;https://tradingeconomics.com/commodity/eu-natural-gas&lt;/a&gt;&lt;/li&gt;&lt;li&gt;TASS / Interfax – Hungary Russian pipeline gas 2025 (TurkStream) – &lt;a href=&quot;https://tass.com/economy/2086579&quot;&gt;https://tass.com/economy/2086579&lt;/a&gt;&lt;/li&gt;&lt;li&gt;CEEnergyNews – Hungary TurkStream/Druzhba mentesség – &lt;a href=&quot;https://ceenergynews.com/oil-gas/hungary-receives-sanction-exemption-regarding-the-turkstream-and-druzhba-pipelines/&quot;&gt;https://ceenergynews.com/oil-gas/hungary-receives-sanction-exemption-regarding-the-turkstream-and-druzhba-pipelines/&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: a nyersanyagárak naponta változnak; a megadott értékek 2025–2026-os átlagok és nagyságrendek, nem pillanatnyi jegyzések. Befektetési döntés előtt aktuális tőzsdei adat ellenőrzése ajánlott.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (9. lecke): Az energiaátmenet és a jövő – elektrifikáció, hőszivattyú, EV, hidrogéngazdaság és a kihívások.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-9&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;9. lecke – Az energiaátmenet és a jövő&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Elektrifikáció, hőszivattyú, EV, hidrogéngazdaság és a fő kihívások&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 20.  •  Adatok: 2024–2025  •  Szint: alapozó+  •  Előzmény: 1–8. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Ez az alapozó sorozat záró leckéje. Eddig megismertük a forrásokat, a rendszert, a piacot, a szabályozást, a magyar szektort és a tárolást. Most &lt;strong&gt;összerakjuk a jövőképet&lt;/strong&gt;: merre tart az energiarendszer, mit jelent az „elektrifikáció”, és mik a valódi akadályok. Itt sok az &lt;strong&gt;előrejelzés&lt;/strong&gt; – ezeket világosan jelölöm.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;Az energiaátmenet lényege kettős: &lt;strong&gt;tisztább termelés&lt;/strong&gt; (megújuló + atom) és &lt;strong&gt;elektrifikáció&lt;/strong&gt; – vagyis minél többet csinálunk árammal, amit eddig fosszilissel tettünk (közlekedés → EV, fűtés → hőszivattyú, ipar → villamosítás). Ezért a &lt;strong&gt;villamosenergia-igény gyorsan nő&lt;/strong&gt;: 2024-ben globálisan +4,3%, és a növekedés több mint 80%-át megújuló és atom fedezte.&lt;/p&gt;&lt;p&gt;A trend valós, de &lt;strong&gt;egyenetlen&lt;/strong&gt;: az elektromos autók eladása 2024-ben &amp;gt;25%-kal nőtt (&amp;gt;17 millió db), a hőszivattyúk viszont Európában visszaestek (–21%), nagyrészt a magas áram-gáz árarány és a támogatások bizonytalansága miatt. A fő kihívások: a &lt;strong&gt;hálózat és tárolás&lt;/strong&gt; bővítése, a &lt;strong&gt;nyersanyagok&lt;/strong&gt;, a &lt;strong&gt;rendszerrugalmasság&lt;/strong&gt;, és a &lt;strong&gt;megfizethetőség&lt;/strong&gt;.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – mi az elektrifikáció?&lt;/h1&gt;&lt;p&gt;Az átmenet két mozdulatból áll, és csak együtt működnek:&lt;/p&gt;&lt;ol&gt;&lt;li&gt;&lt;strong&gt;Tisztítsd meg az áramot: &lt;/strong&gt;a villamos energiát egyre inkább megújulóból és atomból termeld, ne szénből/gázból.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Villamosíts mindent: &lt;/strong&gt;amit eddig fosszilissel hajtottál (autó, fűtés, ipari hő), állítsd át árammá – így a tiszta áram kiszorítja a fosszilist a gazdaság egészéből.&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;strong&gt;Miért épp így? &lt;/strong&gt;Mert egy elektromos motor vagy hőszivattyú sokkal hatékonyabb, mint egy benzinmotor vagy gázkazán. Ha az áram is tiszta, akkor az elektrifikáció kétszeresen nyer: kevesebb energiát használ, és azt is tisztábban.&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;&lt;h2&gt;3.1 A villamosenergia-igény robbanása&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A globális áramtermelés 2024-ben több mint 1 200 TWh-val (+4%) nőtt – jóval a 2010–2023-as átlag (2,6%) felett. A növekedés fő hajtói: az épületek (hűtés, adatközpontok), az EV-k és az ipar. A bővülő keresletet több mint 80%-ban megújuló és atom fedezte – vagyis a tiszta termelés egyre inkább lépést tart a növekedéssel.&lt;/p&gt;&lt;h2&gt;3.2 Közlekedés – az elektromos autók&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az elektromos autók eladása 2024-ben több mint 25%-kal nőtt, 17 millió darab fölé. A feltörekvő piacokon (Brazília, Indonézia) háromjegyű növekedés is volt. Az EV-k egyúttal rugalmasságot is hozhatnak a hálózatba (V2G, okos töltés – 7. lecke).&lt;/p&gt;&lt;h2&gt;3.3 Fűtés – a hőszivattyúk&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A hőszivattyú a gázkazán tiszta, hatékony alternatívája (a környezeti hőt „pumpálja” be árammal). Globálisan 2024-ben az eladás kissé visszaesett (–1%), Európában viszont jelentősen (–21%, főleg Németország és Franciaország miatt) – a magas áram-gáz árarány és a kiszámíthatatlan támogatások miatt.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A hőszivattyú-visszaesés jól mutatja az átmenet törékenységét: a technológia kész, de ha az árazás és a politika nem támogatja, a fogyasztó kivár. Az átmenet tehát nem csak mérnöki, hanem gazdasági és politikai kérdés is.&lt;/p&gt;&lt;h2&gt;3.4 Hidrogén és a nehéz szektorok&lt;/h2&gt;&lt;p&gt;Ami nehezen villamosítható (nehéz ipar – acél, vegyipar; hosszú távú hajózás, légi közlekedés), ott a &lt;strong&gt;zöld hidrogén&lt;/strong&gt; és származékai (e-üzemanyagok) jönnek szóba. Ezek ma drágák és alacsony hatásfokúak (7. lecke), de a teljes dekarbonizációhoz nélkülözhetetlenek lehetnek a „nehéz” szegmensekben.&lt;/p&gt;&lt;h2&gt;3.5 A fő kihívások&lt;/h2&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Hálózat: &lt;/strong&gt;a sok elosztott megújuló és az új fogyasztás (EV, hőszivattyú) miatt a hálózatot bővíteni és okosítani kell – ez gyakran szűkebb keresztmetszet, mint maga a termelés.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Rugalmasság és tárolás: &lt;/strong&gt;az időjárásfüggő termelés miatt egyre több tárolás és keresletoldali rugalmasság kell (7. lecke).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Nyersanyagok: &lt;/strong&gt;akkumulátorokhoz, hálózathoz kritikus nyersanyagok (lítium, réz, ritkaföldfémek) kellenek – ez új függőségeket teremthet.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Megfizethetőség és igazságosság: &lt;/strong&gt;az átállás költségei ne a sérülékeny háztartásokat sújtsák (vö. Szociális Klímaalap, 5. lecke).&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;4. Az átmenet kulcsszámai (2024)&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mutató&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Globális áramtermelés-növekedés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;+4% (&amp;gt;1 200 TWh)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;A növekedést fedező tiszta arány&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&amp;gt;80% (megújuló + atom)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;EV-eladás növekedése&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&amp;gt;25% (&amp;gt;17 millió db)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Hőszivattyú-eladás (globális / EU)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;–1% / –21%&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Áramfogyasztás-növekedés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~4,3% (2023: 2,5%)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Magyar és EU kitekintés&lt;/h1&gt;&lt;p&gt;Magyarországon az átmenet motorja a &lt;strong&gt;napenergia&lt;/strong&gt; és az &lt;strong&gt;atom&lt;/strong&gt; (Paks II); a kihívás a hálózat- és tárolásfejlesztés, a szélenergia feloldása, és az orosz fosszilis függőség oldása. EU-szinten a &lt;strong&gt;Fit for 55 / 2040-es célok&lt;/strong&gt; (5. lecke) jelölik ki az irányt. A közös tét: a háromszög – &lt;strong&gt;tiszta, biztonságos, megfizethető&lt;/strong&gt; – egyensúlyban tartása.&lt;/p&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Elektrifikáció&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Fosszilis felhasználások (közlekedés, fűtés, ipar) átállítása villamos energiára.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szektorintegráció&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az áram-, hő-, gáz- és közlekedési rendszerek összekapcsolt tervezése.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Hőszivattyú&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A környezeti hőt árammal hasznosító, hatékony fűtési technológia.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;e-üzemanyag&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Zöld hidrogénből és CO2-ből előállított szintetikus tüzelőanyag.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Kritikus nyersanyag&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az átmenethez nélkülözhetetlen anyag (lítium, réz, ritkaföldfémek).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Dekarbonizáció&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A gazdaság CO2-kibocsátásának fokozatos megszüntetése.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Igazságos átmenet&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az átállás terheinek méltányos elosztása, a sérülékenyek védelme.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;IEA – Global Energy Review 2025: Electricity (kereslet, tiszta arány) – &lt;a href=&quot;https://www.iea.org/reports/global-energy-review-2025/electricity&quot;&gt;https://www.iea.org/reports/global-energy-review-2025/electricity&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA – EV sales 2024 (Global EV Outlook) – &lt;a href=&quot;https://www.iea.org/reports/global-ev-outlook-2025&quot;&gt;https://www.iea.org/reports/global-ev-outlook-2025&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA / HPT – Heat pumps 2024 (globális és EU eladás) – &lt;a href=&quot;https://heatpumpingtechnologies.org/iea-global-energy-review-2025-main-takeaways-for-heat-pumps/&quot;&gt;https://heatpumpingtechnologies.org/iea-global-energy-review-2025-main-takeaways-for-heat-pumps/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA – Electricity 2025 (kereslet-növekedés) – &lt;a href=&quot;https://www.iea.org/reports/electricity-2025/demand&quot;&gt;https://www.iea.org/reports/electricity-2025/demand&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: ez a lecke több jövőre vonatkozó becslést és trendet tartalmaz – ezek a technológia, a politika és a gazdaság függvényében változhatnak. A tényadatok 2024-esek.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Ezzel a 9 részes alapozó sorozat teljes. Lehetséges folytatás: elmélyülő modulok (pl. hálózati részletek, finanszírozás, konkrét hazai projektek), illetve a teljes anyagot átfogó vizsgakikérdező.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-10&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;10. lecke – Nukleáris energia és a Paks-sztori&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Hogyan működik az atomenergia, és miért a magyar rendszer gerince?&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. július 2. • Adatok: 2024–2026 • Szint: haladó&lt;/p&gt;
&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; = forrással igazolt adat; &lt;strong&gt;BECSLÉS&lt;/strong&gt; = közelítő nagyságrend; &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt; = értelmezés. Ez a lecke épít az 1. leckére (energiamix) és a 3. leckére (villamosenergia-rendszer): az atomerőmű egy &lt;em&gt;alaperőmű&lt;/em&gt;, amely folyamatosan, időjárástól függetlenül termel.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;
&lt;p&gt;A nukleáris energia a világ áramtermelésének &lt;strong&gt;~9%-át&lt;/strong&gt; adja, és az egyik legkisebb szén-dioxid-kibocsátású, időjárástól független termelési mód. Magyarországon kulcsszerepe van: a &lt;strong&gt;Paksi Atomerőmű&lt;/strong&gt; négy blokkja a hazai villamosenergia-termelés kb. &lt;strong&gt;46–47%-át&lt;/strong&gt; adja. A bővítés, a &lt;strong&gt;Paks II&lt;/strong&gt; (két új, orosz VVER-1200 blokk), 2026 februárjában lépett a fizikai építés szakaszába, és a 2030-as évek elején csatlakozhat a hálózatra. Az atomenergia stabil, olcsó áramot ígér, de nagy beruházási költséggel, hosszú megtérüléssel, hulladékkezelési feladattal és – Paks II esetében – orosz technológiai és pénzügyi függőséggel jár.&lt;/p&gt;

&lt;h1&gt;2. Egyszerű magyarázat – mi történik egy atomerőműben?&lt;/h1&gt;
&lt;p&gt;Az atomerőmű valójában egy nagyon kifinomult &lt;strong&gt;gőzgép&lt;/strong&gt;. A különbség a hőforrásban van: nem szenet vagy gázt égetnek, hanem az &lt;strong&gt;urán atommagjait hasítják&lt;/strong&gt; (maghasadás, fisszió). Egy urán-235 atommag hasadásakor rengeteg hő szabadul fel, ez felforralja a vizet, a gőz megpörget egy turbinát, a turbina a generátort, a generátor pedig áramot termel.&lt;/p&gt;
&lt;p&gt;Három kört érdemes megjegyezni a nyomottvizes reaktoroknál (ilyen Paks is): a &lt;strong&gt;primer kör&lt;/strong&gt; (a reaktort hűtő, radioaktív víz nyomás alatt), a &lt;strong&gt;szekunder kör&lt;/strong&gt; (itt keletkezik a turbinát hajtó gőz), és a &lt;strong&gt;hűtőkör&lt;/strong&gt; (a Duna vize viszi el a maradékhőt). A körök el vannak választva egymástól – ez biztonsági és sugárvédelmi szempontból is fontos.&lt;/p&gt;

&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;
&lt;h2&gt;3.1 Globális kép&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;2024-ben a világ ~&lt;strong&gt;440 működő reaktora&lt;/strong&gt; (az IAEA szigorúbb számítása szerint 421 üzemelő egység, ~377 GWe) kb. &lt;strong&gt;2617–2667 TWh&lt;/strong&gt; áramot termelt, ami a globális áramtermelés &lt;strong&gt;~9%-a&lt;/strong&gt;. Ez abszolút értékben rekord, de az arány az 1990-es évek közepi ~17%-ról csökkent, mert az összfogyasztás gyorsabban nőtt. (Forrás: World Nuclear Association; IAEA PRIS.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;Az atomenergia „reneszánszáról” sokat írnak (SMR-ek, élettartam-hosszabbítások, új kínai/orosz projektek), de a globális arány érdemi növekedéséhez évtizedes, tőkeigényes építkezés kell. A trend inkább a meglévő flotta megtartása és lassú bővülés, nem robbanásszerű növekedés.&lt;/p&gt;

&lt;h2&gt;3.2 A nukleáris technológia jellemzői&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Alaperőmű: &lt;/strong&gt;folyamatosan, magas kihasználtsággal (kapacitásfaktor jellemzően 80–90%) termel, időjárástól függetlenül – kiegészíti az ingadozó napot és szelet.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Alacsony üzemi kibocsátás: &lt;/strong&gt;a termelés során nincs CO₂-kibocsátás; életciklus-alapon a legalacsonyabbak közé tartozik.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Üzemanyagciklus: &lt;/strong&gt;uránérc bányászata → dúsítás → fűtőelem-gyártás → reaktorban „kiégetés” → &lt;strong&gt;kiégett fűtőelem&lt;/strong&gt; átmeneti, majd végleges tárolása.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Hulladék: &lt;/strong&gt;kis mennyiségű, de hosszú élettartamú nagy aktivitású hulladék keletkezik; kezelése műszakilag megoldott, de politikailag és költségileg érzékeny.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Kockázat: &lt;/strong&gt;ritka, de nagy következményű balesetek lehetősége (Csernobil 1986, Fukusima 2011) – ezért rendkívül szigorú a szabályozás és a védelmi rendszerek redundanciája.&lt;/li&gt;
&lt;/ul&gt;

&lt;h2&gt;3.3 Magyar szint – a Paksi Atomerőmű (Paks I)&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A Paksi Atomerőmű &lt;strong&gt;négy VVER-440 típusú&lt;/strong&gt; (szovjet tervezésű, nyomottvizes) blokkja 1982 és 1987 között indult, összesített teljesítménye a korszerűsítések után kb. &lt;strong&gt;2000 MW&lt;/strong&gt;. 2024-ben mintegy &lt;strong&gt;16 TWh&lt;/strong&gt;-t termelt, ami a hazai bruttó villamosenergia-termelés &lt;strong&gt;~46,7%-a&lt;/strong&gt;. A blokkok üzemidejét eredetileg 30 évre tervezték, ezt 20 évvel meghosszabbították, és további hosszabbítás is napirenden van. (Forrás: MAVIR/MEKH éves adatok; Paksi Atomerőmű Zrt.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A kiégett fűtőelemek átmeneti tárolása a paksi telephelyen lévő &lt;strong&gt;KKÁT&lt;/strong&gt; (Kiégett Kazetták Átmeneti Tárolója) létesítményben történik, a kis és közepes aktivitású hulladékot a &lt;strong&gt;bátaapáti&lt;/strong&gt; Nemzeti Radioaktívhulladék-tárolóban helyezik el. (Forrás: RHK Kft.)&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Miért fontos? &lt;/strong&gt;Mivel egyetlen telephely adja a hazai termelés közel felét, Paks bármely blokkjának karbantartása vagy kényszerű visszaterhelése (pl. a Duna nyári felmelegedésekor – lásd a 2026. júniusi eseményeket) érezhetően megnöveli az importigényt és a nagykereskedelmi árat.&lt;/p&gt;

&lt;h2&gt;3.4 A bővítés – Paks II&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A Paks II projekt egy 2014-es magyar–orosz kormányközi megállapodáson alapul: két &lt;strong&gt;VVER-1200&lt;/strong&gt; típusú, egyenként ~1200 MW-os blokk (5. és 6. blokk), összesen kb. &lt;strong&gt;2400 MW&lt;/strong&gt;, a &lt;strong&gt;Roszatom&lt;/strong&gt; fővállalkozásában. A becsült összköltség induláskor kb. &lt;strong&gt;12,5 milliárd euró&lt;/strong&gt;, amelyhez Oroszország &lt;strong&gt;legfeljebb 10 milliárd eurós&lt;/strong&gt; államközi hitelt nyújt (a beruházás ~80%-a). (Forrás: World Nuclear News; Wikipedia – Paks II; Balkan Green Energy News.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az &lt;strong&gt;első betonozás&lt;/strong&gt; az 5. blokk alaplemezénél &lt;strong&gt;2026. február 5-én&lt;/strong&gt; kezdődött, a betonozási munkák a tervek szerint 2026 végéig folytatódnak. A hálózatra csatlakozás célja a &lt;strong&gt;2030-as évek eleje&lt;/strong&gt;. (Forrás: World Nuclear News; Rosatom.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY / kritikus nézőpontok: &lt;/strong&gt;A projekt körül élénk vita zajlik. Támogatói szerint a bővítés az ellátásbiztonság és a klímacélok szempontjából elengedhetetlen, olcsó alaptermelést ad, és csökkenti az importfüggőséget. Bírálói a jelentős &lt;strong&gt;csúszásokat&lt;/strong&gt;, a becsült &lt;strong&gt;költségek emelkedését&lt;/strong&gt; (egyes elemzések 8–9000 milliárd forint körüli összköltséget említenek – ez BECSLÉS, nem hivatalos), az &lt;strong&gt;orosz technológiai és pénzügyi függőséget&lt;/strong&gt;, valamint a hulladékkezelés hosszú távú költségeit emelik ki. A 2026-os új kormány felülvizsgálatot jelentett be a szerződésekről. Mindkét oldal érvei legitimek – a végső mérleg a tényleges költségtől és határidőtől függ.&lt;/p&gt;

&lt;h1&gt;4. Kulcsszámok egy lapon&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mutató&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szint&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Nukleáris részarány az áramtermelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~9%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Globális (2024)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Működő reaktorok száma&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~440 (IAEA: 421)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Globális&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Paks I teljesítménye&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~2000 MW (4× VVER-440)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Paks részaránya a hazai termelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~46–47%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország (2024)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Paks II teljesítménye&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~2400 MW (2× VVER-1200)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Paks II becsült költsége&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~12,5 Mrd EUR (orosz hitel ≤10 Mrd)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Első betonozás / hálózatra kötés&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2026. feb. / 2030-as évek eleje&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;&lt;/table&gt;

&lt;h1&gt;5. Valós példák&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Nyári hőség: &lt;/strong&gt;2026 júniusában a Duna felmelegedése miatt Paksot vissza kellett terhelni, mert a hűtővíz visszaengedési hőmérsékletére környezetvédelmi korlát van – a miniszter végül rendkívüli felmentést adott az ellátásbiztonságra hivatkozva.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Alaptermelés vs. napközép: &lt;/strong&gt;egy napsütéses délben a nap termel sokat, este viszont a nap „elmegy”, és ilyenkor Paks stabil termelése tartja a rendszert – jól látszik, miért kell az alaperőmű a megújulók mellé.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Blokkleállás hatása: &lt;/strong&gt;egy paksi blokk (~500 MW) karbantartása azonnal növeli a nettó importot, hiszen egyetlen egység a hazai fogyasztás jelentős hányadát fedezi.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;6. Gyakori tévhitek&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;„Az atomerőmű felrobbanhat, mint egy bomba.” &lt;/strong&gt;Nem – a reaktorban lévő urán dúsítása töredéke a fegyverekének; a kockázat a hűtés elvesztése és az olvadás, nem nukleáris robbanás.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A gőzoszlop füst / szennyezés.” &lt;/strong&gt;A hűtőtornyokból jellemzően vízpára távozik, nem füst.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A nukleáris hulladék kezelhetetlen.” &lt;/strong&gt;Mennyisége kicsi, kezelése műszakilag megoldott (átmeneti + végleges tárolás); a kihívás inkább a nagyon hosszú távú felügyelet és a költség.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Maghasadás (fisszió)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Nehéz atommag (pl. U-235) kettéhasadása, miközben hő és neutronok szabadulnak fel.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;VVER&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Szovjet/orosz tervezésű nyomottvizes reaktortípus (Paks I: VVER-440, Paks II: VVER-1200).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Alaperőmű&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Folyamatosan, magas kihasználtsággal termelő erőmű (atom, korábban szén).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Kapacitásfaktor&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A tényleges éves termelés aránya a névleges maximumhoz; atomnál jellemzően 80–90%.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Üzemanyagciklus&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az urán útja a bányászattól a dúsításon és „kiégetésen” át a hulladéktárolásig.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;KKÁT / RHK&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Kiégett Kazetták Átmeneti Tárolója Pakson; az RHK Kft. kezeli a hazai radioaktív hulladékot.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;&lt;/table&gt;

&lt;p&gt;&lt;em&gt;Megjegyzés: a Paks II költség- és határidő-adatai forrásonként és időben változnak; a hivatalos végösszeg a beruházás lezárásakor lesz ismert.&lt;/em&gt;&lt;/p&gt;
&lt;/template&gt;
&lt;template id=&quot;lesson-11&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;11. lecke – Nap- és szélenergia a gyakorlatban&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Az időjárásfüggő megújulók: technológia, magyar boom, hálózati kihívások&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. július 2. • Adatok: 2024–2026 • Szint: haladó&lt;/p&gt;
&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; / &lt;strong&gt;BECSLÉS&lt;/strong&gt; / &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt;. Ez a lecke épít a 7. leckére (energiatárolás) és a 3. leckére (rendszerirányítás): a nap és a szél &lt;em&gt;időjárásfüggő&lt;/em&gt;, ezért a rugalmasság (tárolás, kereslet, hálózat) kulcskérdés.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;
&lt;p&gt;A nap- és szélenergia a világ leggyorsabban növekvő, ma már legolcsóbb új áramtermelési módja. Az EU-ban 2025-ben a &lt;strong&gt;szél és nap együtt (30%)&lt;/strong&gt; először termelt többet, mint az összes fosszilis forrás (29%). Magyarország a &lt;strong&gt;napenergiában&lt;/strong&gt; világszinten élen jár: a beépített napelemes kapacitás &lt;strong&gt;8 GW fölé&lt;/strong&gt; nőtt, és a napenergia 2024 első felében a hazai termelés &lt;strong&gt;~25%-át&lt;/strong&gt; adta. Ezzel szemben a &lt;strong&gt;szélenergia&lt;/strong&gt; gyakorlatilag befagyott &lt;strong&gt;~329 MW-on&lt;/strong&gt; egy 2016 óta fennálló, szigorú szabályozás miatt – ezen most kezd oldani a 2025-ös új rendelet. A fő kihívás nem a termelés, hanem az &lt;strong&gt;ingadozás kezelése&lt;/strong&gt;: tárolás, hálózatfejlesztés és rugalmas fogyasztás.&lt;/p&gt;

&lt;h1&gt;2. Egyszerű magyarázat&lt;/h1&gt;
&lt;p&gt;A &lt;strong&gt;napelem (fotovoltaikus, PV)&lt;/strong&gt; a fényt közvetlenül árammá alakítja, mozgó alkatrész nélkül. Akkor termel, ha süt a nap – délben sokat, este semmit, télen kevesebbet. A &lt;strong&gt;szélturbina&lt;/strong&gt; a szél mozgási energiáját alakítja árammá egy forgó rotoron keresztül; akkor termel, ha fúj a szél – ez gyakran éppen télen és éjjel erősebb, tehát &lt;em&gt;kiegészíti&lt;/em&gt; a napot.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Kulcsfogalom – időjárásfüggőség: &lt;/strong&gt;egyik forrás termelését sem lehet „bekapcsolni” igény szerint. Ezért beszélünk &lt;strong&gt;változó (variábilis) megújulóról&lt;/strong&gt;: a rendszernek kell alkalmazkodnia hozzájuk tárolással, rugalmas erőművekkel, importtal-exporttal és a fogyasztás időzítésével.&lt;/p&gt;

&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;
&lt;h2&gt;3.1 Technológia és költség&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az elmúlt évtizedben a napelemek és a szélturbinák költsége drámaian csökkent; a nagy naperőművek és a szárazföldi szél ma a &lt;strong&gt;legolcsóbb új áramtermelés&lt;/strong&gt; a legtöbb piacon (LCOE-alapon). (Forrás: IRENA – Renewable Power Generation Costs; Ember.)&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Napelem: &lt;/strong&gt;skálázható a tetőtől (pár kW) a nagy naperőműparkig (több száz MW); gyorsan telepíthető, kevés karbantartás.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Szél: &lt;/strong&gt;szárazföldi (onshore) és tengeri (offshore); nagyobb egységteljesítmény, de helyfüggő (kell a jó szélviszony) és engedélyezése lassabb.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Kapacitásfaktor: &lt;/strong&gt;napelem Magyarországon jellemzően ~11–13%, szárazföldi szél ~25–30% – ezért a beépített MW-ok nem hasonlíthatók közvetlenül az atom/gáz MW-jaihoz.&lt;/li&gt;
&lt;/ul&gt;

&lt;h2&gt;3.2 Magyar napenergia – a boom&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A hazai beépített napelemes kapacitás 2025 novemberére elérte a &lt;strong&gt;~8,2 GW&lt;/strong&gt;-ot, 2026 elejére a &lt;strong&gt;~8,37 GW&lt;/strong&gt;-ot, és a 2026 tavaszi közlések már &lt;strong&gt;8,6 GW&lt;/strong&gt; fölötti értékről szólnak. A napenergia 2024 első felében a hazai villamosenergia-termelés &lt;strong&gt;~24,9%-át&lt;/strong&gt; adta, amivel Magyarország a világ élvonalába került a napenergia termelési részaránya tekintetében. A háztartási méretű, tetőre szerelt rendszerek egyre nagyobbak: a termelés ~8,4%-át adják, és a teljes fogyasztás ~6,5%-át fedezik. (Forrás: MEKH/MAVIR; Magyar Napelem Napkollektor Szövetség; Világgazdaság.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A magyar napelem-boomot részben a kedvező támogatások (korábbi szaldós elszámolás, majd bruttó elszámolás és a KÁT/METÁR-rendszer) és a magas lakossági motiváció hajtották. A siker ugyanakkor új problémát szült: napos délidőben a rendszer többlettel küzd, gyakoribbak a &lt;strong&gt;negatív árak&lt;/strong&gt; és a &lt;strong&gt;termeléskorlátozás (curtailment)&lt;/strong&gt;.&lt;/p&gt;

&lt;h2&gt;3.3 Magyar szélenergia – a befagyott piac&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A hazai szélerőművi kapacitás &lt;strong&gt;~329 MW&lt;/strong&gt; (0,33 GW), ami a termelés alig ~1%-a, és 2016 óta gyakorlatilag nem bővült. Ennek fő oka egy szigorú szabályozás (pl. lakott területtől való nagy védőtávolság), amely de facto megállította az új projekteket. Összehasonlításul az EU szélkapacitása ~236 GW. (Forrás: Pénzcentrum; MEKH.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;2025 végén az energiaügyi miniszter &lt;strong&gt;35/2025. (EM) rendelete&lt;/strong&gt; „könnyített térségeket” jelölt ki (nyolc járás az északnyugati országrészben, a Kisalföld térségében), ahol egyszerűbb lehet szélerőművet telepíteni. 2026-ban a &lt;strong&gt;MEKH országos felmérést&lt;/strong&gt; indított a tervezett szélberuházásokról (a beadási határidő július 8.). (Forrás: Magyar Közlöny; MEKH; Portfolio.)&lt;/p&gt;

&lt;h2&gt;3.4 Miért nehéz a hálózatnak? – a „kacsagörbe”&lt;/h2&gt;
&lt;p&gt;Napos napokon a délutáni napcsúcs után gyorsan zuhan a napelemes termelés, miközben este megugrik a fogyasztás. Az így kialakuló meredek görbét „&lt;strong&gt;kacsagörbének&lt;/strong&gt;” hívják. A rendszernek pár óra alatt sok gáz-, víz- vagy importkapacitást kell mozgósítania – ezért kritikus a 7. leckében tárgyalt &lt;strong&gt;energiatárolás&lt;/strong&gt; és a rugalmas kereslet. A 2026 nyári hőhullám alatt jól látszott: az esti csúcsban (18–21 óra), amikor a nap már „elment”, a nagykereskedelmi ár akár 800–1000 EUR/MWh-ig ugrott.&lt;/p&gt;

&lt;h1&gt;4. Kulcsszámok egy lapon&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mutató&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szint&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szél + nap az áramtermelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;30% (&amp;gt; fosszilis 29%)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;EU (2025)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Napelem beépített kapacitás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~8,4–8,6 GW&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország (2025–26)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Napenergia részaránya a termelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~25% (2024 H1)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Háztartási PV a fogyasztásból&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~6,5%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szélerőművi kapacitás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~329 MW (~1%)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Napelem / szél kapacitásfaktor&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~11–13% / ~25–30%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország (BECSLÉS)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;&lt;/table&gt;

&lt;h1&gt;5. Valós példák&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Tavaszi napos vasárnap: &lt;/strong&gt;alacsony fogyasztás + magas naptermelés → a nagykereskedelmi ár akár negatívba fordul, a naperőműveket vissza kell szabályozni.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Nyári esti csúcs: &lt;/strong&gt;a nap „elmegy”, a klímák mennek → ár- és importugrás; ez mutatja, miért kell tárolás.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Kisalföldi szélprojekt: &lt;/strong&gt;a 35/2025 rendelet után újra érdemes lehet szélparkot tervezni ott, ahol jó a szél és van hálózati kapacitás – a MEKH felmérés ezt méri fel.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;6. Gyakori tévhitek&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;„A napelem télen nem termel.” &lt;/strong&gt;Termel, csak kevesebbet; a hidegben a panel hatásfoka akár jobb is, csak rövidebb a nappal.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„8 GW napelem = 8 GW atom.” &lt;/strong&gt;Nem: a kapacitásfaktor miatt 8 GW napelem éves energiában nagyjából egy ~2000 MW-os, folyamatosan termelő atomerőmű nagyságrendjét adja, de nagyon egyenetlen időbeli eloszlással.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A megújuló mindig olcsóbbá teszi az áramot.” &lt;/strong&gt;Termelési költségben igen, de a rendszerköltségek (tárolás, hálózat, tartalék) és a torz díjstruktúra miatt a végső ár nem feltétlenül csökken – lásd a magyar ipari árak vitáját.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Fotovoltaikus (PV)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Napelem, amely a fényt közvetlenül árammá alakítja.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Változó (variábilis) megújuló&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Időjárásfüggő, nem vezérelhető termelés (nap, szél).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Kapacitásfaktor&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A tényleges éves termelés aránya a névleges maximumhoz.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Curtailment&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Termeléskorlátozás, amikor több a termelés, mint amennyit a rendszer fogadni tud.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Kacsagörbe&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A napcsúcs utáni meredek esti felfutás a maradék (nettó) terhelésben.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;KÁT / METÁR&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Kötelező átvételi, illetve megújuló támogatási rendszerek Magyarországon.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;&lt;/table&gt;

&lt;/template&gt;
&lt;template id=&quot;lesson-12&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;12. lecke – Rendszerirányítás és kiegyenlítő piacok&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Hogyan tartják a hálózatot másodpercről másodpercre egyensúlyban?&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. július 2. • Adatok: 2024–2026 • Szint: haladó&lt;/p&gt;
&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; / &lt;strong&gt;BECSLÉS&lt;/strong&gt; / &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt;. Ez a lecke a 3. lecke (villamosenergia-rendszer) folytatása, és összeér a 4. leckével (piacok): a kiegyenlítés egyszerre műszaki feladat és piac.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;
&lt;p&gt;A villamosenergia-rendszerben a termelésnek és a fogyasztásnak &lt;strong&gt;minden pillanatban egyeznie kell&lt;/strong&gt;, különben eltér a hálózati &lt;strong&gt;frekvencia&lt;/strong&gt; az 50 Hz-től. Ezt az egyensúlyt a &lt;strong&gt;rendszerirányító (TSO)&lt;/strong&gt; – Magyarországon a &lt;strong&gt;MAVIR&lt;/strong&gt; – biztosítja, úgynevezett &lt;strong&gt;tartalékok&lt;/strong&gt; (FCR, aFRR, mFRR) aktiválásával. Ezek adásvétele a &lt;strong&gt;kiegyenlítő (balancing) piacon&lt;/strong&gt; zajlik. Európa most közös platformokba köti össze ezeket a piacokat: a &lt;strong&gt;PICASSO&lt;/strong&gt; (aFRR) és a &lt;strong&gt;MARI&lt;/strong&gt; (mFRR) platformhoz a MAVIR &lt;strong&gt;2026. szeptember 30-án&lt;/strong&gt; csatlakozik. A jó ösztönzők nélkül a kiegyenlítés extrém árakat is okozhat – ez élő magyar téma.&lt;/p&gt;

&lt;h1&gt;2. Egyszerű magyarázat – az 50 Hz mint mérleg&lt;/h1&gt;
&lt;p&gt;Képzeld el a hálózatot egy hatalmas, közös tengelyen forgó rendszerként. Ha többet termelnek, mint amennyit fogyasztanak, a „tengely” gyorsul → a frekvencia 50 Hz fölé megy. Ha kevesebbet termelnek, lassul → 50 Hz alá esik. A frekvencia tehát egy &lt;strong&gt;valós idejű mérleg&lt;/strong&gt;: azonnal megmutatja, van-e egyensúly. A rendszerirányító feladata, hogy ezt a mérleget másodpercről másodpercre kiegyenlítse.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Miért fontos? &lt;/strong&gt;Ha a frekvencia túl messze kerül 50 Hz-től, erőművek eshetnek ki, ami láncreakcióban akár &lt;strong&gt;áramkimaradáshoz (blackout)&lt;/strong&gt; vezethet. Ezért a kiegyenlítés nem opció, hanem az ellátásbiztonság alapja.&lt;/p&gt;

&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;
&lt;h2&gt;3.1 A tartalékok hierarchiája&lt;/h2&gt;
&lt;p&gt;A tartalékokat aszerint csoportosítjuk, milyen gyorsan lépnek be:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;FCR – primer (frekvenciatartás): &lt;/strong&gt;másodperceken belül, automatikusan reagál minden résztvevő erőmű; megállítja a frekvencia elszaladását. (Az egész szinkronterületen közösen.)&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;aFRR – szekunder (automatikus frekvencia-helyreállítás): &lt;/strong&gt;a rendszerirányító automatikus jele alapján, jellemzően fél percen belül visszaállítja a frekvenciát 50 Hz-re. Ez a &lt;strong&gt;PICASSO&lt;/strong&gt; platform terméke.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;mFRR – tercier (manuálisan aktivált tartalék): &lt;/strong&gt;a diszpécser kézzel hívja le percek alatt, a nagyobb, tartósabb eltérésekre. Ez a &lt;strong&gt;MARI&lt;/strong&gt; platform terméke.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;RR – helyettesítő tartalék: &lt;/strong&gt;a leghosszabb reakcióidejű, az elhasznált gyorsabb tartalékok visszatöltésére.&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;strong&gt;Analógia: &lt;/strong&gt;FCR = a reflex (azonnal), aFRR = az automatikus tempomat (folyamatosan korrigál), mFRR = a sofőr tudatos beavatkozása (ha tartós a probléma).&lt;/p&gt;

&lt;h2&gt;3.2 Kiegyenlítő energia vs. kiegyenlítő kapacitás&lt;/h2&gt;
&lt;p&gt;Két dolgot vásárol a rendszerirányító: &lt;strong&gt;kapacitást&lt;/strong&gt; (rendelkezésre állást – „legyél készenlétben”) és &lt;strong&gt;energiát&lt;/strong&gt; (a ténylegesen lehívott mennyiséget – „most termelj/csökkents”). A mérlegkör-felelősök (&lt;strong&gt;BRP&lt;/strong&gt;-k) menetrendet adnak; ha eltérnek tőle, &lt;strong&gt;kiegyenlítő díjat (imbalance)&lt;/strong&gt; fizetnek vagy kapnak. Ez az ösztönző tereli a piacot az egyensúly felé.&lt;/p&gt;

&lt;h2&gt;3.3 Európai integráció – PICASSO és MARI&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A &lt;strong&gt;PICASSO&lt;/strong&gt; (aFRR) és a &lt;strong&gt;MARI&lt;/strong&gt; (mFRR) az EU közös, határkeresztező kiegyenlítőenergia-platformjai, amelyek egyetlen európai piacba kötik a nemzeti tartalékokat – így olcsóbban és hatékonyabban lehet kiegyenlíteni. A MAVIR IT-fejlesztései 2026. március 31-re készülnek el, ezt tesztidőszak követi, és a &lt;strong&gt;csatlakozás időpontja 2026. szeptember 30.&lt;/strong&gt; (Forrás: MAVIR; CEENERGYNEWS; ENTSO-E PICASSO/MARI dokumentumok.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY / kritikus pont: &lt;/strong&gt;Egy Montel-elemzés szerint a magyar kiegyenlítési ösztönzők korábban hozzájárultak &lt;strong&gt;extrém árkiugrásokhoz&lt;/strong&gt;: ha a szabályok rosszul árazzák az eltéréseket, a piac büntetheti vagy éppen jutalmazhatja a „rossz” viselkedést. Az európai platformokhoz csatlakozás célja részben épp az árazás és a likviditás javítása.&lt;/p&gt;

&lt;h2&gt;3.4 A rendszerbiztonság további eszközei&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;N–1 elv: &lt;/strong&gt;a rendszernek egyetlen elem (pl. egy vezeték vagy egy blokk) kiesését is el kell viselnie összeomlás nélkül.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Tehetetlenség (inertia): &lt;/strong&gt;a nagy forgó gépek (atom, gáz, víz) „lendkerékként” lassítják a frekvencia változását; sok napelem mellett ez csökken, ami új kihívás.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Feketeindítás (black start): &lt;/strong&gt;képesség a hálózat újraindítására teljes áramkimaradás után.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Rendszerterhelési rekord: &lt;/strong&gt;a 2026. júniusi hőhullámban a magyar bruttó rendszerterhelés 7488 MW-ra ugrott – a MAVIR ilyenkor tartalékokkal és importtal tartja az egyensúlyt.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;4. Kulcsszámok / tények egy lapon&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Elem&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jellemző&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Névleges frekvencia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;50 Hz (kontinentális Európa)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;FCR (primer)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;másodpercek, automatikus, közös&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;aFRR (szekunder) – PICASSO&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~fél perc, automatikus jelre&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;mFRR (tercier) – MARI&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;percek, kézi lehívás&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;MAVIR csatlakozás PICASSO/MARI&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2026. szeptember 30.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Magyar nyári terhelési rekord&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;7488 MW (2026. jún.)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;&lt;/table&gt;

&lt;h1&gt;5. Valós példák&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Felhő átvonul: &lt;/strong&gt;egy nagy naperőműparknál percek alatt esik a termelés → az aFRR (PICASSO) automatikusan pótolja a hiányt, hogy a frekvencia ne essen.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Blokk-kiesés: &lt;/strong&gt;ha egy nagy erőmű váratlanul leáll, előbb az FCR fogja meg a frekvenciát, majd az mFRR (MARI) veszi át a tartós pótlást.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Menetrendtől eltérő fogyasztás: &lt;/strong&gt;egy nagy ipari fogyasztó rosszul jósolja a fogyasztását → kiegyenlítő díjat fizet; ez ösztönzi a pontos tervezésre.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;6. Gyakori tévhitek&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;„Az áramot tárolják a hálózatban.” &lt;/strong&gt;Nem – a hálózat nem tároló; a termelésnek és fogyasztásnak folyamatosan egyeznie kell (a tárolás külön eszköz, lásd 7. lecke).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A rendszerirányító termel áramot.” &lt;/strong&gt;A MAVIR nem termel; koordinál, tartalékot vásárol és a hálózatot egyensúlyban tartja.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A frekvencia mellékes.” &lt;/strong&gt;Ellenkezőleg: a frekvencia az egyensúly valós idejű mérője; eltérése azonnali beavatkozást igényel.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Frekvencia (50 Hz)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A váltakozó áram lüktetésének üteme; az egyensúly valós idejű jelzője.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;FCR / aFRR / mFRR&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Primer / szekunder / tercier tartalék – növekvő reakcióidővel.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;PICASSO / MARI&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az EU közös aFRR, illetve mFRR kiegyenlítő platformjai.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;BRP (mérlegkör-felelős)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A menetrendjéért és eltéréseiért pénzügyileg felelős piaci szereplő.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Kiegyenlítő díj (imbalance)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A menetrendtől való eltérés ára; ösztönző a pontosságra.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Tehetetlenség (inertia)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A forgó gépek stabilizáló hatása a frekvenciára.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;&lt;/table&gt;

&lt;h1&gt;8. Források&lt;/h1&gt;
