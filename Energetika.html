:root{--blue:#1F4E79;--blue2:#2E5496;--light:#D9E2F3;--grey:#5b6472;--green:#2E7D32;--red:#B22222;--amber:#B8860B;--bg:#eef1f7;--card:#fff;--line:#e2e7f1}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:&#x27;Segoe UI&#x27;,system-ui,Arial,sans-serif;background:var(--bg);color:#1c2230;line-height:1.55}
button{font-family:inherit}
/* layout */
.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(31,78,121,.25)}

.side h2{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--grey);margin:6px 8px 10px}

.navnum{flex:none;width:26px;height:26px;border-radius:50%;background:var(--light);color:var(--blue);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.navitem.active .navnum{background:#fff;color:var(--blue)}

.lesson{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:26px 30px;box-shadow:0 2px 10px rgba(0,0,0,.04);overflow:hidden}
.quizwrap{position:sticky;top:70px}

.lesson h1{font-size:19px;color:var(--blue);border-bottom:2px solid var(--light);padding-bottom:6px;margin:22px 0 12px}
.lesson h1:first-child{margin-top:0}
.lesson h2{font-size:16px;color:var(--blue2);margin:18px 0 8px}
.lesson p{margin:9px 0}
.lesson ul,.lesson ol{margin:9px 0 9px 4px;padding-left:22px}
.lesson li{margin:5px 0}
.lesson a{color:var(--blue2);word-break:break-word}
.lesson table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px}
.lesson th,.lesson td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top}
.lesson thead th,.lesson table tr:first-child th{background:var(--light);color:var(--blue);font-weight:700}
.lesson table p{margin:0}
.lbl{padding:1px 7px;border-radius:6px;font-size:12px;letter-spacing:.3px}
.lbl-teny,.lbl-fact{background:#e8f5e9;color:var(--green)}

.lbl-velemeny,.lbl-opinion{background:#eef;color:var(--blue2)}
.lbl-asszumpcio{background:#f3e8ff;color:#7b3fa0}

.qcard{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}

.qhead .t{font-size:15px;font-weight:700}
.qhead .s{font-size:12px;opacity:.9}
.tabs{display:flex;gap:6px;padding:12px 14px 0}
.tab{flex:1;border:none;background:#eaeef7;color:var(--blue);font-weight:600;font-size:14px;padding:9px;border-radius:9px 9px 0 0;cursor:pointer}
.tab.active{background:var(--blue);color:#fff}
.panel{display:none;padding:14px}
.panel.active{display:block}
.bar{background:#eaeef7;border-radius:8px;height:8px;overflow:hidden;margin:2px 0 14px}
.bar&gt;div{height:100%;background:var(--blue);width:0;transition:width .3s}
.q .meta{font-size:11px;color:var(--grey);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.q .meta.rev{color:var(--amber)}
.q h3{margin:6px 0 13px;font-size:15.5px}
.opt{display:block;width:100%;text-align:left;border:1.5px solid #d8def0;background:#fbfcff;border-radius:9px;padding:10px 13px;margin-bottom:8px;cursor:pointer;font-size:14px}
.opt:hover:not(:disabled){border-color:var(--blue);background:#f0f4fd}
.opt:disabled{cursor:default}
.opt.correct{border-color:var(--green);background:#e8f5e9}
.opt.wrong{border-color:var(--red);background:#fdecec}
.exp{margin-top:9px;font-size:13px;background:#f3f6fc;border-left:4px solid var(--blue);padding:9px 11px;border-radius:6px;display:none}
.exp.show{display:block}
.controls{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
.btn{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
.btn.ghost{background:#eaeef7;color:var(--blue)}
.btn:disabled{opacity:.4;cursor:default}
.score{font-weight:700;color:var(--blue);font-size:13px}
.result{text-align:center;padding:22px 10px}
.result .big{font-size:38px;font-weight:800;color:var(--blue);margin:4px 0}
.fc{perspective:1200px;margin-bottom:12px}
.fc-inner{position:relative;transition:transform .5s;transform-style:preserve-3d;min-height:150px}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;padding:18px;display:flex;align-items:center;justify-content:center;text-align:center}
.fc-front{background:var(--blue);color:#fff;font-size:18px;font-weight:700}
.fc-back{background:#fff;color:#1c2230;font-size:14px;transform:rotateY(180deg);border:2px solid var(--light)}
.fc-hint{position:absolute;bottom:7px;right:11px;font-size:10.5px;opacity:.6}
.fcnav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.fcnav span{color:var(--grey);font-size:13px}
.overlay{display:none}

&lt;template id=&quot;lesson-1&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;1. lecke – Bevezetés és tájékozódás&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;A globális energiarendszertől a magyar energiapiacig&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 17.  •  Adatok: 2024–2025  •  Szint: alapozó&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd ezt az anyagot?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Ez a sorozat első, alapozó leckéje. Célja, hogy egységes fogalmi térképet adjon, mielőtt mélyebb témákba megyünk. A leckékben a következő jelöléseket használom: &lt;strong&gt;TÉNY&lt;/strong&gt; = forrással igazolt adat;  &lt;strong&gt;BECSLÉS&lt;/strong&gt; = közelítő nagyságrend;  &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt; = értelmezés, nem tény. A számok mellett mindig ott a forrás.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;&lt;strong&gt;Az energia minden gazdaság alapja. &lt;/strong&gt;A világ ma is döntően fosszilis tüzelőanyagokból (kőolaj, földgáz, szén) fedezi az energiaszükségletét – 2024-ben a globális primerenergia &lt;strong&gt;81,5%-a&lt;/strong&gt; volt fosszilis. A megújulók gyorsan nőnek, de egyelőre a növekvő összfogyasztás &lt;strong&gt;tetejére&lt;/strong&gt; rakódnak, nem helyettesítik a fosszilis energiát.&lt;/p&gt;&lt;p&gt;Az &lt;strong&gt;Európai Unió&lt;/strong&gt; a villamosenergia-termelésében jár elöl: 2025-ben a szél és a nap együtt (&lt;strong&gt;30%&lt;/strong&gt;) először termelt többet, mint az összes fosszilis forrás (&lt;strong&gt;29%&lt;/strong&gt;). Az EU célja az orosz energiától való függetlenedés és a klímasemlegesség.&lt;/p&gt;&lt;p&gt;Magyarországon a villamosenergia-termelés gerince a &lt;strong&gt;Paksi Atomerőmű&lt;/strong&gt; (a hazai termelés kb. &lt;strong&gt;46–47%-a&lt;/strong&gt; 2024-ben) és a gyorsan bővülő &lt;strong&gt;napenergia&lt;/strong&gt;. Ugyanakkor az ország &lt;strong&gt;nettó áramimportőr&lt;/strong&gt; (a fogyasztás ~30%-a import), és kiemelten &lt;strong&gt;függ az orosz gáz- és olajimporttól&lt;/strong&gt; – ez a magyar energiapolitika központi kérdése.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – mi is az energiarendszer?&lt;/h1&gt;&lt;p&gt;Képzeld el az energiarendszert úgy, mint egy hatalmas ellátóláncot, amely három lépésből áll:&lt;/p&gt;&lt;ol&gt;&lt;li&gt;&lt;strong&gt;Forrás (primerenergia): &lt;/strong&gt;amit a természetből kinyerünk – kőolaj, földgáz, szén, uránérc, napsugárzás, szél, víz, biomassza.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Átalakítás: &lt;/strong&gt;a forrást használható formává alakítjuk – pl. erőműben árammá, finomítóban üzemanyaggá, kazánban hővé.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Felhasználás (végső energia): &lt;/strong&gt;ami a fogyasztóhoz ér – a konnektorban lévő áram, a tankba töltött benzin, a fűtésre használt gáz.&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;strong&gt;Kulcsfogalom: &lt;/strong&gt;a &lt;strong&gt;primerenergia&lt;/strong&gt; (amit kinyerünk) mindig több, mint a &lt;strong&gt;végső energia&lt;/strong&gt; (amit ténylegesen használunk), mert az átalakítás és szállítás során veszteségek lépnek fel. Ezért beszélünk külön energiamixről a teljes ellátásra és külön a villamosenergia-termelésre.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Fontos megkülönböztetés: &lt;/strong&gt;az energia tágabb fogalom (fűtés, közlekedés, ipar, áram), a villamosenergia csak ennek egy része. A hírekben gyakran összekeverik – figyelj rá, melyikről van szó.&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat – három szint&lt;/h1&gt;&lt;h2&gt;3.1 Globális szint&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;2024-ben a globális primerenergia-fogyasztás rekordot döntött: kb. &lt;strong&gt;620 exajoule (EJ)&lt;/strong&gt;, ami +2% az előző évhez képest. A fosszilis részarány &lt;strong&gt;81,5%&lt;/strong&gt; volt (81,9%-ról csökkent), a megújulók vízenergiával együtt kb. &lt;strong&gt;14,6%&lt;/strong&gt;, víz nélkül &lt;strong&gt;8,2%&lt;/strong&gt;. Az olajfogyasztás először lépte át a napi 100 millió hordós szintet. (Forrás: Energy Institute, Statistical Review of World Energy 2025.)&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A legfontosabb tanulság, hogy a megújulók terjedése önmagában még nem jelent fosszilis kiváltást – globálisan a kereslet gyorsabban nő, mint amennyit a megújulók pótolni tudnak. Az energiaátmenet tehát valós, de lassabb és összetettebb, mint a hírek sugallják.&lt;/p&gt;&lt;h2&gt;3.2 Európai (EU) szint&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az EU villamosenergia-termelésében 2025-ben a szél és a nap együtt &lt;strong&gt;30%&lt;/strong&gt;-ot ért el, ami először haladta meg az összes fosszilis forrás &lt;strong&gt;29%&lt;/strong&gt;-os arányát. A napenergia 13%-ra nőtt (369 TWh, negyedik éve &amp;gt;20% növekedés), a szél 17% volt. A megújulók aránya 2024-ben elérte a 47%-ot, a fosszilis arány történelmi mélypontra (29%) süllyedt. (Forrás: Ember, European Electricity Review 2026 és 2025.)&lt;/p&gt;&lt;p&gt;Az EU energiapolitikájának három fő hajtóereje: a &lt;strong&gt;klímasemlegesség 2050-re&lt;/strong&gt;, az &lt;strong&gt;ellátásbiztonság&lt;/strong&gt; (különösen az orosz gáztól való függetlenedés a 2022-es ukrajnai háború óta), és a &lt;strong&gt;megfizethetőség&lt;/strong&gt;. Az EU célja, hogy 2027 végére teljesen kivezesse az orosz gázt a piacáról.&lt;/p&gt;&lt;h2&gt;3.3 Magyar szint&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;2024-ben Magyarország bruttó villamosenergia-fogyasztása kb. &lt;strong&gt;44,9 TWh&lt;/strong&gt; volt (+2,8%), a hazai bruttó termelés kb. &lt;strong&gt;37,4 TWh&lt;/strong&gt;. A Paksi Atomerőmű kb. &lt;strong&gt;16 TWh&lt;/strong&gt;-t termelt, ami a hazai termelés &lt;strong&gt;~46,7%-a&lt;/strong&gt;. Az ország &lt;strong&gt;nettó áramimportőr&lt;/strong&gt;: a fogyasztás kb. 30%-a importból érkezik (főleg Szlovákia, Ukrajna, Ausztria felől). (Forrás: MAVIR / MEKH éves rendszeradatok 2024.)&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Importfüggőség: a földgáz &lt;strong&gt;~78%-a&lt;/strong&gt; Oroszországból érkezett (2023, EU-n belül a legmagasabb arány), a kőolaj &lt;strong&gt;75–80%-a&lt;/strong&gt; szintén orosz forrású; az orosz nyersolaj-kitettség 2024-re ~86%-ra nőtt. A szénerőművi termelést 2025-re kivezették. (Forrás: ELTE NÁSZ, vg.hu, sajtóelemzések 2024–2025.)&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Kulcsszereplők: &lt;/strong&gt;MAVIR (átviteli rendszerirányító, TSO), MEKH (energiaszabályozó hatóság), MVM-csoport (állami energiavállalat), HUPX (áramtőzsde), FGSZ (gázszállító). Ezeket a következő leckékben részletesen megismerjük.&lt;/p&gt;&lt;h1&gt;4. Kulcsszámok egy lapon&lt;/h1&gt;&lt;p&gt;&lt;em&gt;A három szint legfontosabb mutatói (forrásokkal a 7. pontban):&lt;/em&gt;&lt;/p&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mutató&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték (2024–2025)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szint&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Fosszilis részarány a primerenergiában&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;81,5%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Globális&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Megújulók (vízzel)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;14,6%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Globális&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szél + nap az áramtermelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;30% (&amp;gt; fosszilis 29%)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;EU&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Megújulók aránya az áramban&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;47%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;EU&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Bruttó áramfogyasztás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~44,9 TWh&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Paks részaránya a hazai termelésben&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~46,7%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Nettó áramimport a fogyasztásból&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~30%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Földgáz orosz importaránya&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~78% (2023)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyarország&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák – mit jelent ez a hétköznapokban?&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Téli gázszámla: &lt;/strong&gt;amikor hideg van, a magyar gázkereslet megugrik, és mivel ennek nagy része importból (jellemzően orosz forrásból) jön, az árak és az ellátásbiztonság közvetlenül függ a nemzetközi politikától.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Napos délidő: &lt;/strong&gt;egy napsütéses tavaszi délben a hazai naperőművek annyi áramot termelhetnek, hogy a rendszerirányítónak (MAVIR) aktívan kezelnie kell a többletet – ez új kihívás a hálózatnak.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Paks leállása: &lt;/strong&gt;mivel egyetlen erőmű adja a hazai termelés közel felét, egy-egy paksi blokk karbantartása érezhetően növeli az importigényt és a nagykereskedelmi árat.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. A tananyag útiterve – mi jön ezután?&lt;/h1&gt;&lt;p&gt;Ez a lecke a térkép. A következő leckékben szintenként és témánként mélyülünk el. Javasolt sorrend:&lt;/p&gt;&lt;ol&gt;&lt;li&gt;&lt;strong&gt;2. lecke – Energiaforrások A-tól Z-ig: &lt;/strong&gt;kőolaj, földgáz, szén, atom, nap, szél, víz, biomassza – hogyan működnek, előnyök/hátrányok.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;3. lecke – A villamosenergia-rendszer: &lt;/strong&gt;termelés, hálózat, rendszerirányítás, kiegyenlítés, miért kell mindig egyensúly.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;4. lecke – Energiapiacok és árképzés: &lt;/strong&gt;nagykereskedelem, tőzsde (HUPX), határidős és azonnali piacok, mitől függ az ár.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;5. lecke – Az EU energiapolitikája: &lt;/strong&gt;Green Deal, REPowerEU, kibocsátáskereskedelem (ETS), ellátásbiztonság.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;6. lecke – A magyar energiaszektor mélyebben: &lt;/strong&gt;MAVIR, MEKH, MVM, Paks és Paks II, importfüggőség, hazai stratégia.&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Szólj, ha más sorrendet vagy mélységet szeretnél – a tananyag rugalmasan alakítható.&lt;/em&gt;&lt;/p&gt;&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Primerenergia&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A természetből kinyert, még át nem alakított energia (pl. nyersolaj, uránérc, napsugárzás).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Végső energia&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Amit a fogyasztó ténylegesen használ átalakítás után (áram, üzemanyag, hő).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Energiamix&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az energiaellátás forrásainak megoszlása (pl. mennyi a fosszilis, atom, megújuló).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;TWh / GWh / EJ&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Energiamennyiség mértékegységei. 1 TWh = 1000 GWh. Az EJ (exajoule) a globális léptékhez használatos.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Megújuló energia&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Természetesen pótlódó forrás: nap, szél, víz, geotermikus, biomassza.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;TSO (átviteli rendszerirányító)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A nagyfeszültségű hálózatot üzemeltető szereplő – Magyarországon a MAVIR.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Importfüggőség&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az energiaszükséglet mekkora hányadát fedezi behozatal a hazai termelés helyett.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Ellátásbiztonság&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az energia folyamatos, megbízható elérhetősége megfizethető áron.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h1&gt;8. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;Energy Institute – Statistical Review of World Energy 2025 (globális primerenergia, fosszilis/megújuló arányok) – &lt;a href=&quot;https://www.energyinst.org/statistical-review&quot;&gt;https://www.energyinst.org/statistical-review&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Ember – European Electricity Review 2026 (EU 2025-ös áramtermelési arányok) – &lt;a href=&quot;https://ember-energy.org/latest-insights/european-electricity-review-2026/&quot;&gt;https://ember-energy.org/latest-insights/european-electricity-review-2026/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Ember – European Electricity Review 2025 (EU 2024-es arányok) – &lt;a href=&quot;https://ember-energy.org/latest-insights/european-electricity-review-2025/&quot;&gt;https://ember-energy.org/latest-insights/european-electricity-review-2025/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;MAVIR / MEKH – A magyar villamosenergia-rendszer éves adatai – &lt;a href=&quot;https://www.mavir.hu/web/mavir/mavir-mekh-ver-adatai&quot;&gt;https://www.mavir.hu/web/mavir/mavir-mekh-ver-adatai&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Hungarian Conservative – Paks 2024-es termelési részaránya – &lt;a href=&quot;https://www.hungarianconservative.com/articles/current/paks-nuclear-plant-electricity-generation-2024/&quot;&gt;https://www.hungarianconservative.com/articles/current/paks-nuclear-plant-electricity-generation-2024/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;ELTE NÁSZ – A magyar energiahordozó-import alakulása – &lt;a href=&quot;https://nasz.elte.hu/2025/04/20/a-magyar-energiahordozo-import-alakulasa-1980-as-evek-kozepetol-maig-es-a-szovjet-orosz-hanyad-az-importban/&quot;&gt;https://nasz.elte.hu/2025/04/20/a-magyar-energiahordozo-import-alakulasa-1980-as-evek-kozepetol-maig-es-a-szovjet-orosz-hanyad-az-importban/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA – Hungary Electricity Security Policy – &lt;a href=&quot;https://www.iea.org/articles/hungary-electricity-security-policy&quot;&gt;https://www.iea.org/articles/hungary-electricity-security-policy&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: az arányok forrásonként és módszertanonként kissé eltérhetnek (pl. bruttó vs. nettó termelés, primerenergia vs. áram). A leckében jelzem, melyik szintről van szó.&lt;/em&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-2&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;2. lecke – Energiaforrások A-tól Z-ig&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Fosszilis, nukleáris és megújuló források – hogyan működnek, mik az előnyeik és hátrányaik&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 17.  •  Adatok: 2024–2025  •  Szint: alapozó  •  Előzmény: 1. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Az 1. leckében megismertük az energiarendszer felépítését és a globális/EU/magyar nagy képet. Most az &lt;strong&gt;alapanyagokat&lt;/strong&gt; nézzük meg egyenként: melyik forrás hogyan termel energiát, mik az erősségei és gyengeségei, és hol tart Magyarországon. Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; / &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt; – a számok mellett mindig ott a forrás.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;Az energiaforrásokat három nagy csoportba soroljuk: &lt;strong&gt;fosszilis&lt;/strong&gt; (kőolaj, földgáz, szén), &lt;strong&gt;nukleáris&lt;/strong&gt; (atom), és &lt;strong&gt;megújuló&lt;/strong&gt; (nap, szél, víz, biomassza, geotermikus). A fosszilis források sűrűn tárolják az energiát és igény szerint hívhatók, de szén-dioxidot bocsátanak ki és kimerülnek. A nap és a szél tiszta és olcsó, de &lt;strong&gt;időjárásfüggő&lt;/strong&gt; (nem mindig termel). Az atomenergia és a vízenergia stabil, alacsony kibocsátású alaperőművi termelést ad.&lt;/p&gt;&lt;p&gt;Egyetlen forrás sem tökéletes – minden energiarendszer &lt;strong&gt;kompromisszum&lt;/strong&gt; három szempont között: &lt;strong&gt;megfizethetőség, ellátásbiztonság és környezeti hatás&lt;/strong&gt; (ezt hívják az „energia trilemmának”). Magyarországon a mix gerince az &lt;strong&gt;atomenergia (Paks)&lt;/strong&gt; és a robbanásszerűen növekvő &lt;strong&gt;napenergia&lt;/strong&gt;; a szélenergia gyakorlatilag befagyott (~325 MW), a geotermikus hőhasznosításban viszont EU-éllovas vagyunk.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – hogyan csoportosítjuk a forrásokat?&lt;/h1&gt;&lt;p&gt;Két egyszerű kérdés alapján rendezhetjük el a forrásokat:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Pótlódik-e? &lt;/strong&gt;A megújuló (nap, szél, víz, biomassza, geotermikus) emberi időtávon belül pótlódik. A fosszilis és a nukleáris véges, kifogyó készletből gazdálkodik.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Igény szerint hívható-e? &lt;/strong&gt;Az „irányítható (diszpécselhető)” források – gáz, szén, atom, víztározós, biomassza – akkor termelnek, amikor kell. Az „időjárásfüggő” források – nap, szél – csak akkor, amikor süt vagy fúj.&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;&lt;strong&gt;Miért fontos ez? &lt;/strong&gt;A villamos hálózatban a termelésnek és a fogyasztásnak minden pillanatban egyeznie kell. Ezért egy rendszerben jól ki kell egészítenie egymást az időjárásfüggő (olcsó, tiszta) és az irányítható (stabil) forrásoknak. Ez a fő oka annak, hogy nem lehet egyik napról a másikra „csak napelem” egy ország ellátása.&lt;/p&gt;&lt;h1&gt;3. A források egyenként&lt;/h1&gt;&lt;h2&gt;3.1 Kőolaj&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;Föld alatti tárolókból kitermelt szénhidrogén, amit finomítóban benzinné, gázolajjá, kerozinná és vegyipari alapanyaggá alakítanak. Elsősorban a közlekedés és a petrolkémia tüzelőanyaga, áramtermelésre ma alig használják.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Rendkívül energiasűrű és könnyen szállítható; kiépített globális infrastruktúra; a közlekedés ma is döntően erre épül.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Véges készlet; szén-dioxid-kibocsátás; árvolatilitás; geopolitikai függőség; szennyezés kockázata.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;Magyarország kőolaj-szükségletének 75–80%-a orosz forrású volt, és az orosz nyersolaj-kitettség 2024-re ~86%-ra nőtt (Barátság vezeték). A finomítást a MOL százhalombattai üzeme végzi.&lt;/p&gt;&lt;h2&gt;3.2 Földgáz&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;Metán alapú szénhidrogén, amit fűtésre, főzésre, ipari hőre és gázturbinás áramtermelésre használnak. A gázerőművek gyorsan szabályozhatók, ezért jól egészítik ki az időjárásfüggő megújulókat.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;A fosszilisek közül a legkevesebb CO2-t bocsátja ki; rugalmas, gyorsan indítható erőművek; fűtésben nehezen pótolható rövid távon.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Importfüggőség és árvolatilitás; továbbra is jelentős CO2- és metánkibocsátás; tárolási és vezetékfüggőség.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;A magyar fűtés és ipar gerince. A földgáz ~78%-a (2023) Oroszországból érkezett – ez az EU-n belül a legmagasabb arány. A szállítást az FGSZ, a tárolást nagyrészt az MVM kezeli. Az EU 2027 végére kivezetné az orosz gázt.&lt;/p&gt;&lt;h2&gt;3.3 Szén&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;Szilárd fosszilis tüzelőanyag, amelyet erőművi kazánban elégetve gőzt fejlesztenek, és ezzel hajtanak turbinát. Történelmileg az ipari forradalom és az áramtermelés alapja.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Olcsó és bőséges készlet; hazai bányászható; stabil alaperőművi termelés.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;A legtöbb CO2-t és légszennyezőt kibocsátó forrás; egészségügyi károk; az EU kibocsátáskereskedelme (ETS) drágítja.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;Magyarország a szénalapú áramtermelést gyakorlatilag kivezette: a Mátrai Erőmű lignites blokkjainak leállításával 2025-re megszűnt a hazai szénerőművi termelés. Ez a dekarbonizáció egyik fontos lépése.&lt;/p&gt;&lt;h2&gt;3.4 Atomenergia (nukleáris)&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;Az uránatommagok hasadásakor (maghasadás) felszabaduló hővel gőzt fejlesztenek, ami turbinát hajt. Folyamatos, nagy teljesítményű „alaperőművi” termelést ad, időjárástól függetlenül.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Rendkívül alacsony életciklus-CO2 (a szél/víz szintjén); magas, ~90%+ kapacitásfaktor; stabil, kiszámítható, nagy mennyiségű áram; kis földterület-igény.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Magas építési költség és hosszú megépülés; radioaktív hulladék kezelése; üzemanyag- és technológiai függőség; baleseti percepció.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;A Paksi Atomerőmű négy blokkja adja a hazai áramtermelés ~46,7%-át (2024, ~16 TWh). A bővítés (Paks II, két új blokk) orosz Roszatom-technológiával épül, az üzemanyagot is az orosz TVEL szállítja az első években.&lt;/p&gt;&lt;h2&gt;3.5 Napenergia (fotovoltaika)&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;A napelemek a napfényt közvetlenül árammá alakítják (fotovoltaikus hatás). Tetőre és nagy napelemparkba is telepíthető. A leggyorsabban növekvő áramforrás a világon és az EU-ban.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Nagyon olcsó (a legolcsóbb új építésű forrás); nincs üzemanyagköltség és kibocsátás; gyorsan telepíthető; háztartási szinten is elérhető.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Csak nappal és napsütésben termel (időjárásfüggő); tárolás vagy kiegészítő forrás kell; földterületet igényel; déli órákban termelési csúcs, ami a hálózatot terheli.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;Robbanásszerű növekedés: a beépített kapacitás 2024 tavaszára meghaladta a 7 800 MW-ot, 2025-re ~8 100 MW fölé nőtt. Ma a magyar megújuló-mix legnagyobb eleme, és komoly rendszerirányítási kihívás a déli többlettermelés.&lt;/p&gt;&lt;h2&gt;3.6 Szélenergia&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;A szélturbinák a mozgó levegő mozgási energiáját alakítják árammá. Lehet szárazföldi (onshore) vagy tengeri (offshore); az offshore stabilabb és erősebb szelet kap.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Olcsó és tiszta; nincs üzemanyagköltség; éjjel és télen is termel (kiegészíti a napot); offshore magas, ~40%+ kapacitásfaktor.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Időjárásfüggő; tájképi és zajhatás; szárazföldön korlátozott jó szélfekvésű terület; engedélyezési és szabályozási korlátok.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;Magyarországon a szélkapacitás évek óta befagyva ~325 MW-on áll, mert a 2016-os szabályozás gyakorlatilag ellehetetlenítette az új telepítést. A kormány terve szerint 2030-ig ~1 000 MW-ra bővülhet – ez vitatott, fejlődő terület.&lt;/p&gt;&lt;h2&gt;3.7 Vízenergia&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;A magasabban lévő víz helyzeti energiáját turbinával alakítják árammá. A szivattyús-tározós erőmű energiatárolásra is alkalmas: olcsó áramból vizet szivattyúz fel, csúcsidőben visszaengedi.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Megújuló, alacsony kibocsátás; irányítható és gyorsan szabályozható; a tározós változat a legnagyobb léptékű energiatárolás ma.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Erősen domborzat- és vízrajzfüggő; ökológiai és társadalmi hatások (duzzasztás); új nagy kapacitás telepítése korlátozott.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;Magyarország sík ország, kevés vízienergia-potenciállal: a beépített vízerőmű-kapacitás mindössze ~62 MW (pl. Tiszalök, Kisköre). Nagy szerepe a hazai mixben nincs, de helyileg fontos.&lt;/p&gt;&lt;h2&gt;3.8 Biomassza és biogáz&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;Szerves anyag (fa, mezőgazdasági melléktermék, hulladék) elégetésével vagy erjesztésével (biogáz) nyernek hőt és áramot. Elvileg „szén-semleges”, mert a növény növekedése közben kötötte meg a szenet.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Irányítható és tárolható megújuló; hulladékhasznosítás; helyi alapanyag; meglévő erőművekben is társtüzelhető.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Égéskor légszennyezés és CO2; fenntarthatósági kérdések (erdőirtás, alapanyagverseny az élelmiszerrel); korlátozott léptékűség.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;A biomassza és biogáz beépített kapacitása ~444 MW Magyarországon – a megújuló-mix második legnagyobb eleme a nap után, főleg vidéki és ipari hőhasznosításban.&lt;/p&gt;&lt;h2&gt;3.9 Geotermikus energia&lt;/h2&gt;&lt;p&gt;&lt;strong&gt;MŰKÖDÉS: &lt;/strong&gt;A Föld belső hőjét hasznosítja: meleg vizet vagy gőzt hoznak a felszínre fűtésre (közvetlen hőhasznosítás), illetve áramtermelésre. Magyarország kiváló adottságokkal rendelkezik a vékony földkéreg miatt.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Előnyök: &lt;/strong&gt;Folyamatos, időjárástól független megújuló; magas, ~65% kapacitásfaktor; kiváló fűtésre és távhőre.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Hátrányok: &lt;/strong&gt;Helyhez kötött (jó adottság kell); magas fúrási beruházás; áramtermelésre Magyarországon a hőmérséklet jellemzően alacsony.&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Magyar kontextus: &lt;/strong&gt;A közvetlen geotermikus hőhasznosításban Magyarország EU-éllovas (a megújuló-hő ~5%-a, a legmagasabb arány az unióban). Távhő, fürdők, mezőgazdaság – jelentős, alulhasznosított potenciál.&lt;/p&gt;&lt;h1&gt;4. Összehasonlító kulcsszámok&lt;/h1&gt;&lt;p&gt;&lt;em&gt;Három mutató mondja el a forrás „jellemét”: mennyibe kerül (LCOE), mennyire kihasználható (kapacitásfaktor), és mennyi CO2-t bocsát ki teljes életciklusban. (Forrásokról a 7. pont.)&lt;/em&gt;&lt;/p&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Forrás&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;LCOE ($/MWh)*&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Kapacitásfaktor**&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Életciklus CO2 (g/kWh)***&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Napenergia (PV)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;29–92&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~23%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;8–83&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szél (szárazföldi)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;27–73&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~34%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~11&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szél (tengeri)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;magasabb&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~40%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~12&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Atomenergia&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;magas építés&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&amp;gt;92%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~5–12&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Vízenergia&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;változó&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;változó&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~24&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Földgáz (CCGT)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~76&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~60%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~490&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szén&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;69–168&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~43%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;740–1689&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Geotermikus&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;változó&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~65%&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;alacsony&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;p&gt;&lt;em&gt;* Lazard LCOE+ 2024 (USA, támogatás nélkül). ** Tipikus értékek, USA 2024 (a tényleges érték országonként eltér). *** IPCC/UNECE életciklus-mediánok és -tartományok.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A táblázat jól mutatja az energia trilemmát: a nap és a szél a legolcsóbb és tiszta, de alacsony a kapacitásfaktoruk (időjárásfüggők). Az atom drága megépíteni, de utána stabil, tiszta és kihasznált. A gáz rugalmas, de drágább és szennyez. Nincs egyetlen „győztes” – a jó rendszer ezeket okosan kombinálja.&lt;/p&gt;&lt;h1&gt;5. Magyar megújuló kapacitások (2024–2025)&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Forrás&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Beépített kapacitás (~2025)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Napenergia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~8 100 MW&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Biomassza + biogáz&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~444 MW&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szélenergia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~325 MW (befagyva)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Vízenergia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~62 MW&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Hulladékból nyert energia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~49 MW&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Geotermikus (áram)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;kis kapacitás; a hőhasznosításban EU-éllovas&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;p&gt;&lt;em&gt;A teljes megújuló kapacitás 2025-ben meghaladta a 9 GW-ot, ennek túlnyomó része napenergia. (Forrás: MNNSZ / hazai megújuló statisztikák.)&lt;/em&gt;&lt;/p&gt;&lt;h1&gt;6. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;A déli „kacsagörbe”: &lt;/strong&gt;napos délben a sok napelem leszorítja a nagykereskedelmi árat (néha nullára), estére viszont, amikor lemegy a nap, gyorsan beinduló gázerőművek vagy import kell – ez mutatja, miért nem elég önmagában a nap.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Paks vs. napelem: &lt;/strong&gt;Paks egész évben, éjjel-nappal ~90%-os kihasználtsággal termel; ehhez napelemből nagyságrendekkel nagyobb beépített teljesítmény és tárolás kellene ugyanannyi éves energiához.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Geotermikus távhő: &lt;/strong&gt;több magyar városban (pl. Szeged) a föld melegével fűtenek otthonokat – tiszta, hazai, import nélküli hő, ami csökkenti a gázfüggőséget.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;LCOE (kiegyenlített energiaköltség)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Egy erőmű teljes élettartamra vetített átlagos áramtermelési költsége $/MWh-ban – így összehasonlíthatók a különböző technológiák.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Kapacitásfaktor&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A tényleges éves termelés aránya a maximálishoz képest. Magas = jól kihasznált (atom ~90%), alacsony = időjárásfüggő (nap ~23%).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Életciklus CO2&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A teljes láncra (gyártás, építés, üzem, bontás) vetített kibocsátás g CO2/kWh-ban – nem csak az égetés.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Irányítható (diszpécselhető)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Igény szerint be- és lekapcsolható forrás (gáz, szén, atom, víztározós, biomassza).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Időjárásfüggő (intermittens)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Csak akkor termel, ha süt a nap vagy fúj a szél (nap, szél).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Alaperőmű&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Folyamatosan, nagy kihasználtsággal termelő erőmű (jellemzően atom, nagy víz).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Energia trilemma&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A megfizethetőség, ellátásbiztonság és környezeti hatás közötti egyensúlykeresés.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;ETS (kibocsátáskereskedelem)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az EU rendszere, amely árat ad a CO2-kibocsátásnak, így drágítja a fosszilis termelést.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;h1&gt;8. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;Lazard – Levelized Cost of Energy+ (LCOE+) 2024 (LCOE értékek) – &lt;a href=&quot;https://www.lazard.com/research-insights/levelized-cost-of-energyplus-lcoeplus/&quot;&gt;https://www.lazard.com/research-insights/levelized-cost-of-energyplus-lcoeplus/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IPCC / UNECE – Life Cycle Assessment of Electricity Generation (életciklus CO2) – &lt;a href=&quot;https://unece.org/sites/default/files/2021-11/LCA_final.pdf&quot;&gt;https://unece.org/sites/default/files/2021-11/LCA_final.pdf&lt;/a&gt;&lt;/li&gt;&lt;li&gt;World Nuclear Association – Carbon Dioxide Emissions From Electricity – &lt;a href=&quot;https://world-nuclear.org/information-library/energy-and-the-environment/carbon-dioxide-emissions-from-electricity&quot;&gt;https://world-nuclear.org/information-library/energy-and-the-environment/carbon-dioxide-emissions-from-electricity&lt;/a&gt;&lt;/li&gt;&lt;li&gt;EIA – Electric Power Monthly, kapacitásfaktorok (USA 2024) – &lt;a href=&quot;https://www.eia.gov/electricity/monthly/epm_table_grapher.php?t=epmt_6_07_b&quot;&gt;https://www.eia.gov/electricity/monthly/epm_table_grapher.php?t=epmt_6_07_b&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Magyar Napelem Napkollektor Szövetség (MNNSZ) – hazai megújuló kapacitások – &lt;a href=&quot;https://www.mnnsz.hu/rekordev-az-eu-megujuloenergia-termeleseben-2024-ben-az-aram-kozel-fele-megujulokbol-szarmazott/&quot;&gt;https://www.mnnsz.hu/rekordev-az-eu-megujuloenergia-termeleseben-2024-ben-az-aram-kozel-fele-megujulokbol-szarmazott/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Megújuló energiaforrások Magyarországon – összefoglaló adatok – &lt;a href=&quot;https://hu.wikipedia.org/wiki/Meg%C3%BAjul%C3%B3_energiaforr%C3%A1sok_Magyarorsz%C3%A1gon&quot;&gt;https://hu.wikipedia.org/wiki/Meg%C3%BAjul%C3%B3_energiaforr%C3%A1sok_Magyarorsz%C3%A1gon&lt;/a&gt;&lt;/li&gt;&lt;li&gt;ELTE NÁSZ – magyar energiahordozó-import (kőolaj/gáz orosz arány) – &lt;a href=&quot;https://nasz.elte.hu/2025/04/20/a-magyar-energiahordozo-import-alakulasa-1980-as-evek-kozepetol-maig-es-a-szovjet-orosz-hanyad-az-importban/&quot;&gt;https://nasz.elte.hu/2025/04/20/a-magyar-energiahordozo-import-alakulasa-1980-as-evek-kozepetol-maig-es-a-szovjet-orosz-hanyad-az-importban/&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: az LCOE és a kapacitásfaktor-adatok jellemzően USA-piaci értékek, a tényleges magyar/EU számok eltérhetnek. Az életciklus-CO2 mediánok tág tartományt fednek le. A leckét tanulási célra állítottam össze, befektetési vagy szakpolitikai döntés előtt elsődleges forrás ajánlott.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (3. lecke): A villamosenergia-rendszer – termelés, hálózat, rendszerirányítás és a folyamatos egyensúly.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-3&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;3. lecke – A villamosenergia-rendszer&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Termelés, hálózat, rendszerirányítás és a folyamatos egyensúly&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 19.  •  Adatok: 2024–2025  •  Szint: alapozó+  •  Előzmény: 1–2. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Az 1–2. leckében megismertük a nagy képet és az energiaforrásokat. Most azt nézzük meg, &lt;strong&gt;hogyan jut el az áram az erőműtől a konnektorig&lt;/strong&gt;, és miért a villamosenergia-rendszer az egyik legbonyolultabb gépezet, amit ember épített. Kulcsgondolat: a villamos energiát &lt;strong&gt;nem lehet nagy mennyiségben olcsón tárolni&lt;/strong&gt;, ezért a termelésnek és a fogyasztásnak minden másodpercben egyeznie kell.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;A villamosenergia-rendszer négy fő részből áll: &lt;strong&gt;termelés&lt;/strong&gt; (erőművek), &lt;strong&gt;átvitel&lt;/strong&gt; (nagyfeszültségű távvezetékek), &lt;strong&gt;elosztás&lt;/strong&gt; (kis- és középfeszültségű hálózat a fogyasztókig), és &lt;strong&gt;rendszerirányítás&lt;/strong&gt; (a folyamatos egyensúly fenntartása). Magyarországon az átviteli hálózatot és a rendszerirányítást a &lt;strong&gt;MAVIR&lt;/strong&gt; végzi, az elosztást regionális elosztói engedélyesek (pl. E.ON, MVM Démász, OPUS TITÁSZ).&lt;/p&gt;&lt;p&gt;A rendszer „szíve” a &lt;strong&gt;frekvencia&lt;/strong&gt;: Európában &lt;strong&gt;50 Hz&lt;/strong&gt;. Ha több a fogyasztás, mint a termelés, a frekvencia csökken; ha több a termelés, nő. A rendszerirányító &lt;strong&gt;kiegyenlítő tartalékokkal&lt;/strong&gt; tartja a frekvenciát 50 Hz közelében – másodpercről másodpercre. Magyarország a kontinentális európai &lt;strong&gt;szinkronzóna&lt;/strong&gt; tagja, és a szomszédos országokkal összekapcsolt hálózaton keresztül importál/exportál.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – miért olyan kényes az egyensúly?&lt;/h1&gt;&lt;p&gt;Képzeld el a villamos hálózatot úgy, mint egy hatalmas, közös medencét:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Minden erőmű vizet tölt &lt;/strong&gt;a medencébe (termelés).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Minden fogyasztó vizet enged ki &lt;/strong&gt;(fogyasztás).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;A vízszintnek állandónak kell maradnia &lt;/strong&gt;– ez a frekvencia (50 Hz). Ha a szint elkezd süllyedni vagy emelkedni, az egész rendszer veszélybe kerül.&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;&lt;strong&gt;A nagy különbség a többi infrastruktúrától: &lt;/strong&gt;a vizet (energiát) nem lehet nagy mennyiségben elraktározni. Ezért nem elég „elég erőművet” építeni – minden pillanatban pontosan annyit kell termelni, amennyit éppen fogyasztanak. Ezt a finom egyensúlyozást hívjuk &lt;strong&gt;rendszerirányításnak&lt;/strong&gt;.&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;&lt;h2&gt;3.1 Termeléstől a fogyasztóig – a feszültségszintek&lt;/h2&gt;&lt;p&gt;Az erőművek által termelt áramot &lt;strong&gt;feltranszformálják&lt;/strong&gt; nagy feszültségre, mert így kisebb veszteséggel szállítható nagy távolságra. A fogyasztóhoz érve fokozatosan letranszformálják. A magyar átviteli hálózat döntően &lt;strong&gt;400 kV&lt;/strong&gt; és &lt;strong&gt;220 kV&lt;/strong&gt; feszültségű (plusz egy 750 kV-os betáplálás Ukrajna felől); az elosztóhálózat 132 kV-tól a háztartási 230/400 V-ig terjed.&lt;/p&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szint&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Feszültség&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szerep&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Átvitel&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;750 / 400 / 220 kV&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Nagy távolságú szállítás, erőművek és határok összekötése (MAVIR)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Elosztás (közép)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;132 / 22 / 10 kV&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Régiók, városok, ipari fogyasztók ellátása (elosztók)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogyasztói&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;400 / 230 V&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Háztartások, kisfogyasztók&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;p&gt;&lt;em&gt;Minél nagyobb a feszültség, annál kisebb az áram ugyanakkora teljesítményhez, és annál kisebb a vezetéki veszteség – ezért „utaznak” a nagy távolságokat 400 kV-on.&lt;/em&gt;&lt;/p&gt;&lt;h2&gt;3.2 A frekvencia és a valós idejű egyensúly&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A kontinentális európai szinkronzónában a névleges frekvencia 50 Hz. A teljes zóna (kb. 26 ország) egyetlen, összehangolt rendszerként forog – ha valahol kiesik egy nagy erőmű, az egész zóna frekvenciája megrezdül, és minden ország rendszerirányítója együtt reagál.&lt;/p&gt;&lt;p&gt;A frekvenciát több, egymásra épülő „védelmi vonal” tartja:&lt;/p&gt;&lt;ol&gt;&lt;li&gt;&lt;strong&gt;Primer (FCR) tartalék: &lt;/strong&gt;automatikus, másodperceken belül reagál a frekvencia eltérésére az egész zónában.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Szekunder (aFRR) tartalék: &lt;/strong&gt;automatikus szabályozás, amely percek alatt visszaállítja a frekvenciát és a határkeresztező áramlásokat a tervezett értékre.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Tercier (mFRR) tartalék: &lt;/strong&gt;kézi aktiválású, lassabb, a nagyobb vagy tartós eltérések kezelésére.&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;strong&gt;Miért fontos ez ma? &lt;/strong&gt;A sok időjárásfüggő nap- és szélerőmű miatt a termelés egyre ingadozóbb, ezért a kiegyenlítő tartalékok és a rugalmasság (gáz, tárolás, kereslet-oldali szabályozás) értéke nő.&lt;/p&gt;&lt;h2&gt;3.3 Rendszerirányítás – mit csinál a MAVIR?&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A MAVIR a magyar átviteli rendszerirányító (TSO). Fő feladatai: a hálózat üzemeltetése és fejlesztése; a termelés-fogyasztás egyensúlyának fenntartása; a kiegyenlítő energia és tartalékok beszerzése; a határkeresztező kapacitások elosztása; valamint a hosszú távú rendszerterv készítése.&lt;/p&gt;&lt;p&gt;A MAVIR nem birtokol erőműveket és nem ad el áramot a lakosságnak – &lt;strong&gt;semleges karmester&lt;/strong&gt;, aki összehangolja a piaci szereplőket és garantálja a fizikai működést. A kereskedelmet a piac (HUPX, kétoldalú szerződések) intézi – ezt a 4. leckében nézzük meg.&lt;/p&gt;&lt;h2&gt;3.4 Összekapcsolt hálózat – import, export, határkeresztezés&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Magyarország minden szomszédjával összekapcsolt (Ausztria, Szlovákia, Ukrajna, Románia, Szerbia, Horvátország, Szlovénia – utóbbival 2023-ban épült új összeköttetés). A határkeresztező kapacitásokat a MAVIR a szomszédos TSO-kkal együtt számítja és osztja el. Mivel az ország nettó importőr (a fogyasztás ~30%-a import), ezek a vezetékek létfontosságúak.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;Az összekapcsolt hálózat kétélű: egyrészt olcsóbb és biztonságosabb ellátást ad (a szomszédból behozható a hiányzó áram), másrészt növeli a függőséget és a kitettséget a regionális áraknak. Az ellátásbiztonság ezért nem csak hazai erőművek kérdése, hanem a régió közös ügye.&lt;/p&gt;&lt;h1&gt;4. Kulcsfogalmak egy lapon&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Lényeg&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Frekvencia (50 Hz)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A termelés-fogyasztás egyensúlyának mérőszáma; ennek stabilan tartása a fő cél.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Alaperőmű / menetrendtartó / csúcserőmű&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Folyamatosan (atom), tervezett menetrend szerint (gáz), illetve csúcsidőben gyorsan beugró (gáz, víz) termelés.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;FCR / aFRR / mFRR&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Primer / szekunder / tercier kiegyenlítő tartalékok – egyre lassabb, de nagyobb beavatkozás.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Átvitel vs. elosztás&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Nagyfeszültségű „autópálya” (MAVIR) vs. helyi „utak” (elosztók) a fogyasztóig.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szinkronzóna&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Egyetlen frekvencián, összehangoltan működő országcsoport (kontinentális Európa).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Határkeresztező kapacitás&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A szomszédos rendszerekkel összekötő vezetékek áteresztőképessége import/exportra.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Reggeli felfutás: &lt;/strong&gt;munkanap reggel hirtelen megugrik a fogyasztás (ébredés, ipar indulása). A MAVIR-nak előre be kell ütemeznie a termelést, és tartalékot tartania a hibákra.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Erőmű-kiesés: &lt;/strong&gt;ha egy nagy blokk (pl. egy paksi egység) váratlanul leáll, a frekvencia azonnal esni kezd – másodperceken belül beindul a primer tartalék az egész szinkronzónában, és a MAVIR pótolja a hiányt.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Napos déli többlet: &lt;/strong&gt;sok napelem mellett délben annyi áram termelődhet, hogy le kell szabályozni erőműveket vagy exportálni – különben emelkedne a frekvencia. Ez új típusú kihívás a hálózatnak.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;TSO (MAVIR)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Átviteli rendszerirányító: a nagyfeszültségű hálózat üzemeltetője és az egyensúly felelőse.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;DSO (elosztó)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Elosztói engedélyes, amely a közép- és kisfeszültségű hálózaton viszi az áramot a fogyasztóhoz.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Kiegyenlítő energia&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A valós idejű eltérések kezelésére igénybe vett, gyorsan szabályozható termelés/fogyasztás.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Menetrend&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Előre bejelentett termelési/fogyasztási terv, amihez a piaci szereplőknek tartaniuk kell magukat.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szinkronzóna&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Azonos frekvencián, mereven összekapcsolt országcsoport.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Redispatch&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A hálózati szűk keresztmetszetek feloldására elrendelt termelés-átrendezés.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Black start&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Képesség a rendszer újraindítására teljes áramszünet (blackout) után, külső betáplálás nélkül.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;MAVIR – Rendszerirányítás, piacműködtetés – &lt;a href=&quot;https://www.mavir.hu/web/mavir/rendszeriranyitas&quot;&gt;https://www.mavir.hu/web/mavir/rendszeriranyitas&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Magyarország villamosenergia-átviteli hálózata – áttekintés (feszültségszintek) – &lt;a href=&quot;https://hu.wikipedia.org/wiki/Magyarorsz%C3%A1g_villamosenergia-%C3%A1tviteli_h%C3%A1l%C3%B3zata&quot;&gt;https://hu.wikipedia.org/wiki/Magyarorsz%C3%A1g_villamosenergia-%C3%A1tviteli_h%C3%A1l%C3%B3zata&lt;/a&gt;&lt;/li&gt;&lt;li&gt;ENTSO-E – Continental Europe synchronous area / balancing – &lt;a href=&quot;https://www.entsoe.eu/&quot;&gt;https://www.entsoe.eu/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;IEA – Hungary Electricity Security Policy – &lt;a href=&quot;https://www.iea.org/articles/hungary-electricity-security-policy&quot;&gt;https://www.iea.org/articles/hungary-electricity-security-policy&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: a tartalékpiac (FCR/aFRR/mFRR) részletszabályai ENTSO-E-szinten és nemzeti szinten is folyamatosan változnak; a lecke a működési elvet mutatja be, nem a mindenkori pontos paramétereket.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (4. lecke): Energiapiacok és árképzés – hogyan alakul ki az áram ára (HUPX, merit order, marginális árazás).&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-4&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;4. lecke – Energiapiacok és árképzés&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Hogyan alakul ki az áram ára: HUPX, merit order, marginális árazás&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 19.  •  Adatok: 2024–2025  •  Szint: alapozó+  •  Előzmény: 1–3. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;A 3. leckében láttuk a fizikai rendszert (hálózat, egyensúly). Most a &lt;strong&gt;gazdasági oldal&lt;/strong&gt; jön: ki, kinek, mennyiért adja az áramot? Megértjük, miért tud egy napos napon nullára esni az ár, és miért lőtt ki 2022-ben. Kulcsfogalom a &lt;strong&gt;merit order&lt;/strong&gt; és a &lt;strong&gt;marginális (határköltség-alapú) árazás&lt;/strong&gt;.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;Az áramot többféle piacon adják-veszik, az időtáv szerint: &lt;strong&gt;határidős (futures)&lt;/strong&gt; piac évekkel előre, &lt;strong&gt;másnapi (day-ahead)&lt;/strong&gt; piac a holnapi órákra, &lt;strong&gt;napon belüli (intraday)&lt;/strong&gt; piac a finomhangolásra, és a fizikai &lt;strong&gt;kiegyenlítő&lt;/strong&gt; piac valós időben. Magyarországon a szervezett tőzsde a &lt;strong&gt;HUPX&lt;/strong&gt;.&lt;/p&gt;&lt;p&gt;Az árat a &lt;strong&gt;merit order&lt;/strong&gt; alakítja ki: az erőműveket a &lt;strong&gt;legolcsóbbtól a legdrágábbig&lt;/strong&gt; sorba rendezik, és addig kapcsolják be őket, amíg fedezik a keresletet. Az ára mindenki számára az &lt;strong&gt;utolsó, még szükséges (legdrágább) erőmű költsége&lt;/strong&gt; lesz – ez a marginális árazás. Ezért húzza fel a drága gáz az egész piac árát, és ezért tud a sok olcsó nap/szél lenyomni mindent. A magyar másnapi átlagár 2024-ben kb. &lt;strong&gt;100,9 €/MWh&lt;/strong&gt; volt – az EU egyik legmagasabbja.&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – a merit order&lt;/h1&gt;&lt;p&gt;Képzeld el, hogy minden este árverést tartanak a holnapi minden egyes órájára. Az erőművek beadják, mennyiért hajlandók termelni:&lt;/p&gt;&lt;ol&gt;&lt;li&gt;&lt;strong&gt;Sorba rendezés: &lt;/strong&gt;a legolcsóbbak elöl (nap, szél, atom – alacsony üzemi költség), a drágábbak hátul (gáz, majd a csúcs-gáz).&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Feltöltés a keresletig: &lt;/strong&gt;addig kapcsolják be őket sorban, amíg ki nem elégítik a holnapi órás keresletet.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Egységes ár: &lt;/strong&gt;a piaci ár az utolsó még bekapcsolt erőmű ajánlata lesz – és ezt kapja MINDEN termelő, az olcsók is.&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;strong&gt;Miért így? &lt;/strong&gt;Mert ez ösztönzi a legolcsóbb termelést és a hatékonyságot: aki olcsóbban tud termelni, mint a piaci ár, az nyer. A rendszer így automatikusan a legolcsóbb erőműveket használja először.&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;&lt;h2&gt;3.1 A piacok időtáv szerint&lt;/h2&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Piac&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Időtáv&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mire való?&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Határidős (futures)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;hetek–évek előre&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Kockázatkezelés, ár bebiztosítása (hedging) hosszú távra&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Másnapi (day-ahead)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;előző nap, órás bontás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A fő referenciaár; itt dől el a holnapi órák ára&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Napon belüli (intraday)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;néhány órával előtte&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Finomhangolás, ha változik a termelés/fogyasztás előrejelzés&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Kiegyenlítő (balancing)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;valós idő&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A fizikai egyensúly fenntartása (MAVIR, 3. lecke)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h2&gt;3.2 Marginális árazás – miért húz a gáz?&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Mivel az ár az utolsó még szükséges erőmű határköltsége, és ez tipikusan egy gázerőmű, a gáz ára gyakran „megárazza” az egész piacot. Ezért robbant ki 2022-ben az áramár az orosz gázválság miatt, miközben a megújulók termelési költsége nem változott.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;Ez a rendszer hatékony, de érzékeny: néhány drága gázos óra felhúzhatja az átlagárat. A sok olcsó megújuló ezzel szemben gyakran kiszorítja a gázt a merit orderből, és lenyomja az árat – néha nulláig vagy negatívba. Az árképzés reformja (pl. a gáz és az áram árának szétválasztása) ezért visszatérő EU-szintű vita.&lt;/p&gt;&lt;h2&gt;3.3 Market coupling – egy összekapcsolt európai piac&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az EU másnapi piacai össze vannak kapcsolva (Single Day-Ahead Coupling, SDAC). Egy közös algoritmus úgy osztja el a határkeresztező kapacitásokat, hogy az áram mindig az olcsóbb helyről az drágább felé áramoljon, amíg a vezeték engedi. Ettől a szomszédos országok árai közelítenek egymáshoz, és csökken az összköltség.&lt;/p&gt;&lt;p&gt;A HUPX a regionális összekapcsolódás része (ma az ADEX-csoporthoz tartozik). Ezért a magyar ár szorosan együtt mozog a régióval – ha a vezeték „bedugul” (szűk keresztmetszet), az árak szétválnak, ha van szabad kapacitás, kiegyenlítődnek.&lt;/p&gt;&lt;h2&gt;3.4 Magyar árak a gyakorlatban&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A magyar másnapi átlagár 2024-ben kb. 100,9 €/MWh volt (ACER/ENTSO-E), az EU egyik legmagasabbja. A havi átlagok erősen szórtak: pl. 2024 júliusában ~135,5 €/MWh, novemberben ~163,7 €/MWh. Az ár fő mozgatói: a gáz ára, az import lehetősége, az időjárás (nap/szél), és a kereslet.&lt;/p&gt;&lt;p&gt;&lt;em&gt;A háztartási rezsi NEM ugyanez: a lakossági hatósági/rezsicsökkentett ár külön szabályozott; a tőzsdei ár a nagykereskedelmet és a versenypiaci szerződéseket tükrözi.&lt;/em&gt;&lt;/p&gt;&lt;h1&gt;4. Kulcsszámok és szereplők&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Tétel&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Lényeg / érték&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;HUPX&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A magyar szervezett áramtőzsde (másnapi és napon belüli piac)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Magyar day-ahead átlagár 2024&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~100,9 €/MWh (EU egyik legmagasabbja)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;2024 havi szélsők&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;júl. ~135,5 €/MWh; nov. ~163,7 €/MWh&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Merit order&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Erőművek sorrendje a legolcsóbbtól a legdrágábbig&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Marginális ár&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az utolsó még szükséges erőmű határköltsége adja a piaci árat&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;SDAC (market coupling)&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az EU összekapcsolt másnapi piaca, közös ár-meghatározással&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Negatív ár napos hétvégén: &lt;/strong&gt;ha sok a nap/szél és kicsi a kereslet, annyi olcsó áram van, hogy az ár nullára vagy negatívba esik – a termelők fizetnek, hogy ne kelljen leállniuk.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;2022-es árrobbanás: &lt;/strong&gt;az orosz gáz drágulása a marginális (gázos) órákon keresztül felhúzta az egész áram-nagykereskedelmi árat, jóllehet a megújulók költsége nem nőtt.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Import olcsóbb órákban: &lt;/strong&gt;ha a szomszédban (pl. Ausztriában szeles időben) olcsóbb az áram, a market coupling odairányítja a behozatalt, és lejjebb húzza a magyar árat – amíg a határvezeték bírja.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Merit order&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az erőművek bekapcsolási sorrendje növekvő határköltség szerint.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Marginális (határköltség-) árazás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A piaci ár = az utolsó még szükséges erőmű költsége; mindenki ezt kapja.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Day-ahead / intraday&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Másnapi, illetve napon belüli szervezett piac.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Futures (határidős)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Jövőbeli szállításra kötött ügylet ár bebiztosítására (hedging).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Market coupling (SDAC)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az EU másnapi piacainak összekapcsolása közös algoritmussal.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Szűk keresztmetszet&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Amikor a határvezeték kapacitása elfogy, és az árak szétválnak a régiók közt.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;PPA&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Hosszú távú, kétoldalú áramvásárlási megállapodás (pl. naperőmű és vállalat közt).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;KÁT / METÁR&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Magyar megújuló-támogatási rendszerek (kötelező átvétel, illetve prémium).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;ACER / ENTSO-E – Hungary day-ahead average price 2024 – &lt;a href=&quot;https://www.dayaheadmarket.eu/hungary&quot;&gt;https://www.dayaheadmarket.eu/hungary&lt;/a&gt;&lt;/li&gt;&lt;li&gt;HUPX – a magyar áramtőzsde – &lt;a href=&quot;https://hupx.hu/&quot;&gt;https://hupx.hu/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Serbia/SEE Energy – HUPX 2024 havi árak (júl./nov.) – &lt;a href=&quot;https://serbia-energy.eu/hungary-electricity-prices-soar-in-november-2024-trading-volumes-decline/&quot;&gt;https://serbia-energy.eu/hungary-electricity-prices-soar-in-november-2024-trading-volumes-decline/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;NEMO/ENTSO-E – Single Day-Ahead Coupling (SDAC) magyarázat – &lt;a href=&quot;https://www.entsoe.eu/network_codes/cacm/implementation/sdac/&quot;&gt;https://www.entsoe.eu/network_codes/cacm/implementation/sdac/&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: az árak a nagykereskedelmi tőzsdei értékek; a lakossági (rezsi) ár ettől eltérő, külön szabályozott. A 2024-es átlag forrásonként pár €/MWh-val eltérhet a számítási módszer miatt.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Következő (5. lecke): Az EU energiapolitikája – Green Deal, Fit for 55, REPowerEU, ETS és a 2030/2040 célok.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
&lt;template id=&quot;lesson-5&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;5. lecke – Az EU energiapolitikája&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Green Deal, Fit for 55, REPowerEU, ETS, és a 2030/2040 célok&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. június 19.  •  Adatok: 2025–2026  •  Szint: alapozó+  •  Előzmény: 1–4. lecke&lt;/p&gt;&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hol tartunk?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Az 1–4. leckében a forrásokat, a fizikai rendszert és a piacot néztük. Most a &lt;strong&gt;szabályozási keretet&lt;/strong&gt;: az EU energiapolitikája dönti el, milyen célok, árak és ösztönzők felé mozdul a teljes szektor. Három hajtóerő: &lt;strong&gt;klíma, ellátásbiztonság, megfizethetőség&lt;/strong&gt; – gyakran feszültségben egymással.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;&lt;p&gt;Az EU energiapolitikájának gerince az &lt;strong&gt;Európai Zöld Megállapodás (Green Deal)&lt;/strong&gt;: cél a &lt;strong&gt;klímasemlegesség 2050-re&lt;/strong&gt;. Ennek lépcsői a &lt;strong&gt;Fit for 55&lt;/strong&gt; csomag (–55% kibocsátás 2030-ra 1990-hez képest) és az újonnan elfogadott &lt;strong&gt;2040-es, –90%-os köztes cél&lt;/strong&gt;. A fő piaci eszköz a &lt;strong&gt;kibocsátáskereskedelem (ETS)&lt;/strong&gt;, amely árat ad a CO2-nek.&lt;/p&gt;&lt;p&gt;A 2022-es orosz–ukrán háború után indult a &lt;strong&gt;REPowerEU&lt;/strong&gt;, amelynek célja az orosz fosszilis energiától való gyors függetlenedés (új beszerzési források, energiamegtakarítás, gyorsított megújuló-kiépítés). A megújuló cél 2030-ra &lt;strong&gt;legalább 42,5%&lt;/strong&gt; (törekvés 45%) az unió végső energiafogyasztásában. Új elemek: a &lt;strong&gt;CBAM&lt;/strong&gt; (importált termékek szén-vámja) és a &lt;strong&gt;ETS2&lt;/strong&gt; (a közlekedés és az épületek tüzelőanyagaira).&lt;/p&gt;&lt;h1&gt;2. Egyszerű magyarázat – mit akar elérni az EU?&lt;/h1&gt;&lt;p&gt;Három, egyszerre kezelendő célt egyensúlyoz (az „energia trilemma” uniós szinten):&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Klíma (dekarbonizáció): &lt;/strong&gt;csökkenteni a CO2-kibocsátást, hogy 2050-re az EU klímasemleges legyen.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Ellátásbiztonság: &lt;/strong&gt;ne függjön egyetlen beszállítótól (különösen Oroszországtól) – ezt hozta előtérbe a 2022-es válság.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Megfizethetőség és versenyképesség: &lt;/strong&gt;az átállás ne tegye tönkre a háztartásokat és az ipart.&lt;/li&gt;&lt;/ul&gt;&lt;p&gt;&lt;strong&gt;A fő logika: &lt;/strong&gt;árat adni a szennyezésnek (ETS), kötelező célokat szabni (megújuló, energiahatékonyság), és ezzel a piacot a tiszta megoldások felé terelni – miközben védőhálót feszít a sérülékenyeknek (pl. Szociális Klímaalap).&lt;/p&gt;&lt;h1&gt;3. Részletes magyarázat – a fő építőelemek&lt;/h1&gt;&lt;h2&gt;3.1 Green Deal és a klímacélok&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az Európai Zöld Megállapodás (2019) tűzte ki a 2050-es klímasemlegességet, amit az európai klímatörvény jogilag kötelezővé tett. Köztes célok: 2030-ra –55%, és a 2025–2026-ban elfogadott 2040-es cél –90% (1990-hez képest). A 2040-es célt a Tanács 2026 elején véglegesítette.&lt;/p&gt;&lt;h2&gt;3.2 Fit for 55 – a megvalósító csomag&lt;/h2&gt;&lt;p&gt;A Fit for 55 a 2030-as –55%-os cél elérésére szolgáló jogszabálycsomag. Főbb elemei:&lt;/p&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;Megújuló irányelv (RED III): &lt;/strong&gt;2030-ra legalább 42,5% megújuló (törekvés 45%) a végső energiafogyasztásban.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;Energiahatékonysági irányelv: &lt;/strong&gt;kötelező megtakarítási célok.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;ETS megerősítése + ETS2: &lt;/strong&gt;szigorúbb kibocsátási plafon, és új rendszer a közlekedésre/épületekre.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;CBAM: &lt;/strong&gt;szén-vám az importált, szénintenzív termékekre (acél, cement, alumínium stb.).&lt;/li&gt;&lt;/ul&gt;&lt;h2&gt;3.3 ETS – a szén ára&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az EU kibocsátáskereskedelmi rendszere (ETS) korlátozza, hány tonna CO2 bocsátható ki, és kvótákat ad/árvereztet rá – a kvóta ára a piacon alakul. 2025 folyamán az ár jellemzően ~70–85 €/tonna körül mozgott. Minél drágább a kvóta, annál inkább megéri a tiszta termelés. Az ETS bevételei részben a tagállamok zöld beruházásait finanszírozzák.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az ETS2 a közúti közlekedés és az épületek tüzelőanyagaira terjeszti ki a rendszert; az indulását egy évvel, 2027-ről 2028-ra halasztották. A CBAM véglegesítő szakasza 2026-ban indul (a 2026-os importra fizetendő kvótákat 2027 februárjától kell megvásárolni); az első CBAM-kvótaár 2026 I. negyedévre 75,36 €/tonna volt.&lt;/p&gt;&lt;h2&gt;3.4 REPowerEU – függetlenedés az orosz energiától&lt;/h2&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A 2022-ben indított REPowerEU terv célja az orosz fosszilis energiától való gyors leválás: beszerzési források diverzifikálása (LNG, más vezetékek), energiamegtakarítás, és a megújulók/hőszivattyúk gyorsított kiépítése. Az EU célja, hogy 2027 végére teljesen kivezesse az orosz gázt a piacáról.&lt;/p&gt;&lt;h2&gt;3.5 Magyar vonatkozások&lt;/h2&gt;&lt;p&gt;Magyarországnak az uniós célok teljesítéséhez aktualizált &lt;strong&gt;Nemzeti Energia- és Klímatervet (NEKT)&lt;/strong&gt; kell követnie. Sajátosságok: a &lt;strong&gt;magas orosz energiafüggőség&lt;/strong&gt; (gáz ~78%, olaj kitettség ~86%) miatt Magyarország fenntartásokkal viszonyul a leváláshoz, és kivételeket kért (pl. a Paks II-t az EU 2024-ben mentesítette a szankciók alól; a Barátság kőolajvezetékre is mentességek vonatkoztak). Eközben a &lt;strong&gt;napenergia és az atomenergia&lt;/strong&gt; támogatása a hazai stratégia sarokköve.&lt;/p&gt;&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;Az EU energiapolitikája és a magyar érdek itt gyakran feszül: az unió gyors, teljes orosz leválást és agresszív dekarbonizációt sürget, a magyar kormány viszont az ellátásbiztonságra és a megfizethetőségre hivatkozva lassabb, kivételekkel tűzdelt utat képvisel. Ez a vita a következő években a szektor egyik fő tétje.&lt;/p&gt;&lt;h1&gt;4. Kulcsszámok és határidők&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Cél / eszköz&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték / határidő&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Klímasemlegesség&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2050 (jogilag kötelező)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Kibocsátás-csökkentés 2030&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;–55% (1990-hez képest)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Kibocsátás-csökkentés 2040&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;–90% (újonnan elfogadott köztes cél)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Megújuló részarány 2030&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;legalább 42,5% (törekvés 45%)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;ETS kvótaár 2025&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~70–85 €/tonna CO2&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;ETS2 indulása&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2028 (egy évvel halasztva)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;CBAM véglegesítés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2026 (első kvótaár ~75,36 €/t, 2026 Q1)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Orosz gáz kivezetése&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2027 vége&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;5. Valós példák&lt;/h1&gt;&lt;ul&gt;&lt;li&gt;&lt;strong&gt;ETS és a szénerőművek: &lt;/strong&gt;a növekvő kvótaár tette gazdaságtalanná a szenet – ez is hozzájárult ahhoz, hogy a magyar lignites termelést 2025-re kivezessék.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;CBAM és az import acél: &lt;/strong&gt;egy szénintenzív országból behozott acélra a CBAM miatt szén-vámot kell fizetni, hogy ne legyen olcsóbb, mint az EU-ban tisztábban gyártott – így védi az unió a saját, dekarbonizáló iparát.&lt;/li&gt;&lt;li&gt;&lt;strong&gt;REPowerEU a gyakorlatban: &lt;/strong&gt;LNG-terminálok bővítése és új vezetékek (pl. a déli folyosó) azért épültek, hogy az orosz csővezetékes gáz kiváltható legyen.&lt;/li&gt;&lt;/ul&gt;&lt;h1&gt;6. Fogalomtár&lt;/h1&gt;&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Green Deal&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Az EU 2019-es növekedési-klímastratégiája; cél a 2050-es klímasemlegesség.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Fit for 55&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A 2030-as –55%-os cél elérésére szolgáló jogszabálycsomag.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;RED III&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;A megújuló energia irányelv legújabb változata (42,5% cél 2030-ra).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;ETS / ETS2&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Kibocsátáskereskedelem; ETS2 a közlekedésre és épületekre terjeszti ki.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;CBAM&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Szén-vám az importált, szénintenzív termékekre (karbonszivárgás ellen).&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;REPowerEU&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;2022-es terv az orosz fosszilis energiától való gyors függetlenedésre.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;NEKT&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Nemzeti Energia- és Klímaterv: a tagállami megvalósítás dokumentuma.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;Karbonszivárgás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;Amikor a termelés a szigorúbb szabályok elől lazább országba költözik.&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;/table&gt;&lt;h1&gt;7. Források&lt;/h1&gt;&lt;ol&gt;&lt;li&gt;Európai Tanács – 2040 climate target, 90% emissions reduction (2025–2026) – &lt;a href=&quot;https://www.consilium.europa.eu/en/press/press-releases/2026/03/05/2040-climate-target-council-gives-final-green-light/&quot;&gt;https://www.consilium.europa.eu/en/press/press-releases/2026/03/05/2040-climate-target-council-gives-final-green-light/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Európai Tanács – Fit for 55 áttekintés – &lt;a href=&quot;https://www.consilium.europa.eu/en/policies/fit-for-55/&quot;&gt;https://www.consilium.europa.eu/en/policies/fit-for-55/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;ICAP – EU adopts 2040 target, postpones ETS2 to 2028 – &lt;a href=&quot;https://icapcarbonaction.com/en/news/eu-officially-adopts-2040-climate-target-postpones-ets-2-one-year&quot;&gt;https://icapcarbonaction.com/en/news/eu-officially-adopts-2040-climate-target-postpones-ets-2-one-year&lt;/a&gt;&lt;/li&gt;&lt;li&gt;Európai Bizottság – REPowerEU – &lt;a href=&quot;https://commission.europa.eu/strategy-and-policy/priorities-2019-2024/european-green-deal/repowereu-affordable-secure-and-sustainable-energy-europe_en&quot;&gt;https://commission.europa.eu/strategy-and-policy/priorities-2019-2024/european-green-deal/repowereu-affordable-secure-and-sustainable-energy-europe_en&lt;/a&gt;&lt;/li&gt;&lt;li&gt;RED III – 42,5%-os megújuló cél (2030) – &lt;a href=&quot;https://www.consilium.europa.eu/en/press/press-releases/2023/10/09/&quot;&gt;https://www.consilium.europa.eu/en/press/press-releases/2023/10/09/&lt;/a&gt;&lt;/li&gt;&lt;li&gt;CBAM – első kvótaár 2026 Q1 (carboncredits.com összefoglaló) – &lt;a href=&quot;https://carboncredits.com/eu-carbon-prices-hit-2025-highs-as-2040-climate-target-tightens-the-market/&quot;&gt;https://carboncredits.com/eu-carbon-prices-hit-2025-highs-as-2040-climate-target-tightens-the-market/&lt;/a&gt;&lt;/li&gt;&lt;/ol&gt;&lt;p&gt;&lt;em&gt;Megjegyzés: az EU-szabályozás gyorsan változik; a fenti határidők és értékek a 2025–2026-os állapotot tükrözik. Konkrét megfelelési vagy beruházási döntés előtt elsődleges (EU-intézményi) forrás ellenőrzése ajánlott.&lt;/em&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Ezzel az alapozó blokk (1–5. lecke) teljes. Következő lehetséges irány (6. lecke): A magyar energiaszektor mélyebben – MAVIR, MEKH, MVM, Paks és Paks II, hazai stratégia.&lt;/strong&gt;&lt;/p&gt;&lt;/template&gt;
