téken érkezik az orosz nyersolaj Magyarországra?&quot;, &quot;o&quot;: [&quot;Barátság (Druzsba)&quot;, &quot;TurkStream&quot;, &quot;TAP&quot;, &quot;Déli Áramlat&quot;], &quot;a&quot;: 0, &quot;e&quot;: &quot;A kőolaj a Barátság (Druzsba) vezetéken érkezik; nagyságrendileg ~5 millió tonna/év.&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Melyik a három klasszikus energiabiztonsági szempont?&quot;, &quot;o&quot;: [&quot;Ár, adó, profit&quot;, &quot;Elérhetőség, hozzáférhetőség, megfizethetőség&quot;, &quot;Nap, szél, víz&quot;, &quot;Termelés, tárolás, fogyasztás&quot;], &quot;a&quot;: 1, &quot;e&quot;: &quot;A három „A”: availability, accessibility, affordability.&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Melyik NEM a diverzifikáció eszköze Magyarországon?&quot;, &quot;o&quot;: [&quot;Krk-szigeti LNG lekötése&quot;, &quot;Azeri gázmegállapodás&quot;, &quot;Az egyetlen útvonaltól való teljes függés&quot;, &quot;Interkonnektorok a szomszédokkal&quot;], &quot;a&quot;: 2, &quot;e&quot;: &quot;A diverzifikáció épp az egyetlen forrás/útvonal függőségét oldja – LNG, azeri gáz, összekötők, tárolás révén.&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Mi az EU REPowerEU fő célja?&quot;, &quot;o&quot;: [&quot;Több orosz gáz&quot;, &quot;Az orosz fosszilis energiától való függetlenedés&quot;, &quot;Atomerőművek bezárása&quot;, &quot;Alacsonyabb megújuló arány&quot;], &quot;a&quot;: 1, &quot;e&quot;: &quot;A REPowerEU az orosz fosszilis energia kivezetését célozza; a terv szerint ~2027 végéig (jogalkotás alatt).&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Miért nem oldható meg egyik napról a másikra az orosz olajfüggőség?&quot;, &quot;o&quot;: [&quot;Nincs alternatíva sehol&quot;, &quot;A finomító (Százhalombatta) részben orosz típusú nyersolajra van hangolva&quot;, &quot;Tilos a törvény szerint&quot;, &quot;Mert olcsóbb a benzin&quot;], &quot;a&quot;: 1, &quot;e&quot;: &quot;A finomító átállítása nem-orosz nyersolajra műszaki beruházást és időt igényel.&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Mit jelent az N–1 kritérium az ellátásbiztonságban?&quot;, &quot;o&quot;: [&quot;Egy forrás elég&quot;, &quot;A legnagyobb egyetlen infrastruktúra kiesésének elviselése&quot;, &quot;Egy évnyi tartalék&quot;, &quot;Egyetlen szállító&quot;], &quot;a&quot;: 1, &quot;e&quot;: &quot;Az N–1 szerint a rendszernek a legnagyobb egyetlen elem (pl. fő vezeték) kiesését is el kell viselnie.&quot;}], &quot;cards&quot;: [[&quot;Energiabiztonság&quot;, &quot;Folyamatos, megbízható, megfizethető energiaellátás.&quot;], [&quot;Diverzifikáció&quot;, &quot;Több forrás/útvonal a függőség és kockázat csökkentésére.&quot;], [&quot;TurkStream&quot;, &quot;Az orosz gáz fő útvonala Magyarországra.&quot;], [&quot;Druzsba (Barátság)&quot;, &quot;Az orosz nyersolaj fő csővezetéke Magyarországra.&quot;], [&quot;REPowerEU&quot;, &quot;Az EU stratégiája az orosz fosszilis energia kivezetésére (~2027 vége).&quot;]]}};
const TITLES = {&quot;1&quot;: &quot;Bevezetés és tájékozódás&quot;, &quot;2&quot;: &quot;Energiaforrások A–Z&quot;, &quot;3&quot;: &quot;A villamosenergia-rendszer&quot;, &quot;4&quot;: &quot;Energiapiacok és árképzés&quot;, &quot;5&quot;: &quot;Az EU energiapolitikája&quot;, &quot;6&quot;: &quot;A magyar energiaszektor&quot;, &quot;7&quot;: &quot;Energiatárolás és rugalmasság&quot;, &quot;8&quot;: &quot;Földgáz és olaj&quot;, &quot;9&quot;: &quot;Az energiaátmenet és a jövő&quot;, &quot;10&quot;: &quot;Nukleáris energia és a Paks-sztori&quot;, &quot;11&quot;: &quot;Nap- és szélenergia a gyakorlatban&quot;, &quot;12&quot;: &quot;Rendszerirányítás és kiegyenlítő piacok&quot;, &quot;13&quot;: &quot;Energiakereskedelem, kockázatkezelés és PPA-k&quot;, &quot;14&quot;: &quot;Energiabiztonság és geopolitika&quot;};
const LNUMS = Object.keys(QUIZ).map(Number).sort(function(a,b){return a-b;});
const MAXL = Math.max.apply(null, LNUMS);
const ROUND = 10;
let mode = &#x27;quiz&#x27;;

function esc(s){ return String(s).replace(/&amp;/g,&#x27;&amp;amp;&#x27;).replace(/&lt;/g,&#x27;&amp;lt;&#x27;).replace(/&gt;/g,&#x27;&amp;gt;&#x27;); }
function shuffle(a){ for(let i=a.length-1;i&gt;0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

const upto = document.getElementById(&#x27;upto&#x27;);
LNUMS.forEach(function(n){ const o=document.createElement(&#x27;option&#x27;); o.value=n; o.textContent=n+&#x27;. lecke&#x27;; upto.appendChild(o); });
upto.value = MAXL;
try{ const sv=localStorage.getItem(&#x27;en_kik_upto&#x27;); if(sv &amp;&amp; QUIZ[sv]) upto.value=sv; const sm=localStorage.getItem(&#x27;en_kik_mode&#x27;); if(sm===&#x27;quiz&#x27;||sm===&#x27;card&#x27;) mode=sm; }catch(e){}
upto.addEventListener(&#x27;change&#x27;, updateInfo);

function collect(kind){
  const n = +upto.value; let out=[];
  LNUMS.filter(function(x){return x&lt;=n;}).forEach(function(x){ (QUIZ[x][kind]||[]).forEach(function(it){ out.push(it); }); });
  return out;
}
function updateInfo(){
  const n=+upto.value;
  const qn=collect(&#x27;questions&#x27;).length, cn=collect(&#x27;cards&#x27;).length;
  document.getElementById(&#x27;rangeInfo&#x27;).textContent=&#x27;(1–&#x27;+n+&#x27;. lecke)&#x27;;
  document.getElementById(&#x27;titleInfo&#x27;).innerHTML = LNUMS.filter(function(x){return x&lt;=n;}).map(function(x){return &#x27;&lt;b&gt;&#x27;+x+&#x27;.&lt;/b&gt; &#x27;+esc(TITLES[x]);}).join(&#x27; · &#x27;);
  document.getElementById(&#x27;startHint&#x27;).textContent = (mode===&#x27;quiz&#x27;)
    ? (&#x27;Ebből &#x27;+qn+&#x27; kérdésből &#x27;+Math.min(ROUND,qn)+&#x27; jön, véletlen sorrendben.&#x27;)
    : (cn+&#x27; villámkártya ebben a tartományban, keverve.&#x27;);
  try{ localStorage.setItem(&#x27;en_kik_upto&#x27;, n); }catch(e){}
}
function setMode(m){
  mode=m;
  document.getElementById(&#x27;mQuiz&#x27;).classList.toggle(&#x27;active&#x27;, m===&#x27;quiz&#x27;);
  document.getElementById(&#x27;mCard&#x27;).classList.toggle(&#x27;active&#x27;, m===&#x27;card&#x27;);
  try{ localStorage.setItem(&#x27;en_kik_mode&#x27;, m); }catch(e){}
  updateInfo();
}
function backToSetup(){
  document.getElementById(&#x27;setup&#x27;).style.display=&#x27;&#x27;;
  document.getElementById(&#x27;quizWrap&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;cardWrap&#x27;).style.display=&#x27;none&#x27;;
  window.scrollTo(0,0);
}
function start(){ if(mode===&#x27;quiz&#x27;) startQuiz(); else startCards(); }

/* ---------- KVÍZ ---------- */
let qs=[], qi=0, score=0;
function startQuiz(){
  qs = shuffle(collect(&#x27;questions&#x27;)).slice(0, ROUND);
  if(!qs.length){ alert(&#x27;Nincs kérdés ebben a tartományban.&#x27;); return; }
  qi=0; score=0;
  document.getElementById(&#x27;setup&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;cardWrap&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;quizWrap&#x27;).style.display=&#x27;&#x27;;
  renderQ(); window.scrollTo(0,0);
}
function renderQ(){
  if(qi&gt;=qs.length){ return endQuiz(); }
  const it=qs[qi];
  document.getElementById(&#x27;qProg&#x27;).textContent=&#x27;Kérdés &#x27;+(qi+1)+&#x27; / &#x27;+qs.length+&#x27;  ·  Pont: &#x27;+score;
  document.getElementById(&#x27;qBar&#x27;).style.width=(qi/qs.length*100)+&#x27;%&#x27;;
  let html=&#x27;&lt;span class=&quot;tag&quot;&gt;&#x27;+esc(it.l)+&#x27;&lt;/span&gt;&lt;div class=&quot;q&quot;&gt;&#x27;+esc(it.q)+&#x27;&lt;/div&gt;&lt;div class=&quot;opts&quot;&gt;&#x27;;
  it.o.forEach(function(o,idx){ html+=&#x27;&lt;button class=&quot;opt&quot; onclick=&quot;answer(&#x27;+idx+&#x27;)&quot;&gt;&#x27;+esc(o)+&#x27;&lt;/button&gt;&#x27;; });
  html+=&#x27;&lt;/div&gt;&lt;div id=&quot;expl&quot;&gt;&lt;/div&gt;&#x27;;
  document.getElementById(&#x27;qBody&#x27;).innerHTML=html;
}
function answer(idx){
  const it=qs[qi];
  const opts=document.querySelectorAll(&#x27;#qBody .opt&#x27;);
  opts.forEach(function(b,i){ b.disabled=true; if(i===it.a) b.classList.add(&#x27;correct&#x27;); if(i===idx &amp;&amp; idx!==it.a) b.classList.add(&#x27;wrong&#x27;); });
  if(idx===it.a) score++;
  document.getElementById(&#x27;qProg&#x27;).textContent=&#x27;Kérdés &#x27;+(qi+1)+&#x27; / &#x27;+qs.length+&#x27;  ·  Pont: &#x27;+score;
  const last = (qi+1&gt;=qs.length);
  document.getElementById(&#x27;expl&#x27;).innerHTML =
    &#x27;&lt;div class=&quot;expl&quot;&gt;&#x27;+(idx===it.a?&#x27;✅ Helyes! &#x27;:&#x27;❌ Helytelen. &#x27;)+esc(it.e||&#x27;&#x27;)+&#x27;&lt;/div&gt;&#x27;+
    &#x27;&lt;button class=&quot;btn big&quot; onclick=&quot;nextQ()&quot;&gt;&#x27;+(last?&#x27;Eredmény ▶&#x27;:&#x27;Következő ▶&#x27;)+&#x27;&lt;/button&gt;&#x27;;
}
function nextQ(){ qi++; renderQ(); window.scrollTo(0,0); }
function endQuiz(){
  document.getElementById(&#x27;qBar&#x27;).style.width=&#x27;100%&#x27;;
  document.getElementById(&#x27;qProg&#x27;).textContent=&#x27;Kész!&#x27;;
  const n=+upto.value, pct=Math.round(score/qs.length*100);
  let best=0; try{ best=+localStorage.getItem(&#x27;en_kik_best_&#x27;+n)||0; }catch(e){}
  const isBest = pct&gt;best;
  if(isBest){ try{ localStorage.setItem(&#x27;en_kik_best_&#x27;+n, pct); }catch(e){} best=pct; }
  document.getElementById(&#x27;qBody&#x27;).innerHTML =
    &#x27;&lt;div class=&quot;result&quot;&gt;&lt;div class=&quot;score&quot;&gt;&#x27;+score+&#x27; / &#x27;+qs.length+&#x27;&lt;/div&gt;&#x27;+
    &#x27;&lt;div class=&quot;progress&quot;&gt;&#x27;+pct+&#x27;%&#x27;+(isBest?&#x27; · 🏆 új rekord!&#x27;:&#x27;&#x27;)+&#x27;&lt;/div&gt;&#x27;+
    &#x27;&lt;div class=&quot;best&quot;&gt;Legjobb eredmény (1–&#x27;+n+&#x27;. lecke): &#x27;+best+&#x27;%&lt;/div&gt;&#x27;+
    &#x27;&lt;button class=&quot;btn big&quot; onclick=&quot;startQuiz()&quot;&gt;Új kör 🔁&lt;/button&gt;&#x27;+
    &#x27;&lt;button class=&quot;btn ghost big&quot; onclick=&quot;backToSetup()&quot;&gt;↩ Beállítások&lt;/button&gt;&lt;/div&gt;&#x27;;
}

/* ---------- VILLÁMKÁRTYA ---------- */
let cards=[], ci=0, flipped=false;
function startCards(){
  cards = shuffle(collect(&#x27;cards&#x27;));
  if(!cards.length){ alert(&#x27;Nincs villámkártya ebben a tartományban.&#x27;); return; }
  ci=0; flipped=false;
  document.getElementById(&#x27;setup&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;quizWrap&#x27;).style.display=&#x27;none&#x27;;
  document.getElementById(&#x27;cardWrap&#x27;).style.display=&#x27;&#x27;;
  renderCard(); window.scrollTo(0,0);
}
function renderCard(){
  const c=cards[ci];
  document.getElementById(&#x27;cProg&#x27;).textContent=&#x27;Kártya &#x27;+(ci+1)+&#x27; / &#x27;+cards.length;
  document.getElementById(&#x27;cBar&#x27;).style.width=((ci+1)/cards.length*100)+&#x27;%&#x27;;
  document.getElementById(&#x27;cardInner&#x27;).innerHTML = (!flipped)
    ? &#x27;&lt;div class=&quot;face front&quot;&gt;&lt;div&gt;&lt;div class=&quot;flabel&quot;&gt;Fogalom&lt;/div&gt;&lt;div&gt;&#x27;+esc(c[0])+&#x27;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&#x27;
    : &#x27;&lt;div class=&quot;face back&quot;&gt;&lt;div&gt;&lt;div class=&quot;flabel&quot;&gt;Magyarázat&lt;/div&gt;&lt;div&gt;&#x27;+esc(c[1])+&#x27;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&#x27;;
}
function flip(){ flipped=!flipped; renderCard(); }
function nextCard(){ ci=(ci+1)%cards.length; flipped=false; renderCard(); }
function prevCard(){ ci=(ci-1+cards.length)%cards.length; flipped=false; renderCard(); }

updateInfo();
&lt;/script&gt;

<script>
const VIEWS=['tan','news','units','quiz'];

  VIEWS.forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('hidden',x!==v);
    document.getElementById('tab-'+x).classList.toggle('active',x===v);
  });
  try{localStorage.setItem('energetika_view',v);}catch(e){}
}
try{var v=localStorage.getItem('energetika_view'); if(VIEWS.includes(v)&&v!=='tan') showView(v);}catch(e){}
