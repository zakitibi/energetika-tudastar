&lt;/ol&gt;
&lt;/template&gt;
&lt;template id=&quot;lesson-13&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;13. lecke – Energiakereskedelem, kockázatkezelés és PPA-k&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Hogyan adják-veszik az áramot, és hogyan védekeznek az árkockázat ellen?&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. július 2. • Adatok: 2024–2026 • Szint: haladó&lt;/p&gt;
&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; / &lt;strong&gt;BECSLÉS&lt;/strong&gt; / &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt;. Ez a lecke a 4. lecke (piacok és árképzés) folytatása: most a &lt;em&gt;kereskedő&lt;/em&gt; szemszögéből nézzük, milyen termékekkel és eszközökkel dolgozik.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;
&lt;p&gt;Az áramot nem egyetlen piacon adják-veszik, hanem egy &lt;strong&gt;időbeli láncon&lt;/strong&gt;: évekkel előre a &lt;strong&gt;határidős (futures)&lt;/strong&gt; piacon, egy nappal előre a &lt;strong&gt;másnapi (day-ahead)&lt;/strong&gt; tőzsdén, a szállítás napján a &lt;strong&gt;napon belüli (intraday)&lt;/strong&gt; piacon, végül valós időben a &lt;strong&gt;kiegyenlítő&lt;/strong&gt; piacon (12. lecke). A magyar spotpiac működtetője a &lt;strong&gt;HUPX&lt;/strong&gt;, a határidős, fizikai teljesítésű magyar termékeket a &lt;strong&gt;HUPX–EEX&lt;/strong&gt; együttműködés kínálja. A cél a &lt;strong&gt;kockázatkezelés&lt;/strong&gt;: az ár- és mennyiségi kockázat elleni fedezés (hedging). Egyre népszerűbbek a &lt;strong&gt;PPA-k&lt;/strong&gt; (áramvásárlási megállapodások), amelyekkel a fogyasztók és a termelők hosszú távra rögzítik az árat.&lt;/p&gt;

&lt;h1&gt;2. Egyszerű magyarázat – az áram mint romlandó áru&lt;/h1&gt;
&lt;p&gt;Az áram különleges áru: &lt;strong&gt;nem raktározható közvetlenül&lt;/strong&gt;, és minden pillanatban egyensúlyt kell tartani. Ezért az árát erősen befolyásolja, hogy &lt;em&gt;mikorra&lt;/em&gt; szól a szállítás. Egy tél előre lekötött áram ára más, mint a holnapi, és megint más, mint a most, ebben az órában szükséges áramé. A kereskedő ezen az időbeli láncon mozog: előre bebiztosítja a nagy részt, a finomhangolást pedig a szállításhoz közeledve végzi.&lt;/p&gt;
&lt;p&gt;&lt;strong&gt;Kulcsgondolat: &lt;/strong&gt;a kereskedelem nagy része &lt;strong&gt;nem spekuláció&lt;/strong&gt;, hanem &lt;strong&gt;fedezés&lt;/strong&gt; – a termelő és a fogyasztó is a kiszámíthatóságot keresi.&lt;/p&gt;

&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;
&lt;h2&gt;3.1 A piaci idővonal&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Határidős / futures (évek–hetek előre): &lt;/strong&gt;a &lt;strong&gt;HUPX és az EEX&lt;/strong&gt; fizikai teljesítésű magyar termékeket kínál – heti, havi, negyedéves és éves &lt;strong&gt;zsinór (base)&lt;/strong&gt; és &lt;strong&gt;csúcs (peak)&lt;/strong&gt; szerződéseket. Itt köti le a nagy fogyasztó/termelő a portfóliója zömét.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Másnapi / day-ahead (D–1): &lt;/strong&gt;a HUPX napi aukciója, amely az európai &lt;strong&gt;SDAC&lt;/strong&gt; (Single Day-Ahead Coupling) rendszeréhez kapcsolódik; a közös &lt;strong&gt;EUPHEMIA&lt;/strong&gt; algoritmus egyetlen aukcióban párosítja az ajánlatokat 15 tőzsde (NEMO) között. Ez adja a leggyakrabban idézett „másnapi árat”.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Napon belüli / intraday (a szállítás napján): &lt;/strong&gt;folyamatos kereskedés az európai &lt;strong&gt;SIDC/XBID&lt;/strong&gt; rendszerben; a HUPX 2019. november 19-én csatlakozott. Itt korrigálják az előrejelzési hibákat (pl. váratlan felhő).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Kiegyenlítő (valós idő): &lt;/strong&gt;a MAVIR tartalékpiaca (12. lecke) zárja a láncot.&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A HUPX &lt;strong&gt;NEMO&lt;/strong&gt; (kijelölt villamosenergiapiac-üzemeltető), MEKH-engedéllyel; a spot mellett a határidős fizikai teljesítést az EE-vel közösen biztosítja. (Forrás: HUPX; ENTSO-E SDAC.)&lt;/p&gt;

&lt;h2&gt;3.2 Zsinór (base) vs. csúcs (peak)&lt;/h2&gt;
&lt;p&gt;A &lt;strong&gt;zsinór (baseload)&lt;/strong&gt; termék minden órára azonos mennyiséget jelent (24/7). A &lt;strong&gt;csúcs (peak)&lt;/strong&gt; jellemzően a munkanapok 8–20 óra közötti, magasabb keresletű időszakára szól. Egy fogyasztó a saját &lt;strong&gt;fogyasztási profiljához&lt;/strong&gt; illeszti a kettőt – a fennmaradó eltérést (a „profil-” vagy „alakkockázatot”) a spotpiacon vagy a szolgáltatóján keresztül kezeli.&lt;/p&gt;

&lt;h2&gt;3.3 A kockázatok és a fedezés&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Árkockázat: &lt;/strong&gt;a piaci ár elmozdul – fedezhető határidős vétellel/eladással.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Mennyiségi / volumenkockázat: &lt;/strong&gt;a tényleges fogyasztás/termelés eltér a tervezettől.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Profil- / alakkockázat: &lt;/strong&gt;a fogyasztás időbeli mintázata nem egyezik a lekötött termékkel.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Kiegyenlítő (imbalance) kockázat: &lt;/strong&gt;a menetrendtől való eltérés díja.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Partner- / hitelkockázat: &lt;/strong&gt;a másik fél nem teljesít – a tőzsdei elszámolóház (klíring) ezt csökkenti.&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;strong&gt;Analógia: &lt;/strong&gt;a fedezés olyan, mint a fix kamatozású hitel: kevésbé jársz jól, ha esik az ár, de véded magad a drágulástól – a lényeg a &lt;em&gt;kiszámíthatóság&lt;/em&gt;, nem a maximális profit.&lt;/p&gt;

&lt;h2&gt;3.4 PPA-k – hosszú távú áramvásárlási megállapodások&lt;/h2&gt;
&lt;p&gt;A &lt;strong&gt;PPA (Power Purchase Agreement)&lt;/strong&gt; egy termelő és egy vevő közötti, gyakran 10–15 éves szerződés rögzített vagy indexált áron. Típusai:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Fizikai PPA: &lt;/strong&gt;a vevő ténylegesen átveszi az áramot (közvetlenül vagy „sleeved”, azaz egy kereskedőn keresztül becsatornázva).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Virtuális / pénzügyi PPA (vPPA): &lt;/strong&gt;nincs fizikai szállítás; a felek a rögzített és a piaci ár különbözetét számolják el (különbözeti szerződés, CfD-jelleg).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Vállalati (corporate) PPA: &lt;/strong&gt;egy nagyvállalat (pl. adatközpont, gyár) közvetlenül szerződik egy nap- vagy szélparkkal – zöldáram-ellátásra és árstabilitásra.&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY: &lt;/strong&gt;A PPA-k egyszerre segítik a megújuló beruházások finanszírozását (bankképesség, kiszámítható bevétel) és a fogyasztók árkockázat-kezelését. Ugyanakkor hosszú távú kötelezettséget jelentenek: ha a piaci ár tartósan a rögzített alá esik, a vevő „drágábban” vásárol – a mérleg a jövőbeli áraktól függ.&lt;/p&gt;

&lt;h1&gt;4. Kulcsfogalmak egy lapon&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Piac / termék&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Időhorizont&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Szereplő/rendszer&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Határidős (base/peak)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;évek–hetek előre&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;HUPX–EEX&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Másnapi (day-ahead)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;D–1, napi aukció&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;HUPX, SDAC/EUPHEMIA&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Napon belüli (intraday)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;szállítás napján&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;HUPX, SIDC/XBID (2019–)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Kiegyenlítő&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;valós idő&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;MAVIR (PICASSO/MARI)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;PPA&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;10–15 év&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;termelő ↔ vevő&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;&lt;/table&gt;

&lt;h1&gt;5. Valós példák&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Ipari fogyasztó: &lt;/strong&gt;a jövő évi fogyasztása 70%-át éves zsinór-futuresben leköti (fedezés), a maradékot a másnapi és napon belüli piacon finomhangolja.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Adatközpont vPPA-ja: &lt;/strong&gt;egy adatközpont 15 éves virtuális PPA-t köt egy naperőműparkkal → zöld igazolás + árstabilitás, fizikai szállítás nélkül.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Napon belüli korrekció: &lt;/strong&gt;délelőtt beborul az ég, a naptermelés a vártnál kevesebb → a kereskedő intraday vásárol, hogy elkerülje a drágább kiegyenlítő díjat.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;6. Gyakori tévhitek&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;„A kereskedés csak spekuláció.” &lt;/strong&gt;A forgalom nagy része fedezés – a kiszámíthatóságért, nem a gyors profitért.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A day-ahead ár a végső fogyasztói ár.” &lt;/strong&gt;Nem: a lakossági/ipari ár tartalmaz hálózati díjat, adókat, KÁT/METÁR-t és a szolgáltató árrését is.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A zöld PPA azt jelenti, hogy fizikailag napenergiát kapok.” &lt;/strong&gt;Virtuális PPA-nál pénzügyi elszámolás történik; a „zöldség” tanúsítványokkal (pl. eredetgaranciával) igazolt.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Futures / határidős&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Előre rögzített áras szerződés jövőbeli szállításra (base/peak).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Day-ahead (SDAC)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Másnapi aukciós piac, közös európai algoritmussal (EUPHEMIA).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Intraday (SIDC/XBID)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Folyamatos, határkeresztező napon belüli kereskedés.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;NEMO&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Kijelölt villamosenergiapiac-üzemeltető (Magyarországon a HUPX).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hedging (fedezés)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Árkockázat csökkentése ellentétes pozícióval / előre rögzített árral.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;PPA&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Hosszú távú áramvásárlási megállapodás (fizikai, virtuális, vállalati).&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;&lt;/table&gt;

&lt;template id=&quot;lesson-14&quot;&gt;&lt;p&gt;&lt;strong&gt;ENERGETIKA – TANANYAG&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;strong&gt;14. lecke – Energiabiztonság és geopolitika&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;&lt;em&gt;Importfüggőség, diverzifikáció és a magyar dilemma&lt;/em&gt;&lt;/p&gt;&lt;p&gt;Készült: 2026. július 2. • Adatok: 2022–2026 • Szint: haladó&lt;/p&gt;
&lt;table&gt;&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Hogyan olvasd?&lt;/strong&gt;&lt;/p&gt;&lt;p&gt;Jelölések: &lt;strong&gt;TÉNY&lt;/strong&gt; / &lt;strong&gt;BECSLÉS&lt;/strong&gt; / &lt;strong&gt;VÉLEMÉNY&lt;/strong&gt;. Ez a lecke összeköti az 5. leckét (EU-energiapolitika) és a 8. leckét (földgáz/olaj) a magyar valósággal. Politikailag érzékeny téma – a nézőpontokat kiegyensúlyozottan mutatom be.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;&lt;/table&gt;

&lt;h1&gt;1. Vezetői összefoglaló&lt;/h1&gt;
&lt;p&gt;Az &lt;strong&gt;energiabiztonság&lt;/strong&gt; azt jelenti, hogy az energia &lt;strong&gt;folyamatosan, megbízhatóan és megfizethető áron&lt;/strong&gt; elérhető. Magyarország sarokpontja az &lt;strong&gt;importfüggőség&lt;/strong&gt;: a földgáz és a kőolaj túlnyomó része &lt;strong&gt;orosz forrásból&lt;/strong&gt; érkezik, jellemzően a &lt;strong&gt;TurkStream&lt;/strong&gt; (gáz) és a &lt;strong&gt;Barátság/Druzsba&lt;/strong&gt; (olaj) vezetékeken. Az EU célja az orosz fosszilis energia kivezetése (REPowerEU), miközben Magyarország a folytonosságra és az árelőnyre hivatkozva ragaszkodik a jelenlegi útvonalakhoz. A megoldás kulcsszava a &lt;strong&gt;diverzifikáció&lt;/strong&gt;: több forrás, több útvonal, nagy tárolók és összekötők.&lt;/p&gt;

&lt;h1&gt;2. Egyszerű magyarázat – a három „A”&lt;/h1&gt;
&lt;p&gt;Az energiabiztonságot három szempont mentén érdemes nézni:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Elérhetőség (availability): &lt;/strong&gt;van-e egyáltalán elég forrás?&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Hozzáférhetőség (accessibility): &lt;/strong&gt;el tud-e jutni hozzánk – megfelelő vezetékeken, összekötőkön?&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Megfizethetőség (affordability): &lt;/strong&gt;elviselhető-e az ára?&lt;/li&gt;
&lt;/ul&gt;
&lt;p&gt;A kockázat akkor nő, ha &lt;strong&gt;egyetlen forrástól vagy egyetlen útvonaltól&lt;/strong&gt; függünk – mert egy politikai vita, szankció vagy vezetéktámadás azonnal ellátási zavart okozhat. Ezért a biztonság alapszabálya: &lt;strong&gt;ne tegyük minden tojásunkat egy kosárba.&lt;/strong&gt;&lt;/p&gt;

&lt;h1&gt;3. Részletes magyarázat&lt;/h1&gt;
&lt;h2&gt;3.1 A magyar gázfüggőség&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az Európai Bizottság országprofilja szerint Magyarország földgáz-importfüggősége Oroszországtól 2022-ben &lt;strong&gt;~97,6%&lt;/strong&gt; volt. A fő útvonal a &lt;strong&gt;TurkStream&lt;/strong&gt; (Törökországon és a Balkánon át); az elmúlt évben mintegy &lt;strong&gt;8,5 milliárd köbméter (bcm)&lt;/strong&gt; gáz érkezett ezen keresztül, aminek egy részét Magyarország, más részét Szlovákia használta. Magyarország 2021-ben &lt;strong&gt;15 éves&lt;/strong&gt; szerződést kötött a Gazprommal (évi 4,5 bcm), amelyet 2023–2024-ben tovább bővített. (Forrás: Európai Bizottság; Euronews; Balkan Insight.)&lt;/p&gt;

&lt;h2&gt;3.2 A magyar olajfüggőség&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;A kőolaj döntő része a &lt;strong&gt;Barátság (Druzsba) vezetéken&lt;/strong&gt; érkezik; nagyságrendileg évi &lt;strong&gt;~5 millió tonna&lt;/strong&gt; orosz nyersolaj. A &lt;strong&gt;MOL&lt;/strong&gt; fokozatosan csökkenti orosz kitettségét (a jelentések szerint ~70%-ra), de a százhalombattai finomító részben orosz típusú (Ural) nyersolajra van hangolva, ami átállási költséget és időt jelent. (Forrás: Euronews; CREA/CSD elemzés.)&lt;/p&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-velemeny&quot;&gt;VÉLEMÉNY / vita: &lt;/strong&gt;Támogatói szerint az orosz útvonal olcsó, kiszámítható és fizikailag adott, ezért gazdaságilag racionális megtartani, amíg nincs olcsóbb alternatíva. Bírálói szerint a függőség &lt;strong&gt;stratégiai sebezhetőség&lt;/strong&gt; (szankciók, vezetéktámadások, politikai zsarolhatóság), és a diverzifikáció halogatása hosszú távon drágább és kockázatosabb. Mindkét érv legitim – a mérleg a tényleges alternatívák árától és megbízhatóságától függ.&lt;/p&gt;

&lt;h2&gt;3.3 Diverzifikáció – kiutak&lt;/h2&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;LNG: &lt;/strong&gt;a horvátországi &lt;strong&gt;Krk-szigeti&lt;/strong&gt; LNG-terminál kapacitásának lekötése cseppfolyósított gáz behozatalára (tengeri úton, több forrásból).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Azerbajdzsán: &lt;/strong&gt;gázvásárlási megállapodás a kaszpi forrásból, a Balkánon át.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Románia: &lt;/strong&gt;a Fekete-tengeri &lt;strong&gt;Neptun Deep&lt;/strong&gt; mező jövőbeni gáza regionális alternatíva lehet.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Összekötők (interkonnektorok): &lt;/strong&gt;Magyarországnak minden szomszédjával van gázösszeköttetése – ez adja a fizikai rugalmasságot az útvonalváltáshoz.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Tárolás: &lt;/strong&gt;Magyarország egyik legnagyobb regionális földgáztárolóval rendelkezik (~6 bcm nagyságrend), ami áthidalja a téli csúcsokat és a rövid zavarokat.&lt;/li&gt;
&lt;/ul&gt;

&lt;h2&gt;3.4 Uniós keret és eszközök&lt;/h2&gt;
&lt;p&gt;&lt;strong class=&quot;lbl lbl-teny&quot;&gt;TÉNY: &lt;/strong&gt;Az EU &lt;strong&gt;REPowerEU&lt;/strong&gt; stratégiája az orosz fosszilis energiától való függetlenedést célozza; az ütemterv szerint az orosz gáz uniós behozatalát fokozatosan, a &lt;strong&gt;2027 végéig&lt;/strong&gt; tartó időszakban vezetnék ki (a részletek jogalkotás alatt). A gázellátás biztonságát az uniós &lt;strong&gt;SoS-rendelet&lt;/strong&gt;, a &lt;strong&gt;szolidaritási mechanizmus&lt;/strong&gt; és az &lt;strong&gt;N–1 kritérium&lt;/strong&gt; (a legnagyobb egyetlen infrastruktúra kiesésének elviselése) is védi. Magyarország és Szlovákia mentességet kapott egyes szankciós elemek alól a TurkStream/Druzsba tekintetében. (Forrás: Európai Bizottság REPowerEU; CEENERGYNEWS.)&lt;/p&gt;

&lt;h1&gt;4. Kulcsszámok egy lapon&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Mutató&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Érték&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Megjegyzés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Gáz orosz importfüggőség&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~97,6% (2022)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;EB országprofil&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;TurkStream-en át érkezett gáz&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~8,5 bcm/év&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;részben HU, részben SK&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Gazprom-szerződés&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;15 év, 4,5 bcm/év (2021-től)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;később bővítve&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Druzsba nyersolaj&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~5 millió tonna/év&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;MOL orosz kitettség ~70%&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;Hazai gáztárolás&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~6 bcm nagyságrend&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;regionálisan jelentős (BECSLÉS)&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;th&gt;&lt;p&gt;EU orosz gáz kivezetése&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;~2027 vége (terv)&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;REPowerEU, jogalkotás alatt&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;
&lt;/thead&gt;&lt;/table&gt;

&lt;h1&gt;5. Valós példák&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;Vezetéktámadás/leállás: &lt;/strong&gt;a TurkStream vagy a Druzsba időszakos zavarai (támadás, karbantartás) azonnal ráirányítják a figyelmet arra, milyen sérülékeny az egyetlen útvonal – ilyenkor a tárolók és az összekötők adják a puffert.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Téli gázcsúcs: &lt;/strong&gt;hidegben megugrik a kereslet; a nagy hazai tároló és a diverz beszerzés együtt biztosítja a folytonosságot.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;Finomító-átállás: &lt;/strong&gt;a százhalombattai finomító nem-orosz nyersolajra állítása műszaki beruházást és időt igényel – ez mutatja, miért nem „egyik napról a másikra” kérdés a függőség oldása.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;6. Gyakori tévhitek&lt;/h1&gt;
&lt;ul&gt;
&lt;li&gt;&lt;strong&gt;„Az energiabiztonság = önellátás.” &lt;/strong&gt;Nem: kis, forrásszegény ország is lehet biztonságban, ha &lt;em&gt;diverzifikált&lt;/em&gt; (több forrás, útvonal, tároló).&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A megújuló önmagában megoldja a biztonságot.” &lt;/strong&gt;Segít csökkenteni az importfüggőséget, de időjárásfüggő – kell mellé tárolás, rugalmasság és importképesség.&lt;/li&gt;
&lt;li&gt;&lt;strong&gt;„A függőség pusztán politikai kérdés.” &lt;/strong&gt;Egyszerre műszaki (vezetékek, finomítók), gazdasági (ár) és politikai – mindhármat együtt kell nézni.&lt;/li&gt;
&lt;/ul&gt;

&lt;h1&gt;7. Fogalomtár&lt;/h1&gt;
&lt;table&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Fogalom&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;th&gt;&lt;p&gt;&lt;strong&gt;Jelentés&lt;/strong&gt;&lt;/p&gt;&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Energiabiztonság&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az energia folyamatos, megbízható elérhetősége megfizethető áron.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Diverzifikáció&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Több forrás/útvonal a függőség és a kockázat csökkentésére.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;TurkStream&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Orosz gáz fő útvonala Magyarországra Törökországon és a Balkánon át.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;Druzsba (Barátság)&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az orosz nyersolaj fő csővezetéke Magyarországra.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;REPowerEU&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;Az EU stratégiája az orosz fosszilis energiától való függetlenedésre.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;&lt;p&gt;&lt;strong&gt;N–1 kritérium&lt;/strong&gt;&lt;/p&gt;&lt;/td&gt;&lt;td&gt;&lt;p&gt;A legnagyobb egyetlen infrastruktúra kiesésének elviselése.&lt;/p&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/tbody&gt;&lt;/table&gt;

tó átállítása nem-orosz nyersolajra műszaki beruházást és időt igényel.&quot;}, {&quot;l&quot;: &quot;14. lecke&quot;, &quot;q&quot;: &quot;Mit jelent az N–1 kritérium az ellátásbiztonságban?&quot;, &quot;o&quot;: [&quot;Egy forrás elég&quot;, &quot;A legnagyobb egyetlen infrastruktúra kiesésének elviselése&quot;, &quot;Egy évnyi tartalék&quot;, &quot;Egyetlen szállító&quot;], &quot;a&quot;: 1, &quot;e&quot;: &quot;Az N–1 szerint a rendszernek a legnagyobb egyetlen elem (pl. fő vezeték) kiesését is el kell viselnie.&quot;}], &quot;cards&quot;: [[&quot;Energiabiztonság&quot;, &quot;Folyamatos, megbízható, megfizethető energiaellátás.&quot;], [&quot;Diverzifikáció&quot;, &quot;Több forrás/útvonal a függőség és kockázat csökkentésére.&quot;], [&quot;TurkStream&quot;, &quot;Az orosz gáz fő útvonala Magyarországra.&quot;], [&quot;Druzsba (Barátság)&quot;, &quot;Az orosz nyersolaj fő csővezetéke Magyarországra.&quot;], [&quot;REPowerEU&quot;, &quot;Az EU stratégiája az orosz fosszilis energia kivezetésére (~2027 vége).&quot;]]}};
const TITLES = {&quot;1&quot;: &quot;Bevezetés és tájékozódás&quot;, &quot;2&quot;: &quot;Energiaforrások A–Z&quot;, &quot;3&quot;: &quot;A villamosenergia-rendszer&quot;, &quot;4&quot;: &quot;Energiapiacok és árképzés&quot;, &quot;5&quot;: &quot;Az EU energiapolitikája&quot;, &quot;6&quot;: &quot;A magyar energiaszektor&quot;, &quot;7&quot;: &quot;Energiatárolás és rugalmasság&quot;, &quot;8&quot;: &quot;Földgáz és olaj&quot;, &quot;9&quot;: &quot;Az energiaátmenet és a jövő&quot;, &quot;10&quot;: &quot;Nukleáris energia és a Paks-sztori&quot;, &quot;11&quot;: &quot;Nap- és szélenergia a gyakorlatban&quot;, &quot;12&quot;: &quot;Rendszerirányítás és kiegyenlítő piacok&quot;, &quot;13&quot;: &quot;Energiakereskedelem, kockázatkezelés és PPA-k&quot;, &quot;14&quot;: &quot;Energiabiztonság és geopolitika&quot;};
let cur=1;                 // current lesson
let qi=0,score=0,answered=0,flags=[],picks=[];
let ci=0,CARDS=[];

/* progress in localStorage (safe) */
function loadProg(){try{return JSON.parse(localStorage.getItem(&#x27;energetika_prog&#x27;)||&#x27;{}&#x27;)}catch(e){return{}}}
function saveProg(p){try{localStorage.setItem(&#x27;energetika_prog&#x27;,JSON.stringify(p))}catch(e){}}
function paintBadges(){const p=loadProg();for(let n=1;n&lt;=14;n++){const el=document.getElementById(&#x27;badge-&#x27;+n);if(!el)continue;const v=p[n];el.textContent=(v!=null)?(v+&#x27;%&#x27;):&#x27;&#x27;;el.style.color=v==null?&#x27;&#x27;:(v&gt;=85?&#x27;#2E7D32&#x27;:v&gt;=60?&#x27;#B8860B&#x27;:&#x27;#B22222&#x27;);}}

/* lesson selection */
function selectLesson(n){
  cur=n;
  document.querySelectorAll(&#x27;.navitem&#x27;).forEach(b=&gt;b.classList.toggle(&#x27;active&#x27;,+b.dataset.n===n));
  const tpl=document.getElementById(&#x27;lesson-&#x27;+n);
  document.getElementById(&#x27;lessonBody&#x27;).innerHTML=tpl.innerHTML;
  document.getElementById(&#x27;lessonBody&#x27;).parentElement.parentElement.scrollTo?0:0;
  document.getElementById(&#x27;qTitle&#x27;).textContent=n+&#x27;. lecke – &#x27;+TITLES[n];
  // reset quiz
  qi=0;score=0;answered=0;
  const qs=QUIZ[n].questions;flags=new Array(qs.length).fill(false);picks=new Array(qs.length).fill(-1);
  renderQ();
  // cards
  CARDS=QUIZ[n].cards;ci=0;document.getElementById(&#x27;fcTotal&#x27;).textContent=CARDS.length;renderCard();
  // switch to quiz tab
  activateTab(&#x27;quiz&#x27;);
  window.scrollTo({top:0,behavior:&#x27;smooth&#x27;});
  closeSide();
}

/* quiz logic */
function renderQ(){
  const qs=QUIZ[cur].questions,it=qs[qi],locked=flags[qi];
  const rev=/Ism[eé]tl[eé]s/i.test(it.l||&#x27;&#x27;);
  let h=&#x27;&lt;div class=&quot;q&quot;&gt;&lt;div class=&quot;meta&#x27;+(rev?&#x27; rev&#x27;:&#x27;&#x27;)+&#x27;&quot;&gt;&#x27;+(it.l||(&#x27;&#x27; +cur+&#x27;. lecke&#x27;))+&#x27; · &#x27;+(qi+1)+&#x27;/&#x27;+qs.length+&#x27;&lt;/div&gt;&lt;h3&gt;&#x27;+it.q+&#x27;&lt;/h3&gt;&#x27;;
  it.o.forEach((o,i)=&gt;{h+=&#x27;&lt;button class=&quot;opt&quot; data-i=&quot;&#x27;+i+&#x27;&quot; &#x27;+(locked?&#x27;disabled&#x27;:&#x27;&#x27;)+&#x27;&gt;&#x27;+o+&#x27;&lt;/button&gt;&#x27;;});
  h+=&#x27;&lt;div class=&quot;exp&quot; id=&quot;exp&quot;&gt;&#x27;+it.e+&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
  document.getElementById(&#x27;quizArea&#x27;).innerHTML=h;
  if(locked)reveal(picks[qi]);
  document.querySelectorAll(&#x27;#quizArea .opt&#x27;).forEach(b=&gt;b.addEventListener(&#x27;click&#x27;,()=&gt;pick(+b.dataset.i)));
  document.getElementById(&#x27;qbar&#x27;).style.width=((qi+1)/qs.length*100)+&#x27;%&#x27;;
  document.getElementById(&#x27;prevBtn&#x27;).disabled=qi===0;
  document.getElementById(&#x27;nextBtn&#x27;).textContent=qi===qs.length-1?&#x27;Eredmény ✓&#x27;:&#x27;Következő →&#x27;;
  upd();
}
function pick(i){const it=QUIZ[cur].questions[qi];if(flags[qi])return;flags[qi]=true;picks[qi]=i;answered++;if(i===it.a)score++;reveal(i);upd();}
function reveal(i){const it=QUIZ[cur].questions[qi];document.querySelectorAll(&#x27;#quizArea .opt&#x27;).forEach((b,idx)=&gt;{b.disabled=true;if(idx===it.a)b.classList.add(&#x27;correct&#x27;);if(idx===i&amp;&amp;i!==it.a)b.classList.add(&#x27;wrong&#x27;);});const e=document.getElementById(&#x27;exp&#x27;);if(e)e.classList.add(&#x27;show&#x27;);}
function upd(){document.getElementById(&#x27;scoreN&#x27;).textContent=score;document.getElementById(&#x27;answeredN&#x27;).textContent=answered;}
function result(){const qs=QUIZ[cur].questions;const pct=Math.round(score/qs.length*100);let m=pct&gt;=85?&#x27;Kiváló! Magabiztos tudás. 🏆&#x27;:pct&gt;=60?&#x27;Szép munka! Pár téma ismétlésre. 👍&#x27;:&#x27;Jó kezdet – nézd át újra a leckét. 📚&#x27;;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&lt;div class=&quot;result&quot;&gt;&lt;div class=&quot;meta&quot;&gt;Teszt befejezve&lt;/div&gt;&lt;div class=&quot;big&quot;&gt;&#x27;+score+&#x27; / &#x27;+qs.length+&#x27;&lt;/div&gt;&lt;div style=&quot;font-size:19px;color:var(--blue);font-weight:700&quot;&gt;&#x27;+pct+&#x27;%&lt;/div&gt;&lt;p&gt;&#x27;+m+&#x27;&lt;/p&gt;&lt;button class=&quot;btn&quot; id=&quot;restartBtn&quot;&gt;Újrakezdés 🔄&lt;/button&gt;&lt;/div&gt;&#x27;;document.getElementById(&#x27;qbar&#x27;).style.width=&#x27;100%&#x27;;document.getElementById(&#x27;restartBtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{qi=0;score=0;answered=0;flags.fill(false);picks.fill(-1);renderQ();});const p=loadProg();if(p[cur]==null||pct&gt;p[cur]){p[cur]=pct;saveProg(p);paintBadges();}}
document.getElementById(&#x27;nextBtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{const qs=QUIZ[cur].questions;if(qi===qs.length-1){result();return;}qi++;renderQ();});
document.getElementById(&#x27;prevBtn&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{if(qi&gt;0){qi--;renderQ();}});

/* flashcards */
function renderCard(){const c=document.getElementById(&#x27;card&#x27;);c.classList.remove(&#x27;flipped&#x27;);if(!CARDS.length){document.getElementById(&#x27;fcFront&#x27;).textContent=&#x27;—&#x27;;document.getElementById(&#x27;fcBack&#x27;).textContent=&#x27;&#x27;;return;}document.getElementById(&#x27;fcFront&#x27;).textContent=CARDS[ci][0];document.getElementById(&#x27;fcBack&#x27;).textContent=CARDS[ci][1];document.getElementById(&#x27;fcIndex&#x27;).textContent=ci+1;}
document.getElementById(&#x27;card&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;document.getElementById(&#x27;card&#x27;).classList.toggle(&#x27;flipped&#x27;));
document.getElementById(&#x27;fcNext&#x27;).addEventListener(&#x27;click&#x27;,()=&gt;{if(CARDS.length){ci=(ci+1)%CARDS.length;renderCard();}});

t;európai áramár&quot;,1],[&quot;földgázszállítás&quot;,1],[&quot;gem&quot;,1],[&quot;geotermikus&quot;,1]]},&quot;07&quot;:{&quot;title&quot;:&quot;Magyar Energetikai Hírek — 2026. július&quot;,&quot;intro&quot;:&quot;Havi gyűjtőfájl. Minden reggeli (07:00) ellenőrzés **ehhez a fájlhoz** adja hozzá az új tételeket, a legfrissebb nap felül. Új hónap = új fájl (`YYYY-MM News.md`). Ellenőrzött források: MEKH, MAVIR, HUPX, FGSZ, MVM, Paks II (hivatalos); Portfolio, Világgazdaság, Index, Magyar Építők stb. (média). A hivatalos honlapok JavaScript-alapúak, közvetlenül nem olvashatók ki, ezért a tételeket kereséssel, több független forrás összevetésével ellenőrzöm.&quot;,&quot;days&quot;:[{&quot;date&quot;:&quot;2026-07-03&quot;,&quot;day&quot;:&quot;03&quot;,&quot;header&quot;:&quot;2026-07-03 (ellenőrzés 07:00 CEST)&quot;,&quot;html&quot;:&quot;&lt;p&gt;&lt;strong&gt;A nap fő témái:&lt;/strong&gt; Az EU Modernizációs Alapból 552,3 millió euró érkezik Magyarországra villamosenergia-hálózat-fejlesztésre; a Tisza-kormány négy energetörvény módosítását kezdeményezte (szélerőmű-magassághatár, dinamikus árazás, stb.); megvan az ország első jogerős szélerőmű-építési engedélye (Bana, 28,8 MW).&lt;/p&gt;\n&lt;h3&gt;1. EU Modernizációs Alap: 552,3 millió euró Magyarországnak hálózatfejlesztésre&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; Portfolio.hu (2026-07-02) · HVG (2026-07-02) · Népszava (2026-07-02) · Index (2026-07-02) · Infostart (2026-07-02) · &lt;em&gt;VERIFIED · FACT&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;Az Európai Bizottság és az Európai Beruházási Bank az EU kibocsátáskereskedelmi rendszer (ETS) bevételeiből táplálkozó Modernizációs Alapból 2,5 milliárd eurót folyósított 11 tagállamnak, 51 tisztább energiarendszer-projekt finanszírozására. Magyarország 552,3 millió eurót kap — a jelenlegi forduló második legnagyobb összege (csak Románia előz, 636,9 millió euróval). A támogatás Magyarországon kizárólag a villamosenergia-hálózat digitalizálását és fejlesztését finanszírozza. A Modernizációs Alap 2021-es indulása óta összesen 23,2 milliárd eurót juttatott a kedvezményezett tagállamoknak.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://www.portfolio.hu/gazdasag/20260702/tobb-mint-felmilliard-euro-erkezik-magyarorszagra-energetikai-fejlesztesekre-847188\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.portfolio.hu/gazdasag/20260702/tobb-mint-felmilliard-euro-erkezik-magyarorszagra-energetikai-fejlesztesekre-847188&lt;/a&gt; · &lt;a href=\&quot;https://hvg.hu/gazdasag/20260702_eu-modernizacios-alap-magyarorszag-552-millio-euro\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://hvg.hu/gazdasag/20260702_eu-modernizacios-alap-magyarorszag-552-millio-euro&lt;/a&gt; · &lt;a href=\&quot;https://nepszava.hu/3328046_europai-bizottsag-552-millio-euro-modernizacios-alap-magyarorszag\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://nepszava.hu/3328046_europai-bizottsag-552-millio-euro-modernizacios-alap-magyarorszag&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; Modernizációs Alap, EU ETS, hálózatfejlesztés, digitalizáció, 552 millió euró, EBI&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;2. Négy energetikai törvény módosítása: szélerőmű-magasság 199 m-re, dinamikus árazás, 868 Mrd Ft EU-forrás&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; Index (2026-07-02) · Világgazdaság (2026-07-02) · &lt;em&gt;VERIFIED · FACT&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;A Tisza-kormány július 2-án négy energetikai törvény módosítását kezdeményezte az Országgyűlésben, összesen 868 milliárd Ft uniós forrás lehívásának feltételeként. A négy kulcselem: (1) a szélerőmű-telepítés magassági korlátja 130 m-ről 199 m-re emelkedik; (2) okosmérővel rendelkező háztartások és mikrovállalkozások önkéntes alapon dinamikus (HUPX-alapú) áramárazású szerződést köthetnek; (3) a napelemesek hálózati elszámolásának felülvizsgálata; (4) az akkumulátor-újrafeldolgozó üzemek helyszínkijelölése kiveszi a miniszteri diszkrecionális hatáskörből, objektív hatósági eljárásba kerül. Jelenleg ~650–700 ezer háztartásban van okosmérő (E.ON: ~450 ezer, MVM: ~250 ezer); 2030-ig 950 ezer új mérő telepítése tervezett (54 milliárd Ft EU-támogatás).&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://index.hu/belfold/2026/07/02/kormany-bejelentes-magyar-peter-tisza-part-kormanyszovivoi-tajekoztato/negy-energetikai-torveny-modositasat-kezdemenyezi-a-kormany-epulhetnek-a-szeleromuvek/\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://index.hu/belfold/2026/07/02/kormany-bejelentes-magyar-peter-tisza-part-kormanyszovivoi-tajekoztato/negy-energetikai-torveny-modositasat-kezdemenyezi-a-kormany-epulhetnek-a-szeleromuvek/&lt;/a&gt; · &lt;a href=\&quot;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromu-dinamikus-arazas-okosmero\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromu-dinamikus-arazas-okosmero&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; energetikai törvény, szélerőmű-magasság, dinamikus árazás, okosmérő, akkumulátor-újrafeldolgozás, EU-forrás&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3. Bana: megvan Magyarország első jogerős szélerőmű-építési engedélye — 28,8 MW, 4 turbina&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; Világgazdaság (2026-07-01) · Forbes.hu (2026-07-01) · &lt;em&gt;PARTIALLY VERIFIED · FACT&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;A Fejér Vármegyei Kormányhivatal jogerős építési engedélyt adott ki a Green Energy Investhor Zrt. banai szélerőmű-parkjára — ez az ország első, jogerőre emelkedett ilyensége. A projekt négy, egyenként 7,2 MW névleges teljesítményű (összesen 28,8 MW) turbinából áll; lapátátmérő 170 m, teljes magasság 215 m. A beruházás egy ~550 MW-os, 16 települést és három vármegyét (Győr-Moson-Sopron, Komárom-Esztergom, Vas) érintő, 70 turbinára tervezett országos fejlesztési program első konkrét állomása.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromupark-bana-beruhazas-green-energy-investhor\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromupark-bana-beruhazas-green-energy-investhor&lt;/a&gt; · &lt;a href=\&quot;https://www.forbes.hu/hirek/oriasi-szelenergia-fejlesztest-jelentett-be-kapitany-istvan-mar-nyaron-elkezdodik/\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.forbes.hu/hirek/oriasi-szelenergia-fejlesztest-jelentett-be-kapitany-istvan-mar-nyaron-elkezdodik/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; szélerőmű, Bana, jogerős engedély, Green Energy Investhor, 28,8 MW, szélerőmű-program&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr /&gt;&quot;,&quot;text&quot;:&quot;  a nap fő témái:  az eu modernizációs alapból 552,3 millió euró érkezik magyarországra villamosenergia-hálózat-fejlesztésre; a tisza-kormány négy energetörvény módosítását kezdeményezte (szélerőmű-magassághatár, dinamikus árazás, stb.); megvan az ország első jogerős szélerőmű-építési engedélye (bana, 28,8 mw). \n 1. eu modernizációs alap: 552,3 millió euró magyarországnak hálózatfejlesztésre \n \n  forrás:  portfolio.hu (2026-07-02) · hvg (2026-07-02) · népszava (2026-07-02) · index (2026-07-02) · infostart (2026-07-02) ·  verified · fact  \n az európai bizottság és az európai beruházási bank az eu kibocsátáskereskedelmi rendszer (ets) bevételeiből táplálkozó modernizációs alapból 2,5 milliárd eurót folyósított 11 tagállamnak, 51 tisztább energiarendszer-projekt finanszírozására. magyarország 552,3 millió eurót kap — a jelenlegi forduló második legnagyobb összege (csak románia előz, 636,9 millió euróval). a támogatás magyarországon kizárólag a villamosenergia-hálózat digitalizálását és fejlesztését finanszírozza. a modernizációs alap 2021-es indulása óta összesen 23,2 milliárd eurót juttatott a kedvezményezett tagállamoknak. \n  link:   https://www.portfolio.hu/gazdasag/20260702/tobb-mint-felmilliard-euro-erkezik-magyarorszagra-energetikai-fejlesztesekre-847188  ·  https://hvg.hu/gazdasag/20260702_eu-modernizacios-alap-magyarorszag-552-millio-euro  ·  https://nepszava.hu/3328046_europai-bizottsag-552-millio-euro-modernizacios-alap-magyarorszag  \n  kulcsszavak:  modernizációs alap, eu ets, hálózatfejlesztés, digitalizáció, 552 millió euró, ebi \n \n 2. négy energetikai törvény módosítása: szélerőmű-magasság 199 m-re, dinamikus árazás, 868 mrd ft eu-forrás \n \n  forrás:  index (2026-07-02) · világgazdaság (2026-07-02) ·  verified · fact  \n a tisza-kormány július 2-án négy energetikai törvény módosítását kezdeményezte az országgyűlésben, összesen 868 milliárd ft uniós forrás lehívásának feltételeként. a négy kulcselem: (1) a szélerőmű-telepítés magassági korlátja 130 m-ről 199 m-re emelkedik; (2) okosmérővel rendelkező háztartások és mikrovállalkozások önkéntes alapon dinamikus (hupx-alapú) áramárazású szerződést köthetnek; (3) a napelemesek hálózati elszámolásának felülvizsgálata; (4) az akkumulátor-újrafeldolgozó üzemek helyszínkijelölése kiveszi a miniszteri diszkrecionális hatáskörből, objektív hatósági eljárásba kerül. jelenleg ~650–700 ezer háztartásban van okosmérő (e.on: ~450 ezer, mvm: ~250 ezer); 2030-ig 950 ezer új mérő telepítése tervezett (54 milliárd ft eu-támogatás). \n  link:   https://index.hu/belfold/2026/07/02/kormany-bejelentes-magyar-peter-tisza-part-kormanyszovivoi-tajekoztato/negy-energetikai-torveny-modositasat-kezdemenyezi-a-kormany-epulhetnek-a-szeleromuvek/  ·  https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromu-dinamikus-arazas-okosmero  \n  kulcsszavak:  energetikai törvény, szélerőmű-magasság, dinamikus árazás, okosmérő, akkumulátor-újrafeldolgozás, eu-forrás \n \n 3. bana: megvan magyarország első jogerős szélerőmű-építési engedélye — 28,8 mw, 4 turbina \n \n  forrás:  világgazdaság (2026-07-01) · forbes.hu (2026-07-01) ·  partially verified · fact  \n a fejér vármegyei kormányhivatal jogerős építési engedélyt adott ki a green energy investhor zrt. banai szélerőmű-parkjára — ez az ország első, jogerőre emelkedett ilyensége. a projekt négy, egyenként 7,2 mw névleges teljesítményű (összesen 28,8 mw) turbinából áll; lapátátmérő 170 m, teljes magasság 215 m. a beruházás egy ~550 mw-os, 16 települést és három vármegyét (győr-moson-sopron, komárom-esztergom, vas) érintő, 70 turbinára tervezett országos fejlesztési program első konkrét állomása. \n  link:   https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/szeleromupark-bana-beruhazas-green-energy-investhor  ·  https://www.forbes.hu/hirek/oriasi-szelenergia-fejlesztest-jelentett-be-kapitany-istvan-mar-nyaron-elkezdodik/  \n  kulcsszavak:  szélerőmű, bana, jogerős engedély, green energy investhor, 28,8 mw, szélerőmű-program \n \n &quot;},{&quot;date&quot;:&quot;2026-07-02&quot;,&quot;day&quot;:&quot;02&quot;,&quot;header&quot;:&quot;2026-07-02 (ellenőrzés 07:00 CEST)&quot;,&quot;html&quot;:&quot;&lt;p&gt;&lt;strong&gt;A nap fő témái:&lt;/strong&gt; Az EU Bizottság ma zöldberuházási fiskális könnyítést hirdetett, amely Magyarországot is érinti; tegnap bejelentették a Paks–Budapest távolsági hőszállítás megvalósíthatósági vizsgálatát; a hőkupola zivatarokkal ért véget, de az energiahálózaton az áramkimaradások száma még megemelkedett.&lt;/p&gt;\n&lt;h3&gt;1. EU Bizottság: zöldberuházási fiskális könnyítés — Magyarország is nyerhet&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; Portfolio.hu (2026-07-02) · Pénzcentrum (2026-07-02) · &lt;em&gt;VERIFIED · FACT/OPINION&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;Az Európai Bizottság 2026. július 2-án közzétette azt a döntését, amellyel korlátozott mértékű fiskális könnyítést biztosít a tagállamoknak az energiaátmenetet gyorsító beruházásokra. Az intézkedés a 2026 februárjában kirobbant iráni konfliktus kapcsán meghozott fosszilis-leválási lépésekre vonatkozik; érintett területek: elektromos járművek, napenergia, geotermia, gázkazán→hőszivattyú csere, vasút, töltőállomások. Magyarország Helyreállítási és Ellenállóképességi Terve (HEP) ~3 Mrd EUR-t irányoz elő elektromobilitásra és energiahatékonyságra; a könnyítés mozgásteret adhat ezen források mobilizálásához.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://www.portfolio.hu/unios-forrasok/20260702/magyarorszag-is-orulhet-brusszel-komoly-konnyitest-ad-az-allamadossaggal-kuzdo-europai-allamoknak-847080\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.portfolio.hu/unios-forrasok/20260702/magyarorszag-is-orulhet-brusszel-komoly-konnyitest-ad-az-allamadossaggal-kuzdo-europai-allamoknak-847080&lt;/a&gt; · &lt;a href=\&quot;https://www.penzcentrum.hu/vilag/20260702/rendkivuli-dontest-hozott-az-europai-bizottsag-fontos-penzugyi-mentoov-erkezik-magyarorszaknak-1201471\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.penzcentrum.hu/vilag/20260702/rendkivuli-dontest-hozott-az-europai-bizottsag-fontos-penzugyi-mentoov-erkezik-magyarorszaknak-1201471&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; EU Bizottság, zöldberuházás, fiskális könnyítés, energiaátmenet, HEP, Magyarország&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;2. Paks hulladékhője fűthetné Budapestet — ~125 km-es távolsági hővezeték-vizsgálat indul&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; Portfolio.hu (2026-07-01) · HVG (2026-07-01) · Világgazdaság · ProfitLine · &lt;em&gt;VERIFIED · FACT&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;A Budapesti Közművek (BKM/FŐTÁV) és a BME közösen vizsgálja egy ~125 km hosszú, ~1000 mm átmérőjű távolsági hőszállító-csőpár műszaki-gazdasági megvalósíthatóságát Paks és Budapest között (tervezett útvonal: Dunaújváros, Százhalombatta, Érd). Előzetes becslés szerint a rendszer évi ~300 millió m³ földgázt válthatna ki a fővárosi távfűtésben, miközben csökkentené a Duna hőterhelését is. Egyelőre nem beruházási döntésről van szó; a vizsgálat 2026 IV. negyedévében zárul.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://www.portfolio.hu/uzlet/20260701/a-paksi-atomeromu-hulladekhojevel-futenek-a-fovaros-lakasait-846998\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.portfolio.hu/uzlet/20260701/a-paksi-atomeromu-hulladekhojevel-futenek-a-fovaros-lakasait-846998&lt;/a&gt; · &lt;a href=\&quot;https://hvg.hu/itthon/20260701_paks-atomeromu-felesleges-ho-hasznal-fovaros-tavfutes\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://hvg.hu/itthon/20260701_paks-atomeromu-felesleges-ho-hasznal-fovaros-tavfutes&lt;/a&gt; · &lt;a href=\&quot;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/paks-2-atomeromu-tavfutes-duna-hotermeles\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/paks-2-atomeromu-tavfutes-duna-hotermeles&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; Paks, hulladékhő, Budapest, FŐTÁV, BME, távolsági hővezeték, gázimport-kiváltás&lt;/li&gt;\n&lt;/ul&gt;\n&lt;h3&gt;3. Hőhullám-utóhatás: E.ON 2-3× több áramkimaradás, HUPX ~1000 EUR/MWh csúcs, lehűlés zivatarokkal&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; XpatLoop (E.ON nyilatkozat) · Balkan Green Energy News · BBJ · Hungarian Conservative · &lt;em&gt;VERIFIED · FACT/ESTIMATE&lt;/em&gt;&lt;/li&gt;\n&lt;li&gt;Az E.ON Hungária Csoport közölte: Budapest, Pest megye és Észak-Dunántúl területén a hőhullám csúcsán az átlagosnál 2-3-szor több hálózati meghibásodás történt; legtöbb hiba közepes feszültségű kábelek és transzformátorok túlmelegedéséből adódott. A HUPX másnapi piacon a csúcs ~1000 EUR/MWh-t közelített, Románia és Magyarország az EU legdrágább árampiaci szegmenseivé váltak (Romáiával szemben Magyarország ~1 EUR/MWh különbséggel volt a legmagasabb áron, jún. 28.). A hidegfront júl. 1-2. folyamán érte el az országot: zivatarokkal (akár 90 km/h széllökés, helyenként 50+ mm csapadék), a meleg véget ért — az E.ON fokozott készültséggel számolt a viharkárokra is.&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Link:&lt;/strong&gt; &lt;a href=\&quot;https://xpatloop.com/channels/2026/07/increasingly-frequent-power-outages-in-hungary-due-to-the-extreme-heat.html\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://xpatloop.com/channels/2026/07/increasingly-frequent-power-outages-in-hungary-due-to-the-extreme-heat.html&lt;/a&gt; · &lt;a href=\&quot;https://balkangreenenergynews.com/romania-hungary-hit-by-highest-power-prices-in-europe-amid-heat-outages/\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://balkangreenenergynews.com/romania-hungary-hit-by-highest-power-prices-in-europe-amid-heat-outages/&lt;/a&gt; · &lt;a href=\&quot;https://bbj.hu/economy/agriculture/weather/record-breaking-heatwave-to-end-with-storms-gusty-winds-in-hungary/\&quot; target=\&quot;_blank\&quot; rel=\&quot;noopener\&quot;&gt;https://bbj.hu/economy/agriculture/weather/record-breaking-heatwave-to-end-with-storms-gusty-winds-in-hungary/&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;strong&gt;Kulcsszavak:&lt;/strong&gt; E.ON, áramkimaradás, HUPX, áramár, lehűlés, zivatar, Románia&lt;/li&gt;\n&lt;/ul&gt;\n&lt;hr /&gt;&quot;,&quot;text&quot;:&quot;  a nap fő témái:  az eu bizottság ma zöldberuházási fiskális könnyítést hirdetett, amely magyarországot is érinti; tegnap bejelentették a paks–budapest távolsági hőszállítás megvalósíthatósági vizsgálatát; a hőkupola zivatarokkal ért véget, de az energiahálózaton az áramkimaradások száma még megemelkedett. \n 1. eu bizottság: zöldberuházási fiskális könnyítés — magyarország is nyerhet \n \n  forrás:  portfolio.hu (2026-07-02) · pénzcentrum (2026-07-02) ·  verified · fact/opinion  \n az európai bizottság 2026. július 2-án közzétette azt a döntését, amellyel korlátozott mértékű fiskális könnyítést biztosít a tagállamoknak az energiaátmenetet gyorsító beruházásokra. az intézkedés a 2026 februárjában kirobbant iráni konfliktus kapcsán meghozott fosszilis-leválási lépésekre vonatkozik; érintett területek: elektromos járművek, napenergia, geotermia, gázkazán→hőszivattyú csere, vasút, töltőállomások. magyarország helyreállítási és ellenállóképességi terve (hep) ~3 mrd eur-t irányoz elő elektromobilitásra és energiahatékonyságra; a könnyítés mozgásteret adhat ezen források mobilizálásához. \n  link:   https://www.portfolio.hu/unios-forrasok/20260702/magyarorszag-is-orulhet-brusszel-komoly-konnyitest-ad-az-allamadossaggal-kuzdo-europai-allamoknak-847080  ·  https://www.penzcentrum.hu/vilag/20260702/rendkivuli-dontest-hozott-az-europai-bizottsag-fontos-penzugyi-mentoov-erkezik-magyarorszaknak-1201471  \n  kulcsszavak:  eu bizottság, zöldberuházás, fiskális könnyítés, energiaátmenet, hep, magyarország \n \n 2. paks hulladékhője fűthetné budapestet — ~125 km-es távolsági hővezeték-vizsgálat indul \n \n  forrás:  portfolio.hu (2026-07-01) · hvg (2026-07-01) · világgazdaság · profitline ·  verified · fact  \n a budapesti közművek (bkm/főtáv) és a bme közösen vizsgálja egy ~125 km hosszú, ~1000 mm átmérőjű távolsági hőszállító-csőpár műszaki-gazdasági megvalósíthatóságát paks és budapest között (tervezett útvonal: dunaújváros, százhalombatta, érd). előzetes becslés szerint a rendszer évi ~300 millió m³ földgázt válthatna ki a fővárosi távfűtésben, miközben csökkentené a duna hőterhelését is. egyelőre nem beruházási döntésről van szó; a vizsgálat 2026 iv. negyedévében zárul. \n  link:   https://www.portfolio.hu/uzlet/20260701/a-paksi-atomeromu-hulladekhojevel-futenek-a-fovaros-lakasait-846998  ·  https://hvg.hu/itthon/20260701_paks-atomeromu-felesleges-ho-hasznal-fovaros-tavfutes  ·  https://www.vg.hu/vilaggazdasag-magyar-gazdasag/2026/07/paks-2-atomeromu-tavfutes-duna-hotermeles  \n  kulcsszavak:  paks, hulladékhő, budapest, főtáv, bme, távolsági hővezeték, gázimport-kiváltás \n \n 3. hőhullám-utóhatás: e.on 2-3× több áramkimaradás, hupx ~1000 eur/mwh csúcs, lehűlés zivatarokkal \n \n  forrás:  xpatloop (e.on nyilatkozat) · balkan green energy news · bbj · hungarian conservative ·  verified · fact/estimate  \n az e.on hungária csoport közölte: budapest, pest megye és észak-dunántúl területén a hőhullám csúcsán az átlagosnál 2-3-szor több hálózati meghibásodás történt; legtöbb hiba közepes feszültségű kábelek és transzformátorok túlmelegedéséből adódott. a hupx másnapi piacon a csúcs ~1000 eur/mwh-t közelített, románia és magyarország az eu legdrágább árampiaci szegmenseivé váltak (romáiával szemben magyarország ~1 eur/mwh különbséggel volt a legmagasabb áron, jún. 28.). a hidegfront júl. 1-2. folyamán érte el az országot: zivatarokkal (akár 90 km/h széllökés, helyenként 50+ mm csapadék), a meleg véget ért — az e.on fokozott készültséggel számolt a viharkárokra is. \n  link:   https://xpatloop.com/channels/2026/07/increasingly-frequent-power-outages-in-hungary-due-to-the-extreme-heat.html  ·  https://balkangreenenergynews.com/romania-hungary-hit-by-highest-power-prices-in-europe-amid-heat-outages/  ·  https://bbj.hu/economy/agriculture/weather/record-breaking-heatwave-to-end-with-storms-gusty-winds-in-hungary/  \n  kulcsszavak:  e.on, áramkimaradás, hupx, áramár, lehűlés, zivatar, románia \n \n &quot;},{&quot;date&quot;:&quot;2026-07-01&quot;,&quot;day&quot;:&quot;01&quot;,&quot;header&quot;:&quot;2026-07-01 (ellenőrzés 07:00 CEST)&quot;,&quot;html&quot;:&quot;&lt;p&gt;&lt;strong&gt;A nap fő témája:&lt;/strong&gt; a tartós hőhullám és hálózati hatásai — rekord rendszerterhelés, magas árak, Paks korlátozása. Emellett egy energiatárolási infrastruktúra-hír.&lt;/p&gt;\n&lt;h3&gt;1. MAVIR — Megdőlt a nyári rendszerterhelési rekord: 7488 MW&lt;/h3&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;strong&gt;Forrás:&lt;/strong&gt; MAVIR- function renderYears(){

}
function renderMonths(){
  const has=monthsWithData(curYear);

  }
  $(&#x27;months&#x27;).innerHTML=h;
}
function renderKeywords(){
  const o=NEWS[curYear][curMonth];
  const max=o.keywords.length?o.keywords[0][1]:1;
  $(&#x27;kw&#x27;).innerHTML=`&lt;h3&gt;Kulcsszavak&lt;/h3&gt;&lt;div class=&quot;kwmon&quot;&gt;${curYear}. ${HU_MON[+curMonth]}&lt;/div&gt;`+

      const big=v&gt;=Math.max(2,max*0.6)?&#x27;big&#x27;:&#x27;&#x27;;
      return `&lt;span class=&quot;chip ${big}&quot; title=&quot;${v} említés&quot; onclick=&quot;jumpKw(&#x27;${k.replace(/&#x27;/g,&quot;\\&#x27;&quot;)}&#x27;)&quot;&gt;${k}&lt;/span&gt;`;
    }).join(&#x27;&#x27;);
}
function styleStatus(root){
  root.querySelectorAll(&#x27;.day em&#x27;).forEach(e=&gt;{
    const t=e.textContent.trim().toUpperCase();
    for(const k in STATUS){ if(t.startsWith(k)){e.style.color=STATUS[k];e.style.fontWeight=&#x27;700&#x27;;break;} }
  });
}
function renderNews(){
  const o=NEWS[curYear][curMonth];
  let h=`&lt;div class=&quot;mtitle&quot;&gt;${o.title||(curYear+&#x27;. &#x27;+HU_MON[+curMonth])}&lt;/div&gt;`;
  if(o.intro) h+=`&lt;div class=&quot;mintro&quot;&gt;${o.intro}&lt;/div&gt;`;
  o.days.forEach(d=&gt;{
    h+=`&lt;section class=&quot;day&quot; id=&quot;day-${d.date}&quot; data-date=&quot;${d.date}&quot;&gt;`+
       `&lt;div class=&quot;daytitle&quot;&gt;${d.header}&lt;/div&gt;${d.html}&lt;/section&gt;`;
  });
  mid.innerHTML=h;
  styleStatus(mid);
  mid.scrollTop=0;
}
function firstWeekdayMon(y,m){return (new Date(y,m-1,1).getDay()+6)%7;} // 0=Mon
function daysInMonth(y,m){return new Date(y,m,0).getDate();}
function renderCalendar(){
  const o=NEWS[curYear][curMonth];
  const hasDays=new Set(o.days.map(d=&gt;d.day));
  const y=+curYear,m=+curMonth;
  const lead=firstWeekdayMon(y,m), n=daysInMonth(y,m);
  let h=&#x27;&#x27;;
  for(let i=0;i&lt;lead;i++) h+=&#x27;&lt;div class=&quot;cd&quot;&gt;&lt;/div&gt;&#x27;;
  for(let d=1;d&lt;=n;d++){
    const dd=String(d).padStart(2,&#x27;0&#x27;);
    const date=`${curYear}-${curMonth}-${dd}`;
    if(hasDays.has(dd)){
      h+=`&lt;div class=&quot;cd has ${date===activeDate?&#x27;active&#x27;:&#x27;&#x27;}&quot; data-date=&quot;${date}&quot; onclick=&quot;jumpDay(&#x27;${date}&#x27;)&quot;&gt;${d}&lt;span class=&quot;dot&quot;&gt;&lt;/span&gt;&lt;/div&gt;`;
    }else{
      h+=`&lt;div class=&quot;cd&quot;&gt;${d}&lt;/div&gt;`;
    }
  }
  $(&#x27;caldays&#x27;).innerHTML=h;
}
function setActive(date){
  if(date===activeDate) return;
  activeDate=date;
  document.querySelectorAll(&#x27;.cd.has&#x27;).forEach(c=&gt;c.classList.toggle(&#x27;active&#x27;,c.dataset.date===date));
}
function updateSpy(){
  const secs=[...mid.querySelectorAll(&#x27;.day&#x27;)];
  if(!secs.length) return;
  const top=mid.getBoundingClientRect().top;
  let act=secs[0].dataset.date;
  for(const s of secs){ if(s.getBoundingClientRect().top-top&lt;=90) act=s.dataset.date; }
  setActive(act);
}
function jumpDay(date){
  const el=document.getElementById(&#x27;day-&#x27;+date);
  if(el){ el.scrollIntoView({block:&#x27;start&#x27;,behavior:&#x27;smooth&#x27;}); setActive(date); }
}
function jumpKw(kw){
  const o=NEWS[curYear][curMonth];
  const hit=o.days.find(d=&gt;d.text.includes(kw.toLowerCase()));
  if(hit){ const el=document.getElementById(&#x27;day-&#x27;+hit.date);
    el.scrollIntoView({block:&#x27;start&#x27;,behavior:&#x27;smooth&#x27;});
    el.classList.add(&#x27;flash&#x27;); setTimeout(()=&gt;el.classList.remove(&#x27;flash&#x27;),900); setActive(hit.date);}
}
function renderAll(){renderYears();renderMonths();renderKeywords();renderNews();renderCalendar();
  requestAnimationFrame(()=&gt;{updateSpy();});}
function selYear(y){curYear=y; curMonth=monthsWithData(y).sort().reverse()[0]; activeDate=null; renderAll();}
function selMonth(mm){curMonth=mm; activeDate=null; renderAll();}
mid.addEventListener(&#x27;scroll&#x27;,()=&gt;requestAnimationFrame(updateSpy));
renderAll();

  &lt;path d=&quot;M45 150 L135 150 L126 196 L54 196 Z&quot; fill=&quot;#cddcf2&quot; stroke=&quot;#2E5496&quot; stroke-width=&quot;2&quot;/&gt;
  &lt;rect x=&quot;52&quot; y=&quot;168&quot; width=&quot;76&quot; height=&quot;26&quot; fill=&quot;#7aa5d8&quot; opacity=&quot;.85&quot;/&gt;
  &lt;text x=&quot;90&quot; y=&quot;18&quot; font-size=&quot;11&quot; fill=&quot;#5b6472&quot; text-anchor=&quot;middle&quot;&gt;csap = teljesítmény (W)&lt;/text&gt;
  &lt;text x=&quot;90&quot; y=&quot;188&quot; font-size=&quot;10&quot; fill=&quot;#1F4E79&quot; text-anchor=&quot;middle&quot; font-weight=&quot;700&quot;&gt;energia (Wh)&lt;/text&gt;
&lt;/svg&gt;
&lt;div class=&quot;cap&quot;&gt;&lt;b&gt;Teljesítmény&lt;/b&gt; = milyen gyorsan folyik a víz (a csap ereje).&lt;br&gt;&lt;b&gt;Energia&lt;/b&gt; = mennyi víz gyűlt össze a vödörben egy idő alatt.&lt;br&gt;Erős csap + hosszú idő = sok víz.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;formula&quot;&gt;Energia (Wh) = Teljesítmény (W) × Idő (h)&lt;small&gt;1000 W-os vízforraló × 1 óra = 1000 Wh = 1 kWh&lt;/small&gt;&lt;/div&gt;
&lt;p&gt;👨 &lt;b&gt;Másik kép:&lt;/b&gt; a teljesítmény olyan, mint az autó &lt;b&gt;sebessége&lt;/b&gt; (km/h – milyen gyorsan mész), az energia pedig a &lt;b&gt;megtett táv&lt;/b&gt; (km – mennyit mentél összesen). Gyorsan menni ≠ sokat menni; ehhez idő is kell.&lt;/p&gt;
&lt;/div&gt;

&lt;h2&gt;2. A létra: minden lépés ×1000&lt;/h2&gt;
&lt;p&gt;Ugyanaz az egység, csak egyre nagyobb előtaggal. Minden lépcső &lt;b&gt;ezerszer&lt;/b&gt; nagyobb az előzőnél.&lt;/p&gt;
&lt;div class=&quot;ladder&quot;&gt;
  &lt;div class=&quot;rung&quot;&gt;&lt;div class=&quot;u&quot;&gt;W&lt;small&gt;watt&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;ex&quot;&gt;💡 Egy LED izzó ~9 W · telefontöltő ~5 W&lt;/div&gt;&lt;/div&gt;
  &lt;div class=&quot;step&quot;&gt;▲ ×1000&lt;/div&gt;
  &lt;div class=&quot;rung&quot;&gt;&lt;div class=&quot;u&quot;&gt;kW&lt;small&gt;kilowatt = 1 000 W&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;ex&quot;&gt;☕ Vízforraló ~2 kW · hajszárító ~1,8 kW · egy háztartás csúcsa néhány kW&lt;/div&gt;&lt;/div&gt;
  &lt;div class=&quot;step&quot;&gt;▲ ×1000&lt;/div&gt;
  &lt;div class=&quot;rung&quot;&gt;&lt;div class=&quot;u&quot;&gt;MW&lt;small&gt;megawatt = 1 000 kW&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;ex&quot;&gt;🌬️ 1 modern szélturbina ~3 MW · Paks egy blokkja &lt;b&gt;500 MW&lt;/b&gt;&lt;/div&gt;&lt;/div&gt;
  &lt;div class=&quot;step&quot;&gt;▲ ×1000&lt;/div&gt;
  &lt;div class=&quot;rung&quot;&gt;&lt;div class=&quot;u&quot;&gt;GW&lt;small&gt;gigawatt = 1 000 MW&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;ex&quot;&gt;⚛️ Paks I összesen &lt;b&gt;2 GW&lt;/b&gt; (2000 MW) · magyar csúcsterhelés ~7,5 GW&lt;/div&gt;&lt;/div&gt;
  &lt;div class=&quot;step&quot;&gt;▲ ×1000&lt;/div&gt;
  &lt;div class=&quot;rung&quot;&gt;&lt;div class=&quot;u&quot;&gt;TW&lt;small&gt;terawatt = 1 000 GW&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;ex&quot;&gt;🌍 A Föld teljes pillanatnyi villamos teljesítménye ~3 TW nagyságrend&lt;/div&gt;&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;kid&quot;&gt;🔑 &lt;b&gt;Ugyanez az energiánál:&lt;/b&gt; Wh → kWh → MWh → GWh → TWh, mindegyik ×1000. A villanyszámládon &lt;b&gt;kWh&lt;/b&gt; van; egy ország éves fogyasztását &lt;b&gt;TWh&lt;/b&gt;-ban mérik.&lt;/div&gt;

&lt;h2&gt;3. Lássuk arányosan – teljesítmény&lt;/h2&gt;
&lt;p&gt;A skála óriási, ezért &lt;b&gt;logaritmikus&lt;/b&gt; (minden lépés ~×10). Így a töltő és az atomerőmű egy képen elfér:&lt;/p&gt;
&lt;div class=&quot;card bars&quot;&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;📱 Telefontöltő&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:6%;background:#7aa5d8&quot;&gt;&lt;span&gt;5 W&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;💡 LED izzó&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:6%;background:#6f9fd6&quot;&gt;&lt;span&gt;9 W&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;☕ Vízforraló&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:28%;background:#4f83c2&quot;&gt;&lt;span&gt;2 kW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🏠 Családi ház csúcsa&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:33%;background:#3d6fb0&quot;&gt;&lt;span&gt;~5 kW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🌬️ Modern szélturbina&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:63%;background:#2E5496&quot;&gt;&lt;span&gt;~3 MW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;⚛️ Paks I – 1 blokk&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:87%;background:#28407a&quot;&gt;&lt;span&gt;500 MW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;⚛️ Paks I – összesen&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:94%;background:#1F4E79&quot;&gt;&lt;span&gt;2000 MW = 2 GW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🇭🇺 Magyar csúcsterhelés (2026 nyár)&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:100%;background:#B22222&quot;&gt;&lt;span&gt;7488 MW ≈ 7,5 GW&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;axis&quot;&gt;◄ kisebb · logaritmikus skála · nagyobb ►&lt;/div&gt;&lt;/div&gt;

&lt;h2&gt;4. Lássuk arányosan – energia&lt;/h2&gt;
&lt;div class=&quot;card bars&quot;&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;📱 Telefon feltöltése&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:6%;background:#7aa5d8&quot;&gt;&lt;span&gt;~15 Wh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🧺 1 mosás&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:15%;background:#4f83c2&quot;&gt;&lt;span&gt;~1 kWh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🏠 Háztartás – 1 nap&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:21%;background:#3d6fb0&quot;&gt;&lt;span&gt;~6,9 kWh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🏠 Háztartás – 1 év (rezsi-keret)&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:42%;background:#2E5496&quot;&gt;&lt;span&gt;2523 kWh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;⚛️ Paks I – 1 év (~15,8 TWh)&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:96%;background:#28407a&quot;&gt;&lt;span&gt;≈15,8 TWh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;barrow&quot;&gt;&lt;div class=&quot;barlab&quot;&gt;🇭🇺 Magyarország – 1 év (2024)&lt;/div&gt;&lt;div class=&quot;bartrack&quot;&gt;&lt;div class=&quot;barfill&quot; style=&quot;width:100%;background:#1F4E79&quot;&gt;&lt;span&gt;≈44,9 TWh&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;&lt;div class=&quot;axis&quot;&gt;◄ kevesebb · logaritmikus skála · több ►&lt;/div&gt;&lt;/div&gt;

&lt;h2&gt;6. MW vs MWh – a leggyakoribb tévesztés&lt;/h2&gt;
&lt;div class=&quot;mwvsmwh&quot;&gt;
  &lt;div class=&quot;b p&quot;&gt;&lt;h4&gt;MW = teljesítmény&lt;/h4&gt;Mekkora a „csap”. Egy pillanatnyi &lt;b&gt;képesség&lt;/b&gt;. Egy 3 MW-os szélturbina ennyit tud &lt;b&gt;maximum&lt;/b&gt; leadni.&lt;/div&gt;
  &lt;div class=&quot;b e&quot;&gt;&lt;h4&gt;MWh = energia&lt;/h4&gt;Mennyi „víz” gyűlt össze. 3 MW × 1 óra = &lt;b&gt;3 MWh&lt;/b&gt;. Ugyanez 24 órán át = &lt;b&gt;72 MWh&lt;/b&gt;.&lt;/div&gt;
&lt;/div&gt;
&lt;div class=&quot;kid&quot;&gt;📰 Ezért írják a hírekben külön: egy akkumulátoros tároló pl. &lt;b&gt;„31 MW / 62 MWh”&lt;/b&gt; – az első a &lt;b&gt;teljesítménye&lt;/b&gt; (milyen gyorsan tud tölteni/kisütni), a második a &lt;b&gt;tárolt energiája&lt;/b&gt; (62 ÷ 31 = 2 órán át adja a teljes 31 MW-ot).&lt;/div&gt;

&lt;h2&gt;7. Olvass utána mélyebben 📚&lt;/h2&gt;

&lt;details&gt;&lt;summary&gt;SI-előtagok és átváltások&lt;/summary&gt;
&lt;table&gt;
&lt;tr&gt;&lt;th&gt;Előtag&lt;/th&gt;&lt;th&gt;Jel&lt;/th&gt;&lt;th&gt;Szorzó&lt;/th&gt;&lt;th&gt;Példa (teljesítmény)&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;kilo&lt;/td&gt;&lt;td&gt;k&lt;/td&gt;&lt;td&gt;10³ = 1 000&lt;/td&gt;&lt;td&gt;1 kW = 1 000 W&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;mega&lt;/td&gt;&lt;td&gt;M&lt;/td&gt;&lt;td&gt;10⁶ = 1 000 000&lt;/td&gt;&lt;td&gt;1 MW = 1 000 kW&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;giga&lt;/td&gt;&lt;td&gt;G&lt;/td&gt;&lt;td&gt;10⁹&lt;/td&gt;&lt;td&gt;1 GW = 1 000 MW&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;tera&lt;/td&gt;&lt;td&gt;T&lt;/td&gt;&lt;td&gt;10¹²&lt;/td&gt;&lt;td&gt;1 TW = 1 000 GW&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;
&lt;p&gt;Energiánál ugyanígy: &lt;b&gt;1 TWh = 1 000 GWh = 1 000 000 MWh = 1 000 000 000 kWh&lt;/b&gt;. Az energia SI-alapegysége valójában a &lt;b&gt;joule (J)&lt;/b&gt;: 1 Wh = 3600 J, tehát 1 kWh = 3,6 MJ.&lt;/p&gt;
&lt;/details&gt;

&lt;details&gt;&lt;summary&gt;Miért nem egyenlő a beépített teljesítmény a megtermelt energiával? (kihasználtság)&lt;/summary&gt;
&lt;p&gt;Egy erőmű ritkán megy 100%-on egész évben. A &lt;b&gt;kihasználtsági tényező&lt;/b&gt; (capacity factor) azt mondja meg, az elméleti maximumnak hány %-át termelte meg ténylegesen.&lt;/p&gt;
&lt;p&gt;&lt;b&gt;Példa &lt;span class=&quot;tag es&quot;&gt;BECSLÉS&lt;/span&gt;:&lt;/b&gt; Paks I = 2000 MW. Ha egész évben menne (8760 óra), az 2000 × 8760 = 17 520 000 MWh = &lt;b&gt;17,52 TWh&lt;/b&gt; lenne. A valóságban ~90% kihasználtsággal ez ~15,8 TWh.&lt;/p&gt;
&lt;p&gt;&lt;b&gt;Tény-ellenőrzés &lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;:&lt;/b&gt; Paks I 2024-ben a bruttó hazai villamosenergia-felhasználás &lt;b&gt;35,6%-át&lt;/b&gt; adta (MAVIR/MEKH). Ez jól mutatja: egyetlen ~2 GW-os erőmű az ország éves energiaigényének több mint harmadát fedezi – mert szinte folyamatosan jár. Ezzel szemben egy napelem kihasználtsága Magyarországon csak ~12–13%, egy szélturbináé ~25% körül van, mert nem süt/fúj mindig.&lt;/p&gt;
&lt;/details&gt;

&lt;details&gt;&lt;summary&gt;Magyar viszonyítási pontok (ellenőrzött számok)&lt;/summary&gt;
&lt;table&gt;
&lt;tr&gt;&lt;th&gt;Mit?&lt;/th&gt;&lt;th&gt;Érték&lt;/th&gt;&lt;th&gt;Típus&lt;/th&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Paks I beépített teljesítmény (4 blokk)&lt;/td&gt;&lt;td&gt;2000 MW (2 GW)&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Paks II tervezett (2 blokk)&lt;/td&gt;&lt;td&gt;2 × 1262 MW ≈ 2524 MW&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Magyar villamosenergia-fogyasztás (2024, nettó)&lt;/td&gt;&lt;td&gt;~44,9 TWh&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Ebből Paks I aránya (bruttó, 2024)&lt;/td&gt;&lt;td&gt;35,6%&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Nyári csúcsterhelés-rekord (2026.06.29.)&lt;/td&gt;&lt;td&gt;7488 MW ≈ 7,5 GW&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Háztartás rezsicsökkentett éves keret&lt;/td&gt;&lt;td&gt;2523 kWh/év (210 kWh/hó)&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;tr&gt;&lt;td&gt;Lakossági ár a keretig (2025)&lt;/td&gt;&lt;td&gt;36,39 Ft/kWh · felette 70,1 Ft/kWh&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;tag f&quot;&gt;TÉNY&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
&lt;/table&gt;
&lt;p class=&quot;src&quot;&gt;&lt;b&gt;Források:&lt;/b&gt;
&lt;a href=&quot;https://atomeromu.mvm.hu/hu-HU/Rolunk&quot;&gt;MVM Paksi Atomerőmű&lt;/a&gt; ·
&lt;a href=&quot;https://hu.wikipedia.org/wiki/MVM_Paksi_Atomer%C5%91m%C5%B1&quot;&gt;Wikipédia: Paksi Atomerőmű&lt;/a&gt; ·
&lt;a href=&quot;https://www.paks2.hu/&quot;&gt;Paks II&lt;/a&gt; ·
&lt;a href=&quot;https://www.mavir.hu/web/mavir/mavir-mekh-ver-adatai&quot;&gt;MAVIR/MEKH VER-adatok&lt;/a&gt; ·
&lt;a href=&quot;https://www.origo.hu/gazdasag/2025/01/magyarorszag-villamosenergia-rendszer-2024&quot;&gt;Origo (2024 rendszeradatok)&lt;/a&gt; ·
&lt;a href=&quot;https://www.mvmnext.hu/lakossagirezsi/reszletes-informaciok-az-aramszamlarol&quot;&gt;MVM Next (lakossági ár)&lt;/a&gt;.
Ellenőrizve: 2 független forrás témánként (Tier 1–3). A kihasználtsági és háztartási becslések &lt;span class=&quot;tag es&quot;&gt;BECSLÉS&lt;/span&gt; jelölésűek.&lt;/p&gt;
&lt;/details&gt;

&lt;/div&gt;
&lt;script&gt;
const PRICE=36.39;
const fmt=n=&gt;Math.round(n).toLocaleString(&#x27;hu-HU&#x27;);
const fmt1=n=&gt;n.toLocaleString(&#x27;hu-HU&#x27;,{maximumFractionDigits:1});
function pick(){document.getElementById(&#x27;watt&#x27;).value=document.getElementById(&#x27;dev&#x27;).value;calc();}
function calc(){
  const w=+document.getElementById(&#x27;watt&#x27;).value||0;
  const h=+document.getElementById(&#x27;hrs&#x27;).value||0;
  const kwhDay=w*h/1000, kwhYear=kwhDay*365, cost=kwhYear*PRICE;
  document.getElementById(&#x27;perday&#x27;).textContent=fmt1(kwhDay)+&#x27; kWh&#x27;;
  document.getElementById(&#x27;peryear&#x27;).textContent=fmt(kwhYear)+&#x27; kWh&#x27;;
  document.getElementById(&#x27;cost&#x27;).textContent=fmt(cost)+&#x27; Ft&#x27;;
  const hrsFrom1=w&gt;0?(1000/w):0;
  document.getElementById(&#x27;fun&#x27;).innerHTML=&#x27;💡 1 kWh energiából ez az eszköz kb. &lt;b&gt;&#x27;+fmt1(hrsFrom1)+&#x27; órán&lt;/b&gt; át működik. &#x27;+
